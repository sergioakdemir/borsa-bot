    const sebepBox=(extra&&extra.sebep)?`<div class="sec-title">${esc(extra.sebepBaslik||"Fiyat hareketi sebebi")}</div><div class="quote">${esc(extra.sebep)}</div>${extra.url?`<a class="kaplink" href="${esc(extra.url)}" target="_blank" style="display:inline-block;margin-top:8px">Kaynak →</a>`:""}`:"";
    let h=`<div class="row"><div><h2 style="font-size:22px;font-weight:700">${esc(d.isim)}</h2><div class="tick">${esc(d.ticker)}${mtag(d.market)}</div></div>${pill(d.decision,d.renk)}</div>
      <div class="row" style="margin-top:12px"><div><div class="price" style="font-size:24px">${money(d.fiyat,d.para_birimi)}</div><div class="chg ${signCls(d.gunluk)}">${pct(d.gunluk)}</div></div>
        <div style="text-align:right">${statusLine({statusPhrase:d.statusPhrase||("Risk: "+d.risk),statusColor:d.risk_renk})}<div class="muted" style="font-size:11.5px;margin-top:6px">Güven: ${esc(d.guven)}</div></div></div>
      ${chartBox(d.ticker,d.market,d.grafik,d.para_birimi||"₺")}
      ${sebepBox}
      ${botKarti}
      ${d.action?`<div class="anbox" style="margin-top:14px;border-color:rgba(52,211,153,.3)"><b class="c-green">Ne yapmalı?</b> ${esc(d.action)}</div>`:""}
      <div class="sec-title">Bot yorumu</div><div class="quote">${esc(d.reason)}</div>
      ${d.riskReason&&d.riskReason!=="—"?`<div class="sec-title">Risk · ${esc(d.risk)}</div><div class="quote">${esc(d.riskReason)}</div>`:""}`;
    const sev=lvf("Destek",lv.destek,"c-green")+lvf("Direnç",lv.direnc,"c-red")+lvf("Hedef",lv.hedef,"c-green")+lvf("Stop-loss",lv.stop,"c-red");
    if(sev)h+=`<div class="sec-title">Önemli seviyeler</div><div class="lvls">${sev}</div>`;
    if(an&&an.available)h+=`<div class="sec-title">Analist beklentisi</div><div class="anbox">
      <div class="row"><span>${an.analist_sayisi} kurum · <b class="${an.konsensus==='AL'?'c-green':an.konsensus==='SAT'?'c-red':'c-amber'}">${esc(an.konsensus)}</b></span>
        <span>Ort. hedef <b>${fmt(an.ortalama_hedef)} ₺</b> <span class="${signCls(an.potansiyel)}">${pct(an.potansiyel)}</span></span></div>
      <div class="row" style="margin-top:11px;font-size:12.5px"><span class="c-green">AL ${an.al_sayisi}</span><span class="c-amber">TUT ${an.tut_sayisi}</span><span class="c-red">SAT ${an.sat_sayisi}</span></div></div>`;
    if(d.haberler&&d.haberler.length)h+=`<div class="sec-title">Haber etkisi</div>`+d.haberler.map(n=>`<div class="news sm">${newsVisual(n,true)}<div class="body" style="padding:11px 13px"><div class="title" style="font-size:13.5px">${esc(n.baslik)}</div><div class="meta"><span class="chip">${esc(n.kategori)}</span>${n.url?`<a class="kaplink" href="${esc(n.url)}" target="_blank">Kaynak →</a>`:""}</div></div></div>`).join("");
    document.getElementById("ov-body").innerHTML=h;updateReadoutDefault();
  }catch(e){document.getElementById("ov-body").innerHTML=empty("Detay yüklenemedi")}}
function ovShow(html){document.getElementById("ov-body").innerHTML=html;document.getElementById("ov-scrim").classList.add("open");document.getElementById("overlay").classList.add("open")}
function closeStock(){document.getElementById("ov-scrim").classList.remove("open");document.getElementById("overlay").classList.remove("open")}

/* ============ UZUN BASMA (radar) ============ */
let lpT=null,lpFired=false,lpMoved=false,lpX=0,lpY=0,lpTs=0,menuAt=0;
function lpStart(e,k){if(e.type==="mousedown"&&(Date.now()-lpTs)<700)return;if(e.type==="touchstart")lpTs=Date.now();
  lpFired=false;lpMoved=false;const p=e.touches?e.touches[0]:e;lpX=p.clientX;lpY=p.clientY;clearTimeout(lpT);
  lpT=setTimeout(()=>{lpT=null;lpFired=true;if(navigator.vibrate)try{navigator.vibrate(12)}catch(_){}openMenu(k)},500)}
function lpMove(e){const p=e.touches?e.touches[0]:e;if(Math.abs(p.clientX-lpX)>10||Math.abs(p.clientY-lpY)>10){lpMoved=true;if(lpT){clearTimeout(lpT);lpT=null}}}
function lpEnd(e){if(lpT){clearTimeout(lpT);lpT=null}if(lpFired&&e&&e.cancelable)e.preventDefault()}
function lpTap(e,k){if(lpFired||lpMoved){if(e)e.preventDefault();lpFired=false;lpMoved=false;return}openStock(k)}
function lpAttr(k){return`ontouchstart="lpStart(event,'${k}')" ontouchmove="lpMove(event)" ontouchend="lpEnd(event)" ontouchcancel="lpEnd(event)" onmousedown="lpStart(event,'${k}')" onmousemove="lpMove(event)" onmouseup="lpEnd(event)" onmouseleave="lpEnd(event)" oncontextmenu="event.preventDefault();return false" onclick="lpTap(event,'${k}')"`}
function openMenu(k){const s=STOCK_INDEX[k];if(!s)return;menuAt=Date.now();document.getElementById("menu-head").textContent=`${s.ticker} · ${s.isim}`;
  document.getElementById("menu-body").innerHTML=`<button onclick="actAdd('${k}')">Takip Listesine Ekle</button><button onclick="closeMenu();openStock('${k}')">AI ile Analiz Et</button>`;
  document.getElementById("menu-scrim").classList.add("open");document.getElementById("menu").classList.add("open")}
function posMenu(k,id,t){menuAt=Date.now();document.getElementById("menu-head").textContent=t;
  document.getElementById("menu-body").innerHTML=`<button onclick="closeMenu();openStock('${k}')">Detayı aç</button><button class="danger" onclick="closeMenu();pfRemove(${id},'${t}')">Sil</button>`;
  document.getElementById("menu-scrim").classList.add("open");document.getElementById("menu").classList.add("open")}
function closeMenu(){document.getElementById("menu-scrim").classList.remove("open");document.getElementById("menu").classList.remove("open")}
function menuScrimClose(){if(Date.now()-menuAt<400)return;closeMenu()}
async function actAdd(k){const s=STOCK_INDEX[k];closeMenu();try{await fetch("/api/watchlist/add",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({ticker:s.ticker,market:s.market,isim:s.isim})});toast(`${s.ticker} takibe eklendi`);loaded.radar=false;if(curTab==="radar")loadRadar()}catch(e){toast("Eklenemedi")}}

/* ============ PORTFOY EKLEME ============ */
let PF_CUR="TL",PF_HOLD=[];
function openPf(){if(!CUR_USER){toast("Önce kullanıcı seç");openUserPick();return}
  ["pf-ticker","pf-adet","pf-fiyat"].forEach(i=>document.getElementById(i).value="");pfCur("TL");
  document.getElementById("pf-preview").innerHTML="";
  {const st=document.getElementById("pf-status");st.style.display="none";st.className="spin";st.innerHTML="";}PF_HOLD=[];
  document.getElementById("pf-scrim").classList.add("open");document.getElementById("pf-sheet").classList.add("open")}
function closePf(){document.getElementById("pf-scrim").classList.remove("open");document.getElementById("pf-sheet").classList.remove("open")}
function pfCur(c){PF_CUR=c;document.getElementById("pf-tl").classList.toggle("active",c==="TL");document.getElementById("pf-usd").classList.toggle("active",c==="USD")}
async function pfReload(){loaded.portfoy=false;loaded.bugun=false;if(curTab==="portfoy")await loadPortfoy();if(curTab==="bugun")await loadBugun()}
async function pfRemove(id,t){if(!confirm(`${t} portföyden silinsin mi?`))return;
  try{const r=await fetch("/api/portfolio/delete",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id})});
    if((await r.json()).ok){toast(`${t} silindi`);pfReload()}else toast("Silinemedi")}catch(e){toast("Silinemedi")}}
function posEdit(id,ticker,adet,alis,cur){const birim=cur==="USD"?"$":"₺";
  ovShow(`<h2 style="font-size:20px;font-weight:700">${esc(ticker)} düzenle</h2>
    <div class="tick" style="margin-bottom:14px">Adet ve maliyet fiyatını güncelle</div>
    <div class="field"><label>Adet</label><input id="pe-adet" type="number" inputmode="decimal" value="${adet}"></div>
    <div class="field" style="margin-top:10px"><label>Maliyet fiyatı (${birim})</label><input id="pe-fiyat" type="number" inputmode="decimal" value="${alis}"></div>
    <button class="btn-primary" style="margin-top:16px" onclick="posEditSave(${id},'${esc(ticker)}')">Kaydet</button>`);
  setTimeout(()=>{const a=document.getElementById("pe-adet");if(a)a.focus();},80);}
async function posEditSave(id,ticker){const a=parseFloat(document.getElementById("pe-adet").value),f=parseFloat(document.getElementById("pe-fiyat").value);
  if(isNaN(a)||isNaN(f)||a<=0||f<=0){toast("Geçerli adet ve fiyat gir");return}
  try{const r=await fetch("/api/portfolio/update",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id,adet:a,alim_fiyati:f})});
    const d=await r.json();if(d.ok){closeStock();toast(`${ticker} güncellendi`);pfReload()}else toast(d.hata||"Güncellenemedi")}catch(e){toast("Güncellenemedi")}}
const PFL_CHECK=`<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#22c55e" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path class="pfl-draw" d="M5 13l4 4L19 7"/></svg>`;
const pflSleep=ms=>new Promise(r=>setTimeout(r,ms));
function pflPhase(st,text){const row=document.createElement("div");row.className="pfl-row";row.innerHTML=`<span class="pfl-spin"></span><span class="pfl-lbl">${esc(text)}</span>`;st.appendChild(row);return row;}
function pflPhaseSet(row,text){const l=row.querySelector(".pfl-lbl");if(!l)return;l.style.opacity="0";setTimeout(()=>{l.textContent=text;l.style.opacity="1";},180);}
async function pflReveal(st,hold){
  for(const h of hold){
    const row=document.createElement("div");row.className="pfl-row";
    row.innerHTML=`<span class="pfl-spin"></span><span class="pfl-lbl"><b>${esc(h.ticker)}</b> analiz ediliyor…</span>`;
    st.appendChild(row);row.scrollIntoView({block:"nearest"});
    await pflSleep(430);
    row.classList.add("done");
    row.innerHTML=`<span class="pfl-tick">${PFL_CHECK}</span><span class="pfl-lbl"><b>${esc(h.ticker)}</b> verileri yüklendi</span>`;
    await pflSleep(240);
  }
  const fin=document.createElement("div");fin.className="pfl-final";
  fin.innerHTML=`Portföy hazır! <b>${hold.length}</b> hisse bulundu`;
  st.appendChild(fin);fin.scrollIntoView({block:"nearest"});await pflSleep(160);
}
function pfHandleFile(e){const files=Array.from(e.target.files||[]);e.target.value="";if(!files.length)return;
  const st=document.getElementById("pf-status");document.getElementById("pf-preview").innerHTML="";PF_HOLD=[];
  st.style.display="block";st.className="pfl-wrap";st.innerHTML="";
  const phases=[`${files.length} fotoğraf taranıyor…`,"Hisseler tanımlanıyor…","Piyasa verileri çekiliyor…"];
  let pIdx=0;const phaseRow=pflPhase(st,phases[0]);
  const phaseTimer=setInterval(()=>{pIdx=(pIdx+1)%phases.length;pflPhaseSet(phaseRow,phases[pIdx]);},1500);
  Promise.all(files.map(f=>new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>res(null);r.readAsDataURL(f)}))).then(async imgs=>{
    let d;try{const r=await fetch("/api/portfolio/parse-image",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({images:imgs.filter(Boolean)})});d=await r.json();}catch(e){d={ok:false,hata:"işlenemedi"};}
    clearInterval(phaseTimer);
    if(!d.ok){phaseRow.className="pfl-row err";const l=phaseRow.querySelector(".pfl-lbl");if(l){l.style.opacity="1";l.textContent="Okunamadı: "+(d.hata||"");}return;}
    phaseRow.remove();
    const hold=(d.holdings||[]).filter(h=>h.ticker&&h.adet!=null&&h.fiyat!=null);
    if(!hold.length){const er=document.createElement("div");er.className="pfl-row err";er.innerHTML=`<span class="pfl-lbl">Fotoğrafta hisse okunamadı</span>`;st.appendChild(er);return;}
    await pflReveal(st,hold);
    pfPrev(hold);
  });}
function pfPrev(hold){const box=document.getElementById("pf-preview");PF_HOLD=hold.filter(h=>h.ticker&&h.adet!=null&&h.fiyat!=null);
  if(!PF_HOLD.length){box.innerHTML=`<div class="pf-prev">Fotoğrafta hisse okunamadı</div>`;return}
  box.innerHTML=`<div class="pf-prev"><div style="color:#ccc;font-size:13px;font-weight:650;padding:8px 0">Okunan bilgiler</div>${PF_HOLD.map(h=>`<div class="pr-row"><span><b>${esc(h.ticker)}</b> · ${fmtQty(h.adet)} adet</span><span class="muted">${money(h.fiyat,h.para_birimi==="USD"?"$":"₺")}</span></div>`).join("")}</div><button class="btn-primary" onclick="pfConfirm()">Onayla ve Ekle (${PF_HOLD.length})</button>`}
async function pfConfirm(){let ok=0;for(const h of PF_HOLD){try{const r=await fetch("/api/portfolio/add",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({kullanici:CUR_USER,ticker:h.ticker,adet:h.adet,alim_fiyati:h.fiyat,para_birimi:h.para_birimi||"TL"})});if((await r.json()).ok)ok++}catch(e){}}toast(ok+" hisse eklendi");closePf();pfReload()}
async function pfManualAdd(){const t=document.getElementById("pf-ticker").value.trim().toUpperCase();const a=parseFloat(document.getElementById("pf-adet").value),f=parseFloat(document.getElementById("pf-fiyat").value);
  if(!t||isNaN(a)||isNaN(f)){toast("Kod, adet ve fiyat gerekli");return}
  try{const r=await fetch("/api/portfolio/add",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({kullanici:CUR_USER,ticker:t,adet:a,alim_fiyati:f,para_birimi:PF_CUR})});
    const d=await r.json();if(d.ok){toast(t+" eklendi");closePf();pfReload()}else toast(d.hata||"Eklenemedi")}catch(e){toast("Eklenemedi")}}

/* ---- tema (koyu/açık) ---- */
const SUN_SVG=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4.2"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>`;
const MOON_SVG=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>`;
function applyTheme(t){document.documentElement.setAttribute("data-theme",t);
  const btn=document.getElementById("themeBtn");if(btn)btn.innerHTML=t==="light"?MOON_SVG:SUN_SVG;
  const m=document.getElementById("theme-color-meta");if(m)m.setAttribute("content",t==="light"?"#eceef1":"#0a0a0a")}
function toggleTheme(){const next=document.documentElement.getAttribute("data-theme")==="light"?"dark":"light";
  try{localStorage.setItem("bb_theme",next)}catch(e){}applyTheme(next)}
function initTheme(){let t="dark";try{t=localStorage.getItem("bb_theme")||"dark"}catch(e){}applyTheme(t)}

/* ---- baslat ---- */
initTheme();
initUser();
try{const lt=localStorage.getItem("bb_tab");if(lt&&document.getElementById("page-"+lt))curTab=lt}catch(e){}
showTab(curTab);
</script>

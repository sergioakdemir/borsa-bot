<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a">
<title>Borsa Asistanı</title>
<style>
  :root{
    --bg:#0a0a0a; --card:#141414; --card2:#101010; --border:#1e1e1e;
    --green:#00c853; --yellow:#f59e0b; --red:#ef4444; --gray:#6b7280;
    --blue:#3b82f6;
    --text:#ffffff; --muted:#9ca3af; --muted2:#6b7280;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{background:var(--bg);color:var(--text)}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-size:13.5px;line-height:1.5;padding-bottom:calc(76px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased}
  button{font-family:inherit;cursor:pointer;color:inherit}
  .c-green{color:var(--green)} .c-yellow{color:var(--yellow)}
  .c-red{color:var(--red)} .c-gray{color:var(--muted)}
  .pos{color:var(--green)} .neg{color:var(--red)} .flat{color:var(--muted)}

  header{position:sticky;top:0;z-index:30;background:rgba(10,10,10,.9);
    backdrop-filter:blur(12px);border-bottom:1px solid var(--border);
    padding:calc(12px + env(safe-area-inset-top)) 16px 12px;
    display:flex;align-items:center;justify-content:space-between;gap:10px}
  .brand{font-size:16px;font-weight:800;letter-spacing:.3px}
  .brand .dot{color:var(--green)}
  .userchip{display:flex;align-items:center;gap:7px;background:var(--card);
    border:1px solid var(--border);border-radius:999px;padding:4px 11px 4px 4px;
    font-size:12.5px;font-weight:700}
  .uc-av{width:24px;height:24px;border-radius:999px;background:var(--green);color:#04150a;
    font-weight:800;font-size:12px;display:flex;align-items:center;justify-content:center}
  .userchip.u-yigit .uc-av{background:var(--blue);color:#fff}

  main{padding:16px 14px 8px}
  .page{display:none} .page.active{display:block;animation:fade .25s ease}
  @keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  .card{background:var(--card);border:1px solid var(--border);border-radius:18px;
    padding:16px;margin-bottom:12px}
  .sec-title{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;
    font-weight:700;margin:20px 4px 11px}
  .sec-title:first-child{margin-top:4px}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px}

  .badge{font-size:11.5px;font-weight:800;letter-spacing:.4px;padding:4px 11px;border-radius:999px;
    border:1px solid transparent;white-space:nowrap}
  .badge.green{color:var(--green);background:rgba(0,200,83,.12);border-color:rgba(0,200,83,.3)}
  .badge.yellow{color:var(--yellow);background:rgba(245,158,11,.12);border-color:rgba(245,158,11,.3)}
  .badge.red{color:var(--red);background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3)}
  .badge.gray{color:var(--muted);background:rgba(107,114,128,.14);border-color:rgba(107,114,128,.3)}
  .chip{font-size:11.5px;font-weight:700;padding:5px 11px;border-radius:999px;
    background:rgba(107,114,128,.14);color:var(--muted)}
  .chip.green{background:rgba(0,200,83,.12);color:var(--green)}
  .chip.yellow{background:rgba(245,158,11,.12);color:var(--yellow)}
  .chip.red{background:rgba(239,68,68,.12);color:var(--red)}

  /* ---- Bugun ozet ---- */
  .hello{font-size:22px;font-weight:800;letter-spacing:.2px}
  .overview{color:#e5e7eb;font-size:14.5px;line-height:1.6;margin-top:10px;white-space:pre-line}
  .tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}

  .name{font-size:14.5px;font-weight:700}
  .tick{font-size:11px;color:var(--muted);font-weight:600;letter-spacing:.4px;margin-top:1px}
  .mtag{font-size:9px;font-weight:800;letter-spacing:.4px;padding:2px 5px;border-radius:5px;
    background:#242424;color:var(--muted);margin-left:6px;vertical-align:middle}
  .mtag.abd{color:var(--blue);background:rgba(59,130,246,.14)}
  .mtag.kripto{color:#f7931a;background:rgba(247,147,26,.14)}
  .mtag.bist{color:var(--green);background:rgba(0,200,83,.12)}
  .price{font-size:15px;font-weight:800} .chg{font-size:12px;font-weight:700;margin-top:1px}

  .stock-card .yorum{font-size:13px;color:var(--muted);line-height:1.5;margin-top:10px}
  .stock-card .riskline{font-size:11.5px;margin-top:10px;display:flex;align-items:center;gap:7px}
  .stock-card{cursor:pointer;transition:border-color .12s,transform .08s}
  .stock-card:active{transform:scale(.992);border-color:#2a2a2a}

  .seemore{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--muted);
    border-radius:13px;padding:12px;font-size:13px;font-weight:700;margin-top:2px}

  /* ---- Onemli haber ---- */
  .news-hero{border-radius:18px;overflow:hidden;border:1px solid var(--border);margin-bottom:4px}
  .news-hero .banner{height:96px;display:flex;align-items:center;justify-content:center;font-size:42px}
  .news-hero .body{background:var(--card);padding:15px}
  .news-hero .cat{font-size:11px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;
    color:var(--muted)}
  .news-hero .baslik{font-size:15.5px;font-weight:700;line-height:1.45;margin:6px 0 10px}
  .news-hero .meta{display:flex;flex-wrap:wrap;gap:8px;align-items:center}

  /* ---- yatay kaydirma firsat ---- */
  .hscroll{display:flex;gap:11px;overflow-x:auto;padding:2px 2px 6px;scroll-snap-type:x mandatory}
  .hscroll::-webkit-scrollbar{display:none}
  .opp{flex:0 0 auto;width:165px;scroll-snap-align:start;background:var(--card);
    border:1px solid var(--border);border-radius:15px;padding:13px}
  .opp .why{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.45;
    display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}

  /* ---- portfoy ozet ---- */
  .hero{background:linear-gradient(160deg,#181818,#111);border:1px solid var(--border);
    border-radius:20px;padding:20px;margin-bottom:16px}
  .hero .lbl{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
  .hero .big{font-size:32px;font-weight:800;margin:6px 0 2px}
  .hero .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
  .hero .grid b{display:block;font-size:16px;font-weight:700;margin-top:3px}
  .hero .yorum{font-size:13px;color:var(--muted);line-height:1.55;margin-top:14px;
    border-top:1px solid var(--border);padding-top:13px;white-space:pre-line}

  .pos-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 14px;margin-top:13px;
    padding-top:13px;border-top:1px solid var(--border)}
  .cell .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .cell .v{font-size:14.5px;font-weight:700;margin-top:2px}
  .trash{background:none;border:none;font-size:16px;opacity:.6;padding:4px;border-radius:8px}
  .trash:active{opacity:1;background:rgba(239,68,68,.12)}

  .addbtn{background:var(--card);border:1px solid var(--border);color:var(--green);width:32px;
    height:32px;border-radius:999px;font-size:21px;font-weight:700;line-height:1;
    display:flex;align-items:center;justify-content:center}

  /* ---- radar filtreler + arama ---- */
  .search{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);
    border-radius:13px;padding:12px 14px;font-size:14px;outline:none;margin-bottom:12px}
  .search:focus{border-color:var(--green)}
  .filters{display:flex;gap:7px;margin-bottom:6px}
  .filters button{flex:0 0 auto;background:var(--card);border:1px solid var(--border);color:var(--muted);
    border-radius:999px;padding:7px 15px;font-size:12.5px;font-weight:700}
  .filters button.active{border-color:var(--green);color:var(--green);background:rgba(0,200,83,.08)}

  /* ---- sohbet ---- */
  .chat{display:flex;flex-direction:column;gap:10px;padding-bottom:8px}
  .bubble{max-width:85%;padding:11px 14px;border-radius:16px;font-size:14px;line-height:1.55;
    white-space:pre-line}
  .bubble.user{align-self:flex-end;background:var(--green);color:#04150a;font-weight:600;
    border-bottom-right-radius:5px}
  .bubble.bot{align-self:flex-start;background:var(--card);border:1px solid var(--border);
    border-bottom-left-radius:5px}
  .bubble.typing{color:var(--muted)}
  .presets{display:flex;flex-wrap:wrap;gap:8px;margin:4px 0 12px}
  .preset{background:var(--card);border:1px solid var(--border);color:var(--muted);
    border-radius:999px;padding:8px 13px;font-size:12.5px;font-weight:600}
  .chat-input{position:fixed;left:0;right:0;bottom:calc(64px + env(safe-area-inset-bottom));
    z-index:34;display:flex;gap:8px;padding:10px 14px;background:rgba(10,10,10,.95);
    backdrop-filter:blur(12px);border-top:1px solid var(--border)}
  .chat-input input{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);
    border-radius:13px;padding:11px 14px;font-size:14px;outline:none}
  .chat-input input:focus{border-color:var(--green)}
  .chat-input button{background:var(--green);color:#04150a;border:none;border-radius:13px;
    padding:0 16px;font-size:18px;font-weight:800}

  /* ---- bildirim ---- */
  .alert{display:flex;align-items:center;gap:12px;background:var(--card);border:1px solid var(--border);
    border-radius:14px;padding:13px 14px;margin-bottom:10px;cursor:pointer}
  .alert:active{background:#191919}
  .alert .ico{font-size:20px;flex-shrink:0}
  .alert .at{font-size:14px;font-weight:600} .alert .am{font-size:12.5px;color:var(--muted);margin-top:2px}
  .alert .ad{font-size:11px;color:var(--muted2);margin-top:3px}
  .alert .achev{color:var(--muted2);font-size:20px}

  /* ---- detay overlay (tam ekran) ---- */
  .scrim{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.65);opacity:0;
    pointer-events:none;transition:opacity .25s;cursor:pointer}
  .scrim.open{opacity:1;pointer-events:auto}
  .overlay{position:fixed;inset:0;z-index:50;background:var(--bg);transform:translateY(100%);
    transition:transform .3s cubic-bezier(.32,.72,0,1);overflow-y:auto;
    padding:calc(12px + env(safe-area-inset-top)) 16px calc(30px + env(safe-area-inset-bottom))}
  .overlay.open{transform:none}
  .ov-close{display:flex;justify-content:flex-end;margin-bottom:4px}
  .ov-close button{background:var(--card);border:1px solid var(--border);color:var(--muted);
    border-radius:999px;padding:6px 14px;font-size:13px;font-weight:600}
  .lvls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
  .lvl{background:var(--card);border:1px solid var(--border);border-radius:13px;padding:12px}
  .lvl .k{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px}
  .lvl .v{font-size:16px;font-weight:800;margin-top:3px}
  .quote{font-size:14.5px;line-height:1.6;color:#e5e7eb}
  .anbox{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px}

  /* ---- alt panel (aksiyon menusu / portfoy ekleme) ---- */
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:55;background:var(--card);
    border-top:1px solid var(--border);border-radius:22px 22px 0 0;
    padding:8px 18px calc(24px + env(safe-area-inset-bottom));transform:translateY(100%);
    transition:transform .28s cubic-bezier(.32,.72,0,1);max-height:88vh;overflow-y:auto}
  .sheet.open{transform:none}
  .grab{width:42px;height:5px;background:#333;border-radius:999px;margin:8px auto 16px}
  #menu-scrim{z-index:54}
  .menu button{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:13px;
    padding:15px;font-size:15px;font-weight:600;margin-bottom:9px;display:flex;align-items:center;gap:11px}
  .menu button.danger{color:var(--red)}
  .mhead{text-align:center;font-size:13px;color:var(--muted);padding:6px 0 13px;font-weight:600}
  .field{margin-bottom:13px}
  .field label{display:block;color:#cccccc;font-size:13px;font-weight:600;margin-bottom:6px}
  .field input{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);
    border-radius:12px;padding:12px 14px;font-size:14.5px;outline:none}
  .field input:focus{border-color:var(--green)}
  .seg{display:flex;gap:8px}
  .seg button{flex:1;background:var(--card2);border:1px solid var(--border);color:var(--muted);
    border-radius:12px;padding:11px 0;font-size:14px;font-weight:700}
  .seg button.active{border-color:var(--green);color:var(--green);background:rgba(0,200,83,.08)}
  .pf-photo{width:100%;background:rgba(59,130,246,.1);border:1px solid rgba(59,130,246,.4);
    color:var(--blue);border-radius:14px;padding:14px;font-size:14.5px;font-weight:700;
    display:flex;align-items:center;justify-content:center;gap:9px}
  .pf-prev{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:6px 14px;margin:12px 0}
  .pr-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13.5px}
  .pr-row:last-child{border-bottom:none}
  .btn-primary{width:100%;background:var(--green);color:#04150a;border:none;border-radius:14px;
    padding:15px;font-size:15px;font-weight:800;margin-top:4px}
  .pf-or{text-align:center;color:var(--muted2);font-size:12px;margin:14px 0}
  .kaplink{display:inline-block;color:var(--blue);font-size:13.5px;font-weight:700;text-decoration:none}

  /* ---- kullanici secim ---- */
  .userpick{position:fixed;inset:0;z-index:70;background:rgba(8,8,8,.95);backdrop-filter:blur(7px);
    display:none;align-items:center;justify-content:center;padding:24px}
  .userpick.open{display:flex}
  .up-card{width:100%;max-width:360px;background:var(--card);border:1px solid var(--border);
    border-radius:22px;padding:28px 22px}
  .up-title{font-size:23px;font-weight:800;text-align:center}
  .up-sub{font-size:13.5px;color:var(--muted);text-align:center;margin:7px 0 22px}
  .up-btn{width:100%;display:flex;align-items:center;gap:14px;background:var(--card2);
    border:1px solid var(--border);border-radius:16px;padding:15px 16px;font-size:17px;
    font-weight:700;margin-bottom:12px}
  .up-av{width:36px;height:36px;border-radius:999px;background:var(--green);color:#04150a;
    font-weight:800;font-size:16px;display:flex;align-items:center;justify-content:center}
  .up-av.y{background:var(--blue);color:#fff}
  .up-close{width:100%;background:none;border:none;color:var(--muted);font-size:14px;padding:11px;margin-top:4px}

  .empty{text-align:center;color:var(--muted);padding:44px 16px;font-size:14px}
  .spin{text-align:center;color:var(--muted);padding:30px;font-size:13px}
  .toast{position:fixed;left:50%;bottom:calc(86px + env(safe-area-inset-bottom));
    transform:translateX(-50%) translateY(20px);z-index:80;background:#232323;
    border:1px solid var(--border);border-radius:999px;padding:11px 18px;font-size:13.5px;
    font-weight:600;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;max-width:86vw}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  nav{position:fixed;left:0;right:0;bottom:0;z-index:35;display:flex;background:rgba(10,10,10,.96);
    backdrop-filter:blur(12px);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
  nav button{flex:1;background:none;border:none;color:var(--muted2);padding:10px 0 12px;font-size:10.5px;
    font-weight:600;display:flex;flex-direction:column;align-items:center;gap:4px}
  nav button .ico{font-size:20px;line-height:1;opacity:.6}
  nav button.active{color:var(--text)} nav button.active .ico{opacity:1}
</style>
</head>
<body>

<header>
  <div class="brand">Borsa<span class="dot">.</span>Asistanı</div>
  <button class="userchip" id="userchip" onclick="openUserPick()">
    <span class="uc-av" id="uc-av">?</span><span id="uc-name">—</span>
  </button>
</header>

<main>
  <section id="page-bugun" class="page active"><div class="spin">Yükleniyor…</div></section>
  <section id="page-portfoy" class="page"></section>
  <section id="page-radar" class="page"></section>
  <section id="page-sor" class="page"></section>
  <section id="page-bildirim" class="page"></section>
</main>

<!-- sohbet giris cubugu (yalniz Bota Sor aktifken) -->
<div class="chat-input" id="chat-input" style="display:none">
  <input id="chat-text" type="text" placeholder="Bota bir şey sor…"
         onkeydown="if(event.key==='Enter')sendChat()">
  <button onclick="sendChat()">➤</button>
</div>

<nav>
  <button data-tab="bugun" class="active" onclick="showTab('bugun')"><span class="ico">🏠</span><span>Bugün</span></button>
  <button data-tab="portfoy" onclick="showTab('portfoy')"><span class="ico">💼</span><span>Portföyüm</span></button>
  <button data-tab="radar" onclick="showTab('radar')"><span class="ico">🎯</span><span>Radar</span></button>
  <button data-tab="sor" onclick="showTab('sor')"><span class="ico">💬</span><span>Bota Sor</span></button>
  <button data-tab="bildirim" onclick="showTab('bildirim')"><span class="ico">🔔</span><span>Bildirimler</span></button>
</nav>

<!-- detay overlay -->
<div class="scrim" id="ov-scrim" onclick="closeStock()"></div>
<div class="overlay" id="overlay"><div class="ov-close"><button onclick="closeStock()">Kapat ✕</button></div>
  <div id="ov-body"></div></div>

<!-- aksiyon menusu -->
<div class="scrim" id="menu-scrim" onclick="menuScrimClose()"></div>
<div class="sheet menu" id="menu"><div class="grab"></div>
  <div class="mhead" id="menu-head"></div><div id="menu-body"></div></div>

<!-- portfoy ekleme -->
<div class="scrim" id="pf-scrim" onclick="closePf()"></div>
<div class="sheet" id="pf-sheet"><div class="grab"></div>
  <h3 style="font-size:20px;font-weight:800">Portföye Ekle</h3>
  <div style="color:var(--muted);font-size:13px;margin-bottom:16px">Fotoğraf yükle ya da elle gir</div>
  <button class="pf-photo" onclick="document.getElementById('pf-file').click()">📷 Fotoğraf Yükle (çoklu)</button>
  <input type="file" id="pf-file" accept="image/*" multiple style="display:none" onchange="pfHandleFile(event)">
  <div class="spin" id="pf-status" style="display:none;padding:12px"></div>
  <div id="pf-preview"></div>
  <div class="pf-or">— veya elle gir —</div>
  <div class="field"><label>Hisse Kodu</label><input id="pf-ticker" placeholder="THYAO" autocapitalize="characters"></div>
  <div class="field"><label>Adet</label><input id="pf-adet" type="number" inputmode="decimal" placeholder="100"></div>
  <div class="field"><label>Alış Fiyatı</label><input id="pf-fiyat" type="number" inputmode="decimal" placeholder="285.50"></div>
  <div class="field"><label>Para Birimi</label><div class="seg">
    <button id="pf-tl" class="active" onclick="pfCur('TL')">₺ TL</button>
    <button id="pf-usd" onclick="pfCur('USD')">$ USD</button></div></div>
  <button class="btn-primary" onclick="pfManualAdd()">Ekle</button>
</div>

<!-- kullanici secim -->
<div class="userpick" id="userpick"><div class="up-card">
  <div class="up-title">Kim olduğunu seç</div>
  <div class="up-sub">Portföyünü ve sana özel yorumları göster</div>
  <button class="up-btn" onclick="setUser('serhat')"><span class="up-av">S</span>Serhat</button>
  <button class="up-btn" onclick="setUser('yigit')"><span class="up-av y">Y</span>Yiğit</button>
  <button class="up-close" id="up-close" onclick="closeUserPick()" style="display:none">Vazgeç</button>
</div></div>

<div class="toast" id="toast"></div>

<script>
const loaded={};
let CUR_USER=null;
const USERS={serhat:{ad:"Serhat",av:"S"},yigit:{ad:"Yiğit",av:"Y"}};
let STOCK_INDEX={}, ALERT_INDEX=[], RADAR_FILTER="all", RADAR_DATA=null;

/* ---- format ---- */
function fmt(n,d=2){if(n==null||isNaN(n))return"—";return Number(n).toLocaleString("tr-TR",{minimumFractionDigits:d,maximumFractionDigits:d})}
function pct(n){if(n==null||isNaN(n))return"—";return(n>0?"+":"")+fmt(n)+"%"}
function money(n,b){if(n==null||isNaN(n))return"—";b=b||"₺";return b==="$"?"$"+fmt(n):fmt(n)+" "+b}
function signCls(n){if(n==null||isNaN(n))return"flat";return n>0?"pos":(n<0?"neg":"flat")}
function esc(s){return(s??"").toString().replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))}
function empty(m){return`<div class="empty">${m}</div>`}
function badge(t,r){return t?`<span class="badge ${r||'gray'}">${esc(t)}</span>`:""}
function mtag(m){const l=m==="abd"?"ABD":m==="kripto"?"KRP":"BIST";return`<span class="mtag ${m||'bist'}">${l}</span>`}
let toastT=null;
function toast(m){const e=document.getElementById("toast");e.textContent=m;e.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>e.classList.remove("show"),1900)}
function key(s){return(s.market||"bist")+":"+s.ticker}
function reg(s){STOCK_INDEX[key(s)]=s;return key(s)}

function applyChip(){const u=USERS[CUR_USER];if(!u)return;document.getElementById("uc-av").textContent=u.av;

let curTab="bugun";
function showTab(t){curTab=t;document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));

let radarTimer=null;
async function loadRadar(){const el=document.getElementById("page-radar");
  el.innerHTML=`<input class="search" id="radar-search" placeholder="BIST · ABD · Kripto — ara…" oninput="radarSearch(this.value)">
    <div class="filters">${["all","bist","abd","kripto"].map(f=>`<button class="${f===RADAR_FILTER?'active':''}" onclick="setRadarFilter('${f}')">${f==="all"?"Tümü":f==="bist"?"BIST":f==="abd"?"ABD":"Kripto"}</button>`).join("")}</div>
    <div id="radar-body"><div class="spin">Yükleniyor…</div></div>`;
  try{RADAR_DATA=await(await fetch("/api/radar?market="+RADAR_FILTER)).json();renderRadar()}
  catch(e){document.getElementById("radar-body").innerHTML=empty("Yüklenemedi")}}
function setRadarFilter(f){RADAR_FILTER=f;document.querySelectorAll(".filters button").forEach((b,i)=>
  b.classList.toggle("active",["all","bist","abd","kripto"][i]===f));renderRadar()}
function radarCard(s){const k=reg(s);
  return`<div class="card stock-card" ${lpAttr(k,'search')}>
    <div class="row"><div><div class="name">${esc(s.isim)}${mtag(s.market)}</div><div class="tick">${esc(s.ticker)}</div></div>
      <div style="display:flex;align-items:center;gap:10px">
        ${s.fiyat!=null?`<div style="text-align:right"><div class="price">${money(s.fiyat,s.para_birimi)}</div>
          <div class="chg ${signCls(s.gunluk)}">${pct(s.gunluk)}</div></div>`:""}${badge(s.etiket,s.renk)}</div></div>
    ${s.yorum?`<div class="yorum">${esc(s.yorum)}</div>`:""}
    ${s.risk_etiket&&s.risk_etiket!=="—"?`<div class="riskline"><span class="chip ${s.risk_renk}">${esc(s.risk_etiket)}</span></div>`:""}</div>`}
function flt(arr){return RADAR_FILTER==="all"?arr:arr.filter(s=>(s.market||"bist")===RADAR_FILTER)}
function renderRadar(){const b=document.getElementById("radar-body");if(!RADAR_DATA){return}
  const al=flt(RADAR_DATA.alinabilir),iz=flt(RADAR_DATA.izleme),ri=flt(RADAR_DATA.riskli);
  let h="";
  h+=`<div class="sec-title">Alınabilir görünenler</div>`+(al.length?al.map(radarCard).join(""):empty("Şu an AL sinyali yok"));
  h+=`<div class="sec-title">İzlemeye alınanlar</div>`+(iz.length?iz.map(radarCard).join(""):empty("Takip listen boş"));
  h+=`<div class="sec-title">Riskli görünenler</div>`+(ri.length?ri.map(radarCard).join(""):empty("Riskli sinyal yok"));
  b.innerHTML=h}
function radarSearch(q){clearTimeout(radarTimer);q=(q||"").trim();
  if(q.length<1){renderRadar();return}
  const b=document.getElementById("radar-body");b.innerHTML=`<div class="spin">Aranıyor… (BIST·ABD·Kripto)</div>`;
  radarTimer=setTimeout(async()=>{try{const list=await(await fetch("/api/search?market=all&q="+encodeURIComponent(q))).json();
    b.innerHTML=list.length?`<div class="sec-title">"${esc(q)}" sonuçları</div>`+list.map(s=>radarCard({...s,yorum:s.ozet||s.yorum})).join(""):empty(`"${esc(q)}" için sonuç yok`);
  }catch(e){b.innerHTML=empty("Arama yapılamadı")}},300)}

const PRESETS=["Bugün portföyümde dikkat etmem gereken ne var?","En riskli hissem hangisi, neden?","Hangi hisseyi azaltmalıyım?","Piyasada genel hava nasıl?"];
let CHAT=[];
function loadSor(){const el=document.getElementById("page-sor");
  el.innerHTML=`<div class="presets">${PRESETS.map(p=>`<button class="preset" onclick="askPreset('${esc(p).replace(/'/g,"\\'")}')">${esc(p)}</button>`).join("")}</div>
    <div class="chat" id="chat">${CHAT.length?CHAT.map(renderBubble).join(""):`<div class="bubble bot">Merhaba! Portföyün ve piyasa hakkında bana soru sorabilirsin. Yanıtlarım sadece elimizdeki verilere dayanır, yatırım tavsiyesi değildir.</div>`}</div>`;
  scrollChat()}
function renderBubble(m){return`<div class="bubble ${m.rol}">${esc(m.metin)}</div>`}
function scrollChat(){const c=document.getElementById("chat");if(c)window.scrollTo(0,document.body.scrollHeight)}
function askPreset(p){document.getElementById("chat-text").value=p;sendChat()}
async function sendChat(){const inp=document.getElementById("chat-text");const q=(inp.value||"").trim();if(!q)return;
  inp.value="";CHAT.push({rol:"user",metin:q});
  const c=document.getElementById("chat");c.insertAdjacentHTML("beforeend",renderBubble({rol:"user",metin:q}));
  c.insertAdjacentHTML("beforeend",`<div class="bubble bot typing" id="typing">yazıyor…</div>`);scrollChat();
  try{const r=await fetch("/api/ask",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({soru:q,kullanici:CUR_USER})});const d=await r.json();
    document.getElementById("typing")?.remove();
    const a=d.cevap||"Yanıt üretemedim.";CHAT.push({rol:"bot",metin:a});
    c.insertAdjacentHTML("beforeend",renderBubble({rol:"bot",metin:a}));scrollChat();
  }catch(e){document.getElementById("typing")?.remove();
    c.insertAdjacentHTML("beforeend",renderBubble({rol:"bot",metin:"Bağlantı hatası."}))}}

/* ============ HISSE DETAY ============ */
function sparkline(pts){if(!pts||pts.length<2)return"";const cs=pts.map(p=>p.c);
  const mn=Math.min(...cs),mx=Math.max(...cs),W=320,H=70,n=cs.length;
  const x=i=>i/(n-1)*W,y=c=>mx===mn?H/2:H-4-(c-mn)/(mx-mn)*(H-8);
  const dpath=cs.map((c,i)=>`${i?'L':'M'}${x(i).toFixed(1)} ${y(c).toFixed(1)}`).join(" ");
  const up=cs[cs.length-1]>=cs[0],col=up?"var(--green)":"var(--red)";
  return`<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none" style="margin-top:6px">
    <path d="${dpath}" fill="none" stroke="${col}" stroke-width="2"/></svg>`}
async function openStock(k){const s=STOCK_INDEX[k];const ticker=s?s.ticker:k;const market=s?(s.market||"bist"):"bist";
  ovShow(`<div class="spin">Yükleniyor…</div>`);
  try{const d=await(await fetch(`/api/stock/${encodeURIComponent(ticker)}?market=${market}`)).json();
    const lv=d.seviyeler||{};const an=d.analist;
    let h=`<div class="row"><div><h2 style="font-size:22px;font-weight:800">${esc(d.isim)}</h2>
        <div class="tick">${esc(d.ticker)}${mtag(d.market)}</div></div>${badge(d.etiket,d.renk)}</div>
      <div class="row" style="margin-top:12px"><div><div class="price" style="font-size:24px">${money(d.fiyat,d.para_birimi)}</div>
        <div class="chg ${signCls(d.gunluk)}">${pct(d.gunluk)}</div></div>
        <div style="text-align:right"><span class="chip ${d.risk_renk}">${esc(d.risk_etiket)}</span>
          <div class="c-gray" style="font-size:11.5px;margin-top:6px">Güven: ${esc(d.guven)}</div></div></div>
      ${sparkline(d.grafik)}
      <div class="sec-title">Bot yorumu</div><div class="quote">${esc(d.yorum)}</div>
      ${d.risk_sebep&&d.risk_sebep!=="—"?`<div class="sec-title">Risk sebebi</div><div class="quote">${esc(d.risk_sebep)}</div>`:""}
      <div class="sec-title">Önemli seviyeler</div>
      <div class="lvls"><div class="lvl"><div class="k">Destek</div><div class="v c-green">${money(lv.destek,d.para_birimi)}</div></div>
        <div class="lvl"><div class="k">Direnç</div><div class="v c-red">${money(lv.direnc,d.para_birimi)}</div></div>
        <div class="lvl"><div class="k">Hedef</div><div class="v c-green">${money(lv.hedef,d.para_birimi)}</div></div>
        <div class="lvl"><div class="k">Stop-loss</div><div class="v c-red">${money(lv.stop,d.para_birimi)}</div></div></div>`;
    if(an&&an.available){const kc=an.konsensus==="AL"?"green":an.konsensus==="SAT"?"red":"yellow";
      h+=`<div class="sec-title">Analist konsensüsü</div><div class="anbox">
        <div class="row"><span>${an.analist_sayisi} kurum · <b class="c-${kc==='green'?'green':kc==='red'?'red':'yellow'}">${esc(an.konsensus)}</b></span>
          <span>Ort. hedef <b>${fmt(an.ortalama_hedef)} ₺</b> <span class="${signCls(an.potansiyel)}">${pct(an.potansiyel)}</span></span></div>
        <div class="row" style="margin-top:11px;font-size:12.5px"><span class="c-green">AL ${an.al_sayisi}</span>
          <span class="c-yellow">TUT ${an.tut_sayisi}</span><span class="c-red">SAT ${an.sat_sayisi}</span></div></div>`;}
    if(d.haberler&&d.haberler.length){h+=`<div class="sec-title">Haber etkisi</div>`+
      d.haberler.map(n=>`<div class="news-hero" style="margin-bottom:10px"><div class="banner" style="height:60px;font-size:28px;background:${n.gradient}">${n.ikon}</div>
        <div class="body" style="padding:12px"><div class="baslik" style="font-size:13.5px;margin:0 0 6px">${esc(n.baslik)}</div>
          <div class="meta"><span class="chip">${esc(n.kategori)}</span>${n.tarih?`<span class="chip">${esc(n.tarih)}</span>`:""}
            ${n.url?`<a class="kaplink" href="${esc(n.url)}" target="_blank">🔗</a>`:""}</div></div></div>`).join("");}
    if(d.benzer_donem)h+=`<div class="sec-title">Benzer dönem</div><div class="quote">${esc(d.benzer_donem)}</div>`;

/* ============ UZUN BASMA + AKSIYON MENUSU ============ */
let lpT=null,lpFired=false,lpMoved=false,lpX=0,lpY=0,lpTs=0,menuAt=0;
function lpStart(e,k,ctx){if(e.type==="mousedown"&&(Date.now()-lpTs)<700)return;if(e.type==="touchstart")lpTs=Date.now();
  lpFired=false;lpMoved=false;const p=e.touches?e.touches[0]:e;lpX=p.clientX;lpY=p.clientY;clearTimeout(lpT);
  lpT=setTimeout(()=>{lpT=null;lpFired=true;if(navigator.vibrate)try{navigator.vibrate(15)}catch(_){}openMenu(k,ctx)},500)}
function lpMove(e){const p=e.touches?e.touches[0]:e;if(Math.abs(p.clientX-lpX)>10||Math.abs(p.clientY-lpY)>10){lpMoved=true;if(lpT){clearTimeout(lpT);lpT=null}}}
function lpEnd(e){if(lpT){clearTimeout(lpT);lpT=null}if(lpFired&&e&&e.cancelable&&e.preventDefault)e.preventDefault()}
function lpTap(e,k){if(lpFired||lpMoved){if(e&&e.preventDefault)e.preventDefault();lpFired=false;lpMoved=false;return}openStock(k)}
function lpAttr(k,ctx){return`ontouchstart="lpStart(event,'${k}','${ctx}')" ontouchmove="lpMove(event)" ontouchend="lpEnd(event)" ontouchcancel="lpEnd(event)" onmousedown="lpStart(event,'${k}','${ctx}')" onmousemove="lpMove(event)" onmouseup="lpEnd(event)" onmouseleave="lpEnd(event)" oncontextmenu="event.preventDefault();return false" onclick="lpTap(event,'${k}')"`}
function openMenu(k,ctx){const s=STOCK_INDEX[k];if(!s)return;menuAt=Date.now();
  document.getElementById("menu-head").textContent=`${s.ticker} · ${s.isim}`;
  document.getElementById("menu-body").innerHTML=
    `<button onclick="actAdd('${k}')">➕ Takip Listesine Ekle</button>
     <button onclick="actAnalyze('${k}')">🤖 AI ile Analiz Et</button>`;
  document.getElementById("menu-scrim").classList.add("open");document.getElementById("menu").classList.add("open")}
function closeMenu(){document.getElementById("menu-scrim").classList.remove("open");document.getElementById("menu").classList.remove("open")}
function menuScrimClose(){if(Date.now()-menuAt<400)return;closeMenu()}
async function actAdd(k){const s=STOCK_INDEX[k];closeMenu();try{await fetch("/api/watchlist/add",{method:"POST",
  headers:{"Content-Type":"application/json"},body:JSON.stringify({ticker:s.ticker,market:s.market,isim:s.isim,cg_id:s.cg_id||""})});
  toast(`${s.ticker} takibe eklendi`);loaded.radar=false;if(curTab==="radar")loadRadar()}catch(e){toast("Eklenemedi")}}
function actAnalyze(k){closeMenu();openStock(k)}

/* ============ PORTFOY EKLEME ============ */
let PF_CUR="TL",PF_HOLD=[];
function openPf(){if(!CUR_USER){toast("Önce kullanıcı seç");openUserPick();return}
  ["pf-ticker","pf-adet","pf-fiyat"].forEach(i=>document.getElementById(i).value="");pfCur("TL");
  document.getElementById("pf-preview").innerHTML="";document.getElementById("pf-status").style.display="none";PF_HOLD=[];
  document.getElementById("pf-scrim").classList.add("open");document.getElementById("pf-sheet").classList.add("open")}
function closePf(){document.getElementById("pf-scrim").classList.remove("open");document.getElementById("pf-sheet").classList.remove("open")}
function pfCur(c){PF_CUR=c;document.getElementById("pf-tl").classList.toggle("active",c==="TL");document.getElementById("pf-usd").classList.toggle("active",c==="USD")}
async function pfReload(){loaded.portfoy=false;loaded.bugun=false;
  if(curTab==="portfoy")await loadPortfoy();if(curTab==="bugun")await loadBugun()}
async function pfRemove(id,t){if(!confirm(`${t} portföyden silinsin mi?`))return;
  try{const r=await fetch("/api/portfolio/remove",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({id})});
    if((await r.json()).ok){toast(`${t} silindi`);pfReload()}else toast("Silinemedi")}catch(e){toast("Silinemedi")}}
function pfHandleFile(e){const files=Array.from(e.target.files||[]);e.target.value="";if(!files.length)return;
  const st=document.getElementById("pf-status");st.style.display="block";st.textContent=`📷 ${files.length} fotoğraf okunuyor…`;
  document.getElementById("pf-preview").innerHTML="";
  Promise.all(files.map(f=>new Promise(res=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>res(null);r.readAsDataURL(f)})))
    .then(async imgs=>{try{const r=await fetch("/api/portfolio/parse-image",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({images:imgs.filter(Boolean)})});const d=await r.json();
      if(!d.ok){st.textContent="Okunamadı: "+(d.hata||"");return}st.style.display="none";pfPrev(d.holdings||[])}
    catch(e){st.textContent="Hata: işlenemedi."}})}
function pfPrev(hold){const box=document.getElementById("pf-preview");PF_HOLD=hold.filter(h=>h.ticker&&h.adet!=null&&h.fiyat!=null);
  if(!PF_HOLD.length){box.innerHTML=`<div class="pf-prev">Fotoğrafta hisse okunamadı</div>`;return}
  box.innerHTML=`<div class="pf-prev"><div style="color:#ccc;font-size:13px;font-weight:700;padding:8px 0">Okunan bilgiler</div>
    ${PF_HOLD.map(h=>`<div class="pr-row"><span><b>${esc(h.ticker)}</b> · ${fmt(h.adet,0)} adet</span>
      <span class="c-gray">${money(h.fiyat,h.para_birimi==="USD"?"$":"₺")}</span></div>`).join("")}</div>
    <button class="btn-primary" onclick="pfConfirm()">Onayla ve Ekle (${PF_HOLD.length})</button>`}
async function pfConfirm(){let ok=0;for(const h of PF_HOLD){try{const r=await fetch("/api/portfolio/add",{method:"POST",
  headers:{"Content-Type":"application/json"},body:JSON.stringify({kullanici:CUR_USER,ticker:h.ticker,adet:h.adet,alim_fiyati:h.fiyat,para_birimi:h.para_birimi||"TL"})});
  if((await r.json()).ok)ok++}catch(e){}}toast(ok+" hisse eklendi");closePf();pfReload()}
async function pfManualAdd(){const t=document.getElementById("pf-ticker").value.trim().toUpperCase();
  const a=parseFloat(document.getElementById("pf-adet").value),f=parseFloat(document.getElementById("pf-fiyat").value);
  if(!t||isNaN(a)||isNaN(f)){toast("Kod, adet ve fiyat gerekli");return}
  try{const r=await fetch("/api/portfolio/add",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({kullanici:CUR_USER,ticker:t,adet:a,alim_fiyati:f,para_birimi:PF_CUR})});const d=await r.json();
    if(d.ok){toast(t+" eklendi");closePf();pfReload()}else toast(d.hata||"Eklenemedi")}catch(e){toast("Eklenemedi")}}

/* ---- baslat ---- */
initUser();
load("bugun");
</script>

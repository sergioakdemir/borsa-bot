<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<title>Borsa Bot</title>
<style>
  :root {
    --bg: #0d0d0d;
    --card: #1a1a1a;
    --card-2: #141414;
    --border: #2a2a2a;
    --text: #f4f4f4;
    --muted: #8a8a8a;
    --muted-2: #5f5f5f;
    --green: #00c853;
    --yellow: #f5a623;
    --red: #ff4757;
    --blue: #4aa8ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--text); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    line-height: 1.45;
    padding-bottom: calc(72px + env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; }

  /* ---------- ust serit ---------- */
  header {
    position: sticky; top: 0; z-index: 30;
    background: rgba(13,13,13,.88);
    backdrop-filter: saturate(140%) blur(12px);
    padding: calc(16px + env(safe-area-inset-top)) 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  .hdr-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .hdr-title { font-size: 22px; font-weight: 700; letter-spacing: .2px; }
  .hdr-strip {
    display: flex; align-items: center; gap: 14px;
    font-size: 13.5px; color: var(--muted); margin-top: 7px;
  }
  .hdr-strip .firsat { color: var(--green); font-weight: 600; }
  .hdr-strip .uyari  { color: var(--yellow); font-weight: 600; }
  .hdr-strip .dot { color: var(--muted-2); }
  .hdr-actions { display: flex; align-items: center; gap: 4px; }

  /* ---------- kullanici cipi (header sag ust) ---------- */
  .userchip {
    display: flex; align-items: center; gap: 7px;
    background: var(--card); border: 1px solid var(--border); color: var(--text);
    border-radius: 999px; padding: 4px 11px 4px 4px; font-size: 13px; font-weight: 700;
    margin-right: 2px;
  }
  .userchip:active { background: #202020; }
  .uc-av, .up-av {
    border-radius: 999px; background: var(--green); color: #0d0d0d;
    font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .uc-av { width: 24px; height: 24px; font-size: 12px; }
  .userchip.u-yigit .uc-av, .up-av.u-yigit { background: var(--blue); }

  /* ---------- kullanici secim ekrani ---------- */
  .userpick {
    position: fixed; inset: 0; z-index: 70; background: rgba(8,8,8,.94);
    backdrop-filter: blur(7px); display: none;
    align-items: center; justify-content: center; padding: 24px;
  }
  .userpick.open { display: flex; }
  .up-card {
    width: 100%; max-width: 360px; background: var(--card);
    border: 1px solid var(--border); border-radius: 22px; padding: 28px 22px;
    animation: fade .25s ease;
  }
  .up-title { font-size: 23px; font-weight: 800; text-align: center; letter-spacing: .2px; }
  .up-sub { font-size: 13.5px; color: var(--muted); text-align: center; margin: 7px 0 24px; }
  .up-btn {
    width: 100%; display: flex; align-items: center; gap: 14px;
    background: var(--card-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 16px; padding: 15px 16px; font-size: 17px; font-weight: 700; margin-bottom: 12px;
  }
  .up-btn:active { background: #202020; border-color: var(--green); }
  .up-av { width: 36px; height: 36px; font-size: 16px; }
  .up-close { width: 100%; background: none; border: none; color: var(--muted);
    font-size: 14px; font-weight: 600; padding: 12px; margin-top: 6px; }

  .iconbtn {
    position: relative; background: none; border: none; color: var(--text);
    font-size: 22px; line-height: 1; padding: 7px; border-radius: 12px;
  }
  .iconbtn:active { background: var(--card); }
  .iconbtn .count {
    position: absolute; top: 0; right: 0;
    min-width: 18px; height: 18px; padding: 0 4px;
    background: var(--red); color: #fff; font-size: 11px; font-weight: 700;
    border-radius: 999px; display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--bg);
  }

  main { padding: 18px 16px 8px; }
  .page { display: none; }
  .page.active { display: block; animation: fade .25s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ---------- bolum basligi ---------- */
  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    margin: 6px 2px 12px;
  }
  .section-head h2 { font-size: 19px; font-weight: 800; letter-spacing: .2px; }
  .section-head .cnt { font-size: 13px; color: var(--muted); font-weight: 500; }
  .section-head.toggle { cursor: pointer; }
  .section-head .chev { color: var(--muted); font-size: 14px; transition: transform .2s; }
  .section-head.collapsed .chev { transform: rotate(-90deg); }
  .addbtn {
    background: var(--card); border: 1px solid var(--border); color: var(--green);
    width: 30px; height: 30px; border-radius: 999px; font-size: 20px; font-weight: 700;
    line-height: 1; display: flex; align-items: center; justify-content: center;
  }
  .addbtn:active { background: rgba(0,200,83,.12); border-color: var(--green); }

  /* ---------- firsat serisi (yatay kaydirma) ---------- */
  .firsat-wrap { margin: 2px 0 22px; }
  .firsat-lbl { display: flex; align-items: center; gap: 7px; margin: 0 2px 10px;
    font-size: 13px; font-weight: 700; color: var(--green); letter-spacing: .3px; }
  .firsat-strip {
    display: flex; gap: 11px; overflow-x: auto; padding: 2px 2px 6px;
    scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
  }
  .firsat-strip::-webkit-scrollbar { display: none; }
  .firsat-card {
    flex: 0 0 auto; width: 175px; scroll-snap-align: start;
    background: linear-gradient(160deg, #16271b, #131a16);
    border: 1px solid rgba(0,200,83,.32); border-radius: 16px; padding: 13px 14px;
  }
  .firsat-card:active { transform: scale(.985); }
  .firsat-card .ftop { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .firsat-card .ftick { font-size: 15px; font-weight: 800; letter-spacing: .3px; }
  .firsat-card .fwhy { font-size: 12px; color: #cfe9d6; margin-top: 9px; line-height: 1.45;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
  .firsat-card .fprice { font-size: 12.5px; color: var(--muted); margin-top: 9px; font-weight: 600; }

  /* ---------- hisse kart ---------- */
  /* uzun basilabilen ogeler: tarayicinin secim/callout jestini kapat */
  .card, .wl-row, .firsat-card {
    -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none;
    -webkit-touch-callout: none;
  }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; padding: 16px 18px; margin-bottom: 12px;
    transition: border-color .15s, transform .08s;
  }
  .card.tap:active { transform: scale(.992); border-color: #3a3a3a; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .name { font-size: 14px; font-weight: 700; letter-spacing: .1px; }
  .tick { font-size: 11.5px; color: var(--muted); margin-top: 2px; font-weight: 500; letter-spacing: .4px; }
  .mtag { font-size: 9.5px; font-weight: 800; letter-spacing: .5px; padding: 2px 6px; border-radius: 6px;
    background: #242424; color: var(--muted); margin-left: 6px; vertical-align: middle; }
  .mtag.abd { color: var(--blue); background: rgba(74,168,255,.12); }
  .mtag.kripto { color: #f7931a; background: rgba(247,147,26,.12); }
  .price-wrap { text-align: right; flex-shrink: 0; }
  .price { font-size: 15px; font-weight: 700; letter-spacing: .2px; }
  .chg { font-size: 12.5px; font-weight: 600; margin-top: 2px; }
  .muted-note { font-size: 11.5px; color: var(--muted-2); font-weight: 500; }

  .badge {
    font-size: 12px; font-weight: 800; letter-spacing: .6px;
    padding: 5px 12px; border-radius: 999px; border: 1px solid transparent; white-space: nowrap;
  }
  .badge.green  { color: var(--green);  background: rgba(0,200,83,.12);  border-color: rgba(0,200,83,.35); }
  .badge.yellow { color: var(--yellow); background: rgba(245,166,35,.12); border-color: rgba(245,166,35,.35); }
  .badge.red    { color: var(--red);    background: rgba(255,71,87,.12);  border-color: rgba(255,71,87,.35); }

  .card-foot {
    display: flex; align-items: center; gap: 10px;
    margin-top: 14px; padding-top: 13px; border-top: 1px solid var(--border);
    font-size: 11px; color: var(--muted);
  }
  .card-foot .sep { color: var(--muted-2); }
  .card-foot b { color: var(--text); font-weight: 600; }

  /* ---------- takip listesi (ince ayirici cizgiler) ---------- */
  .wl { border: 1px solid var(--border); border-radius: 16px; overflow: hidden; background: var(--card); }
  .wl-row {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    transition: background .12s;
  }
  .wl-row:last-child { border-bottom: none; }
  .wl-row:active { background: #202020; }
  .wl-row .wl-r { text-align: right; flex-shrink: 0; display: flex; align-items: center; gap: 11px; }

  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .flat { color: var(--muted); }

  /* ---------- ozet kart (portfoy/karne) ---------- */
  .hero {
    background: linear-gradient(160deg, #1d1d1d, #161616);
    border: 1px solid var(--border); border-radius: 20px;
    padding: 20px; margin-bottom: 18px;
  }
  .hero .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }
  .hero .big { font-size: 34px; font-weight: 800; margin: 6px 0 4px; letter-spacing: .3px; }
  .hero .big.sm { font-size: 28px; }
  .hero .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 18px; }
  .hero .grid .label { margin-bottom: 4px; }
  .hero .grid b { display: block; font-size: 17px; font-weight: 700; }

  /* ---------- portfoy pozisyon ---------- */
  .pos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 14px; margin-top: 14px;
              padding-top: 14px; border-top: 1px solid var(--border); }
  .pos-grid .cell .k { font-size: 11.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .pos-grid .cell .v { font-size: 15.5px; font-weight: 600; margin-top: 3px; }

  /* ---------- karne defter ---------- */
  .simnote {
    display: flex; gap: 9px; align-items: flex-start;
    background: rgba(245,166,35,.09); border: 1px solid rgba(245,166,35,.3);
    color: var(--yellow); border-radius: 13px; padding: 11px 13px; margin-bottom: 16px;
    font-size: 12.5px; line-height: 1.5; font-weight: 600;
  }
  .ledger { display: flex; align-items: center; gap: 13px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 14px 16px; margin-bottom: 11px; }
  .ledger.tap:active { transform: scale(.992); border-color: #3a3a3a; }
  .ledger .mark { font-size: 22px; line-height: 1; flex-shrink: 0; }
  .ledger .body { flex: 1; min-width: 0; }
  .ledger .line1 { font-size: 15px; font-weight: 600; }
  .ledger .line1 .date { color: var(--muted); font-weight: 500; }
  .ledger .line1 .verb { color: var(--muted); }
  .ledger .line2 { font-size: 12.5px; color: var(--muted); margin-top: 3px; }
  .ledger .res { font-size: 17px; font-weight: 800; flex-shrink: 0; }

  /* ---------- alt kayan panel (detay / aksiyon / arama) ---------- */
  .scrim {
    position: fixed; inset: 0; z-index: 40; background: rgba(0,0,0,.6);
    opacity: 0; pointer-events: none; transition: opacity .25s;
    cursor: pointer;  /* iOS Safari: <div> tiklamasinin fire etmesi icin gerekli */
  }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 41;
    background: var(--card); border-top: 1px solid var(--border);
    border-radius: 22px 22px 0 0; padding: 8px 20px calc(26px + env(safe-area-inset-bottom));
    transform: translateY(100%); transition: transform .3s cubic-bezier(.32,.72,0,1);
    max-height: 86vh; overflow-y: auto;
  }
  .sheet.open { transform: none; }
  .grabber { width: 42px; height: 5px; background: #3a3a3a; border-radius: 999px; margin: 8px auto 18px; }
  .sheet h3 { font-size: 21px; font-weight: 800; }
  .sheet .sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .sheet-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 4px; }
  .block-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; margin: 22px 0 10px; }
  .quote { font-size: 15.5px; line-height: 1.6; color: #dcdcdc; }

  .explain-btn {
    margin-top: 14px; width: 100%; background: var(--card-2);
    border: 1px solid var(--border); color: var(--blue);
    border-radius: 13px; padding: 12px; font-size: 14px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .explain-btn:active { background: #1d1d1d; }
  .explain-body {
    margin-top: 12px; background: var(--card-2); border: 1px solid var(--border);
    border-radius: 13px; padding: 15px 16px; font-size: 14.5px; line-height: 1.65;
    color: #dcdcdc; white-space: pre-line;
  }

  /* puan barlari */
  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 11px; }
  .bar-row .k { width: 110px; font-size: 13.5px; color: var(--muted); flex-shrink: 0; }
  .bar { flex: 1; height: 8px; background: #262626; border-radius: 999px; overflow: hidden; }
  .bar > i { display: block; height: 100%; border-radius: 999px; background: var(--green); }
  .bar-row .n { width: 38px; text-align: right; font-size: 13.5px; font-weight: 700; }

  .news {
    background: var(--card-2); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px;
  }
  .news .baslik { font-size: 14.5px; font-weight: 600; line-height: 1.5; }
  .news .tags { display: flex; gap: 8px; margin-top: 9px; }
  .tag { font-size: 11px; font-weight: 700; letter-spacing: .4px; padding: 3px 9px; border-radius: 999px;
         background: #242424; color: var(--muted); }
  .tag.warn { color: var(--yellow); background: rgba(245,166,35,.12); }
  .tag.fresh { color: var(--green); background: rgba(0,200,83,.12); }

  /* ---------- aksiyon menusu (uzun basinca) ---------- */
  /* arama modali z-index 50; menu onun da ustunde olmali ki gorunsun */
  #menu-scrim { z-index: 54; }
  .menu {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 55;
    background: var(--card); border-top: 1px solid var(--border);
    border-radius: 22px 22px 0 0; padding: 8px 16px calc(20px + env(safe-area-inset-bottom));
    transform: translateY(100%); transition: transform .25s cubic-bezier(.32,.72,0,1);
  }
  .menu.open { transform: none; }
  .menu .mhead { text-align: center; font-size: 13px; color: var(--muted); padding: 8px 0 14px; font-weight: 600; }
  .menu button {
    width: 100%; background: var(--card-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 13px; padding: 15px; font-size: 15px; font-weight: 600; margin-bottom: 9px;
    display: flex; align-items: center; gap: 11px;
  }
  .menu button:active { background: #202020; }
  .menu button.danger { color: var(--red); }
  .menu button .mi { font-size: 18px; }

  /* ---------- arama modali (tam ekran) ---------- */
  .searchmodal {
    position: fixed; inset: 0; z-index: 50; background: var(--bg);
    display: flex; flex-direction: column;
    transform: translateY(100%); transition: transform .28s cubic-bezier(.32,.72,0,1);
  }
  .searchmodal.open { transform: none; }
  .sm-head {
    display: flex; align-items: center; gap: 10px;
    padding: calc(14px + env(safe-area-inset-top)) 16px 12px; border-bottom: 1px solid var(--border);
  }
  .sm-head input {
    flex: 1; background: var(--card-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 12px; padding: 11px 14px; font-size: 14px; outline: none;
  }
  .sm-head input:focus { border-color: var(--green); }
  .sm-head .smclose { background: none; border: none; color: var(--muted); font-size: 16px; font-weight: 600; padding: 6px; }
  /* kompakt pazar sekmeleri (sikisik degil ama kucuk) */
  .sm-tabs { display: flex; gap: 7px; padding: 10px 16px 6px; }
  .sm-tabs button {
    flex: 0 0 auto; background: var(--card); border: 1px solid var(--border); color: var(--muted);
    border-radius: 999px; padding: 7px 15px; font-size: 12.5px; font-weight: 700; letter-spacing: .3px;
  }
  .sm-tabs button.active { border-color: var(--green); color: var(--green); background: rgba(0,200,83,.08); }
  .sm-body { flex: 1; overflow-y: auto; padding: 4px 16px 24px; }
  .sm-hint { color: var(--muted-2); font-size: 13px; padding: 22px 4px; text-align: center; }
  .soon { text-align: center; color: var(--muted); padding: 30px 16px; font-size: 14px; }

  .empty { text-align: center; color: var(--muted); padding: 50px 16px; font-size: 15px; }
  .spacer { height: 10px; }

  /* ---------- bildirim paneli ---------- */
  .notif {
    position: fixed; top: 0; right: 0; bottom: 0; width: min(380px, 88vw); z-index: 41;
    background: var(--card); border-left: 1px solid var(--border);
    transform: translateX(100%); transition: transform .3s cubic-bezier(.32,.72,0,1);
    padding: calc(20px + env(safe-area-inset-top)) 18px 20px; overflow-y: auto;
  }
  .notif.open { transform: none; }
  .notif h3 { font-size: 19px; font-weight: 800; margin-bottom: 16px; }
  .alert { display: flex; gap: 12px; padding: 13px 0; border-bottom: 1px solid var(--border); }
  .alert .ico2 { font-size: 18px; line-height: 1.4; flex-shrink: 0; }
  .alert .at { font-size: 14px; }
  .alert .at b { font-weight: 700; }
  .alert .am { font-size: 13px; color: var(--muted); margin-top: 2px; line-height: 1.45; }
  .alert .ad { font-size: 11px; color: var(--muted-2); margin-top: 4px; }

  /* ---------- portfoy ekleme modali ---------- */
  .field { margin-bottom: 14px; }
  .field label {
    display: block; color: #cccccc; font-size: 13px; font-weight: 600;
    margin-bottom: 6px; letter-spacing: .2px;
  }
  .field input, .field select {
    width: 100%; background: var(--card-2); border: 1px solid var(--border); color: var(--text);
    border-radius: 12px; padding: 12px 14px; font-size: 14.5px; outline: none;
  }
  .field input:focus, .field select:focus { border-color: var(--green); }
  .field input::placeholder { color: var(--muted-2); }
  .seg { display: flex; gap: 8px; }
  .seg button {
    flex: 1; background: var(--card-2); border: 1px solid var(--border); color: var(--muted);
    border-radius: 12px; padding: 11px 0; font-size: 14px; font-weight: 700;
  }
  .seg button.active { border-color: var(--green); color: var(--green); background: rgba(0,200,83,.08); }
  .pf-photo {
    width: 100%; background: rgba(74,168,255,.1); border: 1px solid rgba(74,168,255,.42);
    color: var(--blue); border-radius: 14px; padding: 14px; font-size: 15px; font-weight: 700;
    display: flex; align-items: center; justify-content: center; gap: 9px;
  }
  .pf-photo:active { background: rgba(74,168,255,.18); }
  .pf-status { font-size: 13px; color: var(--muted); padding: 12px 2px; text-align: center; }
  .pf-or { text-align: center; color: var(--muted-2); font-size: 12px; margin: 16px 0 14px;
    letter-spacing: .5px; }
  .pf-prev { background: var(--card-2); border: 1px solid var(--border); border-radius: 14px;
    padding: 6px 14px; margin-bottom: 13px; }
  .pf-prev .pt { color: #cccccc; font-size: 13px; font-weight: 700; padding: 10px 0 4px; }
  .pr-row { display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
  .pr-row:last-child { border-bottom: none; }
  .pr-row .pr-r { color: var(--muted); font-weight: 600; }
  .btn-primary {
    width: 100%; background: var(--green); color: #06351b; border: none;
    border-radius: 14px; padding: 15px; font-size: 15.5px; font-weight: 800; margin-top: 4px;
  }
  .btn-primary:active { filter: brightness(.92); }
  .btn-primary:disabled { opacity: .5; }

  /* ---------- toast ---------- */
  .toast {
    position: fixed; left: 50%; bottom: calc(86px + env(safe-area-inset-bottom));
    transform: translateX(-50%) translateY(20px); z-index: 60;
    background: #232323; border: 1px solid var(--border); color: var(--text);
    padding: 11px 18px; border-radius: 999px; font-size: 13.5px; font-weight: 600;
    opacity: 0; pointer-events: none; transition: opacity .2s, transform .2s;
    max-width: 86vw;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ---------- alt nav ---------- */
  nav {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 35;
    display: flex; background: rgba(13,13,13,.94);
    backdrop-filter: blur(12px); border-top: 1px solid var(--border);

</style>
</head>

    <button class="up-btn" onclick="setUser('yigit')"><span class="up-av u-yigit">Y</span>Yiğit</button>

<script>
const HDR = { ana: "Ana", portfoy: "Portföy", karne: "Karne" };
const loaded = {};
let STOCK_INDEX = {};      // "market:ticker" -> kart (detay paneli icin)
let DECISION_INDEX = {};   // id -> gercek karar
let CUR_MARKET = "bist";

/* ---------- kullanici secimi ---------- */
const USERS = { serhat: {ad: "Serhat", av: "S"}, yigit: {ad: "Yiğit", av: "Y"} };
let CUR_USER = null;

function applyUserChip() {
  const u = USERS[CUR_USER];
  if (!u) return;
  document.getElementById("uc-av").textContent = u.av;
  document.getElementById("uc-name").textContent = u.ad;
  document.getElementById("userchip").classList.toggle("u-yigit", CUR_USER === "yigit");
}
function openUserPick() {
  document.getElementById("up-close").style.display = CUR_USER ? "block" : "none";
  document.getElementById("userpick").classList.add("open");
}
function closeUserPick() {
  if (!CUR_USER) return;                 // ilk acilista secim zorunlu
  document.getElementById("userpick").classList.remove("open");
}
function setUser(k) {
  if (!USERS[k]) return;
  CUR_USER = k;
  try { localStorage.setItem("bb_user", k); } catch (e) {}
  applyUserChip();
  document.getElementById("userpick").classList.remove("open");
  // portfoy kullaniciya bagli -> tazele
  loaded.portfoy = false;
  if (document.getElementById("page-portfoy").classList.contains("active")) loadPortfoy();
}
function initUser() {
  let u = null;
  try { u = localStorage.getItem("bb_user"); } catch (e) {}
  if (u && USERS[u]) { CUR_USER = u; applyUserChip(); }
  else { openUserPick(); }               // ilk acilis: secim ekrani
}

/* ---------- bicimlendirme ---------- */
function fmt(n, d=2) {
  if (n === null || n === undefined || isNaN(n)) return "—";
  return Number(n).toLocaleString("tr-TR", {minimumFractionDigits: d, maximumFractionDigits: d});
}
function signCls(n) {
  if (n === null || n === undefined || isNaN(n)) return "flat";
  return n > 0 ? "pos" : (n < 0 ? "neg" : "flat");
}
function pct(n) {
  if (n === null || n === undefined || isNaN(n)) return "—";
  return (n > 0 ? "+" : "") + fmt(n) + "%";
}
function money(n, birim) {
  if (n === null || n === undefined || isNaN(n)) return "—";
  birim = birim || "₺";
  return (birim === "$" ? "$" + fmt(n) : fmt(n) + " " + birim);
}
function empty(msg) { return `<div class="empty">${msg}</div>`; }
function esc(s) { return (s ?? "").toString().replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }
function key(s) { return (s.market || "bist") + ":" + s.ticker; }
function reg(s) { STOCK_INDEX[key(s)] = s; return key(s); }

let toastTimer = null;
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove("show"), 1900);
}

/* ---------- sekme ---------- */
function showTab(tab) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("page-" + tab).classList.add("active");
  document.querySelectorAll("nav button").forEach(b =>
    b.classList.toggle("active", b.dataset.tab === tab));
  document.getElementById("hdr-title").textContent = HDR[tab];
  if (!loaded[tab]) load(tab);
}
function load(tab) {
  loaded[tab] = true;
  ({ana: loadAna, portfoy: loadPortfoy, karne: loadKarne}[tab])();
}

/* ---------- ust serit ---------- */
async function loadSummary() {
  try {
    const s = await (await fetch("/api/summary")).json();
    document.getElementById("s-firsat").textContent = `${s.firsat} fırsat`;
    document.getElementById("s-uyari").textContent = `${s.uyari} uyarı`;
    const c = document.getElementById("bell-count");
    if (s.bildirim > 0) { c.textContent = s.bildirim; c.style.display = "flex"; }
    else c.style.display = "none";
  } catch (e) {}
}

/* ---------- uzun basma (long-press) yonetimi ----------
   Mobilde guvenilir calismasi icin pointer degil dogrudan touch olaylari
   kullanilir (tarayici secim/scroll jestinde pointercancel firlatip zamani
   iptal ediyordu). Secim/callout CSS ile (user-select/touch-callout: none)
   kapatildi; varsayilan menu de oncontextmenu ile engellenir. */
let lpTimer = null, lpFired = false, lpMoved = false, lpX = 0, lpY = 0, lpTouchTs = 0;
function lpStart(e, k, ctx) {
  // touchstart sonrasi sentezlenen mousedown'i yok say (cift tetikleme onleme)
  if (e.type === "mousedown" && (Date.now() - lpTouchTs) < 700) return;
  if (e.type === "touchstart") lpTouchTs = Date.now();
  lpFired = false; lpMoved = false;
  const p = e.touches ? e.touches[0] : e;
  lpX = p.clientX; lpY = p.clientY;
  clearTimeout(lpTimer);
  lpTimer = setTimeout(() => {
    lpTimer = null; lpFired = true;
    if (navigator.vibrate) { try { navigator.vibrate(15); } catch (_) {} }
    openMenu(k, ctx);
  }, 500);
}
function lpMoveH(e) {
  const p = e.touches ? e.touches[0] : e;
  if (Math.abs(p.clientX - lpX) > 10 || Math.abs(p.clientY - lpY) > 10) {
    lpMoved = true;                       // kaydirma: uzun basma sayilmaz
    if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
  }
}
function lpEnd(e) {
  if (lpTimer) { clearTimeout(lpTimer); lpTimer = null; }
  // uzun basma tetiklendiyse: parmak kalkinca olusan hayalet tikla(ma)yi engelle
  // (aksi halde menu scrim'ine dusup menuyu aninda kapatiyordu)
  if (lpFired && e && e.cancelable && e.preventDefault) e.preventDefault();
}
function lpTap(e, k) {                     // tek dokunus: uzun basma/kaydirma olduysa yut
  if (lpFired || lpMoved) {
    if (e && e.preventDefault) e.preventDefault();
    lpFired = false; lpMoved = false; return;
  }
  openSheet(k);
}
/* uzun basma + dokunma davranisini elemana baglayan ortak nitelik dizgesi.
   touch (mobil) ve mouse (masaustu) olaylari ayri ayri baglanir. */
function lpAttr(k, ctx) {
  return `ontouchstart="lpStart(event,'${k}','${ctx}')" ontouchmove="lpMoveH(event)" `
       + `ontouchend="lpEnd(event)" ontouchcancel="lpEnd(event)" `
       + `onmousedown="lpStart(event,'${k}','${ctx}')" onmousemove="lpMoveH(event)" `
       + `onmouseup="lpEnd(event)" onmouseleave="lpEnd(event)" `
       + `oncontextmenu="event.preventDefault();return false" `
       + `onclick="lpTap(event,'${k}')"`;
}

/* ---------- hisse kart (portfoyum) ---------- */
function richCard(s) {
  if (s.has_data === false) {
    const k = reg(s);
    return `
    <div class="card tap" ${lpAttr(k, 'home')}>
      <div class="card-top">
        <div><div class="name">${esc(s.isim)}</div><div class="tick">${esc(s.ticker)}</div></div>
        <span class="muted-note">Veri bekleniyor</span>
      </div>
    </div>`;
  }
  const k = reg(s);
  return `
    <div class="card tap" ${lpAttr(k, 'home')}>
      <div class="card-top">
        <div>
          <div class="name">${esc(s.isim)}</div>
          <div class="tick">${esc(s.ticker)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="price-wrap">
            <div class="price">${money(s.fiyat, s.para_birimi)}</div>
            <div class="chg ${signCls(s.gunluk)}">${pct(s.gunluk)}</div>
          </div>
          ${s.etiket ? `<span class="badge ${s.renk}">${s.etiket}</span>` : ""}
        </div>
      </div>
      <div class="card-foot">
        <span>Puan <b>${s.skor ?? "—"}</b></span><span class="sep">·</span>
        <span>Risk <b>${s.risk ?? "—"}</b></span><span class="sep">·</span>
        <span>Eminlik <b>${esc(s.eminlik)}</b></span>
      </div>
    </div>`;
}

/* ---------- takip listesi / arama sonucu satiri (ince ayirici) ----------
   ctx: 'watch' (takip listesi -> Cikar) veya 'search' (arama -> Ekle) */
function wlRow(s, ctx) {
  ctx = ctx || "watch";
  const k = reg(s);
  const mtag = s.market !== "bist"
    ? `<span class="mtag ${s.market}">${s.market === "abd" ? "ABD" : "KRP"}</span>` : "";
  const right = (s.has_data === false)
    ? `<span class="muted-note">Veri bekleniyor</span>`
    : `<div class="price-wrap">
         <div class="price">${money(s.fiyat, s.para_birimi)}</div>
         <div class="chg ${signCls(s.gunluk)}">${pct(s.gunluk)}</div>
       </div>
       ${s.etiket ? `<span class="badge ${s.renk}">${s.etiket}</span>` : ""}`;
  return `
    <div class="wl-row" ${lpAttr(k, ctx)}>
      <div><div class="name">${esc(s.isim)}${mtag}</div>
        <div class="tick">${esc(s.ticker)}</div></div>
      <div class="wl-r">${right}</div>
    </div>`;
}

/* ---------- firsat serisi karti ---------- */
function firsatCard(s) {
  const k = reg(s);
  return `
    <div class="firsat-card" ${lpAttr(k, 'firsat')}>
      <div class="ftop">
        <span class="ftick">${esc(s.ticker)}</span>
        <span class="badge ${s.renk}">${s.etiket}</span>
      </div>
      <div class="fwhy">${esc(s.firsat_neden) || esc(s.isim)}</div>
      <div class="fprice">${money(s.fiyat, s.para_birimi)} <span class="${signCls(s.gunluk)}">${pct(s.gunluk)}</span></div>
    </div>`;
}

/* ---------- ANA SAYFA ---------- */
async function loadAna() {
  const el = document.getElementById("page-ana");
  try {
    const d = await (await fetch("/api/stocks")).json();
    let html = "";

    // Firsat bolgesi (yatay serit) — yalniz puan 8+ AL kararlari
    if (d.firsatlar && d.firsatlar.length) {
      html += `<div class="firsat-wrap">
        <div class="firsat-lbl">⭐ Fırsat Bölgesi</div>
        <div class="firsat-strip">${d.firsatlar.map(firsatCard).join("")}</div>
      </div>`;
    }

    // Portfoyum
    html += `<div class="section-head"><h2>Portföyüm</h2>
             <span class="cnt">${d.portfoyum.length} hisse</span></div>`;
    html += d.portfoyum.length
      ? d.portfoyum.map(richCard).join("")
      : empty("Portföyünde hisse yok");

    // Takip Listesi (+ butonu, uzun basinca menu)
    html += `<div class="spacer"></div>
      <div class="section-head">
        <h2>Takip Listesi</h2>
        <button class="addbtn" onclick="openSearch()" aria-label="Takibe ekle">+</button>
      </div>`;
    html += d.takip.length
      ? `<div class="wl">${d.takip.map(s => wlRow(s, "watch")).join("")}</div>`
      : empty("Takip listen boş. Eklemek için + butonuna dokun.");

    el.innerHTML = html;
  } catch (e) { el.innerHTML = empty("Yüklenemedi"); }
}

/* ---------- ARAMA MODALI ---------- */
let searchTimer = null;
function openSearch() {
  document.getElementById("searchmodal").classList.add("open");
  setTimeout(() => document.getElementById("sm-input").focus(), 250);
}
function closeSearch() {
  document.getElementById("searchmodal").classList.remove("open");
}
function setMarket(m) {
  CUR_MARKET = m;
  ["bist", "abd", "kripto"].forEach(x =>
    document.getElementById("smt-" + x).classList.toggle("active", x === m));
  const inp = document.getElementById("sm-input");
  inp.placeholder = m === "bist" ? "BIST hisse adı / kod…"
                  : m === "abd" ? "ABD hisse (AAPL, TSLA, NVDA…)"
                  : "Kripto (BTC, ETH, BNB…)";
  doSearch(inp.value);
}
function doSearch(q) {
  clearTimeout(searchTimer);
  const res = document.getElementById("sm-body");
  q = (q || "").trim();
  if (q.length < 1) { res.innerHTML = `<div class="sm-hint">Aramak için bir şeyler yazın.</div>`; return; }
  res.innerHTML = `<div class="sm-hint">Aranıyor…</div>`;
  searchTimer = setTimeout(async () => {
    try {
      const list = await (await fetch(
        `/api/search?market=${CUR_MARKET}&q=` + encodeURIComponent(q))).json();
      res.innerHTML = list.length
        ? `<div class="wl">${list.map(s => wlRow(s, "search")).join("")}</div>`
        : `<div class="sm-hint">"${esc(q)}" için sonuç yok.</div>`;
    } catch (e) { res.innerHTML = `<div class="sm-hint">Arama yapılamadı.</div>`; }
  }, 280);
}

/* ---------- AKSIYON MENUSU (uzun basinca) ---------- */
let menuOpenedAt = 0;
function openMenu(k, ctx) {
  const s = STOCK_INDEX[k];
  if (!s) return;
  menuOpenedAt = Date.now();
  let btns = "";
  if (ctx === "watch") {
    btns += `<button class="danger" onclick="actRemove('${k}')"><span class="mi">🗑️</span>Takipten Çıkar</button>`;
    btns += `<button onclick="actAnalyze('${k}')"><span class="mi">🤖</span>AI ile Analiz Et</button>`;
  } else {  // search / firsat / home
    btns += `<button onclick="actAdd('${k}')"><span class="mi">➕</span>Takip Listesine Ekle</button>`;
    btns += `<button onclick="actAnalyze('${k}')"><span class="mi">🤖</span>AI ile Analiz Et</button>`;
  }
  document.getElementById("menu-head").textContent = `${s.ticker} · ${s.isim}`;
  document.getElementById("menu-body").innerHTML = btns;
  document.getElementById("menu-scrim").classList.add("open");
  document.getElementById("menu").classList.add("open");
}
function closeMenu() {
  document.getElementById("menu-scrim").classList.remove("open");
  document.getElementById("menu").classList.remove("open");
}
/* scrim'e dokununca kapat — ama acilistan hemen sonraki hayalet tikla(ma)yi yut */
function menuScrimClose() {
  if (Date.now() - menuOpenedAt < 400) return;
  closeMenu();
}
async function actAdd(k) {
  const s = STOCK_INDEX[k]; closeMenu();
  try {
    await fetch("/api/watchlist/add", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ticker: s.ticker, market: s.market, isim: s.isim, cg_id: s.cg_id || ""})
    });
    toast(`${s.ticker} takibe eklendi`);
    loaded.ana = false;
    if (document.getElementById("page-ana").classList.contains("active")) loadAna();
  } catch (e) { toast("Eklenemedi"); }
}
async function actRemove(k) {
  const s = STOCK_INDEX[k]; closeMenu();
  try {
    await fetch("/api/watchlist/remove", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ticker: s.ticker, market: s.market})
    });
    toast(`${s.ticker} takipten çıkarıldı`);
    loaded.ana = false;
    if (document.getElementById("page-ana").classList.contains("active")) loadAna();
  } catch (e) { toast("Çıkarılamadı"); }
}
function actAnalyze(k) { closeMenu(); closeSearch(); openSheet(k); }

/* ---------- DETAY PANELI ---------- */
function bar(k, v) {
  return `<div class="bar-row"><span class="k">${k}</span>
    <span class="bar"><i style="width:${(v/10*100)}%"></i></span>
    <span class="n">${v}/10</span></div>`;
}
function openSheet(k) {
  const s = STOCK_INDEX[k];
  if (!s) return;
  let body;
  if (s.market === "bist" && s.has_data !== false) {
    const pd = s.puan_detay || {};
    const h = s.son_haber;
    let news = "";
    if (h) {
      const fresh = (h.tazelik || "").toUpperCase() === "YENI";
      const unpriced = (h.fiyatlanma || "").toUpperCase() === "FIYATLANMADI";
      news = `<div class="block-title">Son KAP Haberi</div>
        <div class="news"><div class="baslik">${esc(h.baslik)}</div>
          <div class="tags">
            ${h.tarih ? `<span class="tag">${esc(h.tarih)}</span>` : ""}
            ${h.tazelik ? `<span class="tag ${fresh ? "fresh" : ""}">${esc(h.tazelik)}</span>` : ""}
            ${unpriced ? `<span class="tag warn">FİYATLANMADI</span>` : ""}
          </div></div>`;
    }
    body = `
      <div class="sheet-row">
        <div><h3>${esc(s.isim)}</h3><div class="sub">${esc(s.ticker)} · ${money(s.fiyat, s.para_birimi)}
          <span class="${signCls(s.gunluk)}">${pct(s.gunluk)}</span></div></div>
        <span class="badge ${s.renk}">${s.etiket}</span>
      </div>
      <div class="block-title">AI Özeti</div>
      <div class="quote">${esc(s.ozet) || esc(s.yorum) || "Yorum bulunmuyor."}</div>
      <button class="explain-btn" id="explain-btn" onclick="toggleExplain()">
        💡 <span>Bana açıkla</span></button>
      <div class="explain-body" id="explain-body" style="display:none">${esc(s.aciklama)}</div>
      <div class="block-title">Puan Detayı</div>
      ${bar("Şirket sağlığı", pd.sirket_sagligi ?? 0)}
      ${bar("Fiyat", pd.fiyat ?? 0)}
      ${bar("Piyasa", pd.piyasa ?? 0)}
      ${news}`;
  } else {
    // ABD / Kripto / veri bekleyen BIST
    const mlabel = s.market === "abd" ? "ABD borsası" : s.market === "kripto" ? "Kripto" : "BIST";
    const note = s.market === "bist"
      ? "Bu hisse için henüz AI verisi yok. Sabah brifingi çalıştığında analiz burada görünür."
      : `${mlabel} için canlı fiyat gösteriliyor. Detaylı AI analizi şu an yalnızca BIST hisseleri için üretiliyor.`;
    body = `
      <div class="sheet-row">
        <div><h3>${esc(s.isim)}</h3><div class="sub">${esc(s.ticker)} · ${money(s.fiyat, s.para_birimi)}
          <span class="${signCls(s.gunluk)}">${pct(s.gunluk)}</span></div></div>
      </div>
      <div class="block-title">Bilgi</div>
      <div class="quote">${note}</div>`;
  }
  document.getElementById("sheet-body").innerHTML = body;
  document.getElementById("scrim").classList.add("open");
  document.getElementById("sheet").classList.add("open");
}
function toggleExplain() {
  const b = document.getElementById("explain-body");
  const btn = document.getElementById("explain-btn").querySelector("span");
  const open = b.style.display !== "none";
  b.style.display = open ? "none" : "block";
  btn.textContent = open ? "Bana açıkla" : "Gizle";
}
function closeSheet() {
  document.getElementById("scrim").classList.remove("open");
  document.getElementById("sheet").classList.remove("open");
}

/* ---------- PORTFOY ---------- */
async function loadPortfoy() {
  const el = document.getElementById("page-portfoy");
  try {
    const url = "/api/portfolio" + (CUR_USER ? "?kullanici=" + encodeURIComponent(CUR_USER) : "");
    const d = await (await fetch(url)).json();
    const o = d.ozet || {};
    let html = `
      <div class="section-head">
        <h2>Portföy</h2>
        <button class="addbtn" onclick="openPortfolioModal()" aria-label="Portföye ekle">+</button>
      </div>
      <div class="hero">
        <div class="label">Toplam Kâr / Zarar</div>
        <div class="big ${signCls(o.kz)}">${money(o.kz)}</div>
        <div class="chg ${signCls(o.kz_yuzde)}">${pct(o.kz_yuzde)}</div>
        <div class="grid">
          <div><div class="label">Yatırım</div><b>${money(o.maliyet)}</b></div>
          <div><div class="label">Güncel Değer</div><b>${money(o.deger)}</b></div>
        </div>
      </div>`;
    if (!d.pozisyonlar.length) { el.innerHTML = html + empty("Portföyde pozisyon yok"); return; }
    html += d.pozisyonlar.map(p => `
      <div class="card">
        <div class="card-top">
          <div><div class="name">${esc(p.isim)}</div>
            <div class="tick">${esc(p.ticker)} · ${fmt(p.adet,0)} adet · 👤 ${esc(p.kullanici)}</div></div>
          <div class="price-wrap">
            <div class="price ${signCls(p.kz_yuzde)}">${pct(p.kz_yuzde)}</div>
            <div class="chg ${signCls(p.kz)}">${money(p.kz, p.para_birimi)}</div>
          </div>
        </div>
        <div class="pos-grid">
          <div class="cell"><div class="k">Alış</div><div class="v">${money(p.alis, p.para_birimi)}</div></div>
          <div class="cell"><div class="k">Güncel</div><div class="v">${p.guncel != null ? money(p.guncel, p.para_birimi) : "—"}</div></div>
          <div class="cell"><div class="k">Hedef</div><div class="v pos">${money(p.hedef, p.para_birimi)}</div></div>
          <div class="cell"><div class="k">Stop-loss</div><div class="v neg">${money(p.stop, p.para_birimi)}</div></div>
        </div>
      </div>`).join("");
    el.innerHTML = html;
  } catch (e) { el.innerHTML = empty("Yüklenemedi"); }
}

/* ---------- PORTFOY EKLEME MODALI ---------- */
let PF_CUR = "TL";
let PF_HOLDINGS = [];
function openPortfolioModal() {
  if (!CUR_USER) { toast("Önce kullanıcı seç"); openUserPick(); return; }
  // alanlari sifirla
  ["pf-ticker", "pf-adet", "pf-fiyat"].forEach(id => document.getElementById(id).value = "");
  pfCur("TL");
  document.getElementById("pf-preview").innerHTML = "";
  document.getElementById("pf-status").style.display = "none";
  PF_HOLDINGS = [];
  document.getElementById("pf-scrim").classList.add("open");
  document.getElementById("pf-sheet").classList.add("open");
}
function closePortfolioModal() {
  document.getElementById("pf-scrim").classList.remove("open");
  document.getElementById("pf-sheet").classList.remove("open");
}
function pfCur(c) {
  PF_CUR = c;
  document.getElementById("pf-tl").classList.toggle("active", c === "TL");
  document.getElementById("pf-usd").classList.toggle("active", c === "USD");
}
async function pfReload() {
  loaded.portfoy = false;
  if (document.getElementById("page-portfoy").classList.contains("active")) await loadPortfoy();
  loadSummary();
}
function pfHandleFile(e) {
  const f = e.target.files && e.target.files[0];
  e.target.value = "";                       // ayni dosya tekrar secilebilsin
  if (!f) return;
  const status = document.getElementById("pf-status");
  status.style.display = "block";
  status.textContent = "📷 Fotoğraf okunuyor (AI)…";
  document.getElementById("pf-preview").innerHTML = "";
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      const r = await fetch("/api/portfolio/parse-image", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({image: reader.result})
      });
      const d = await r.json();
      if (!d.ok) { status.textContent = "Okunamadı: " + (d.hata || ""); return; }
      status.style.display = "none";
      pfRenderPreview(d.holdings || []);
    } catch (err) { status.textContent = "Hata: fotoğraf işlenemedi."; }
  };
  reader.readAsDataURL(f);
}
function pfRenderPreview(holdings) {
  const box = document.getElementById("pf-preview");
  PF_HOLDINGS = holdings.filter(h => h.ticker && h.adet != null && h.fiyat != null);
  if (!PF_HOLDINGS.length) {
    box.innerHTML = `<div class="pf-prev"><div class="pt">Fotoğrafta hisse okunamadı</div></div>`;
    return;
  }
  box.innerHTML = `
    <div class="pf-prev">
      <div class="pt">Okunan bilgiler (onayla)</div>
      ${PF_HOLDINGS.map(h => `<div class="pr-row">
        <span><b>${esc(h.ticker)}</b> · ${fmt(h.adet, 0)} adet</span>
        <span class="pr-r">${money(h.fiyat, h.para_birimi === "USD" ? "$" : "₺")}</span>
      </div>`).join("")}
    </div>
    <button class="btn-primary" onclick="pfConfirmAdd()">Onayla ve Ekle (${PF_HOLDINGS.length})</button>`;
}
async function pfConfirmAdd() {
  let ok = 0;
  for (const h of PF_HOLDINGS) {
    try {
      const r = await fetch("/api/portfolio/add", {
        method: "POST", headers: {"Content-Type": "application/json"},
        body: JSON.stringify({kullanici: CUR_USER, ticker: h.ticker, adet: h.adet,
                              alim_fiyati: h.fiyat, para_birimi: h.para_birimi || "TL"})
      });
      if ((await r.json()).ok) ok++;
    } catch (e) {}
  }
  toast(ok + " hisse eklendi");
  closePortfolioModal();
  pfReload();
}
async function pfManualAdd() {
  const ticker = document.getElementById("pf-ticker").value.trim().toUpperCase();
  const adet = parseFloat(document.getElementById("pf-adet").value);
  const fiyat = parseFloat(document.getElementById("pf-fiyat").value);
  if (!ticker || isNaN(adet) || isNaN(fiyat)) { toast("Kod, adet ve fiyat gerekli"); return; }
  try {
    const r = await fetch("/api/portfolio/add", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({kullanici: CUR_USER, ticker, adet, alim_fiyati: fiyat, para_birimi: PF_CUR})
    });
    const d = await r.json();
    if (d.ok) { toast(ticker + " eklendi"); closePortfolioModal(); pfReload(); }
    else toast(d.hata || "Eklenemedi");
  } catch (e) { toast("Eklenemedi"); }
}

/* ---------- KARNE (simulasyon + gercek kararlar) ---------- */
async function loadKarne() {
  const el = document.getElementById("page-karne");
  try {
    const d = await (await fetch("/api/karne")).json();
    const o = d.ozet || {}, a = d.ayar || {};
    let html = `
      <div class="hero">
        <div class="label">Strateji vs BIST100 (Simülasyon)</div>
        <div class="big sm ${signCls(o["strateji_vs_bist100_fark_%"])}">${pct(o["strateji_vs_bist100_fark_%"])}</div>
        <div class="sub" style="color:var(--muted);font-size:13px;margin-top:2px">
          Ağırlıklı isabet %${fmt(o["agirlikli_basari_orani_%"],1)} · ${esc(a.start||"")} → ${esc(a.end||"")}</div>
      </div>
      <div class="simnote"><span>⚠️</span>
        <span>Bu bir simülasyondur, gerçek karar değil. Geçmiş veriyle test edilmiş sonuçlardır;
        gelecek getiriyi garanti etmez.</span></div>
      <div class="section-head"><h2>Geçmiş Simülasyon</h2>
        <span class="cnt">${(d.satirlar||[]).length} kayıt</span></div>`;
    if (!d.satirlar || !d.satirlar.length) {
      html += empty("Simülasyon kaydı yok");
    } else {
      html += d.satirlar.map(s => `
        <div class="ledger">
          <span class="mark">${s.kazandi ? "✅" : "❌"}</span>
          <div class="body">
            <div class="line1"><span class="date">${esc(s.tarih)}</span> —
              <b>${esc(s.ticker)}</b> <span class="verb">—</span>
              <span class="${s.renk === 'green' ? 'pos' : s.renk === 'red' ? 'neg' : 'flat'}">${s.etiket}</span> dedim</div>
            <div class="line2">${s.kazandi ? "doğru çıktı" : "yanıldım"} · ${esc(s.sebep)}</div>
          </div>
          <span class="res ${signCls(s.getiri)}">${pct(s.getiri)}</span>
        </div>`).join("");
    }

    // Gercek Kararlar (decisions tablosu)
    html += `<div class="spacer"></div>
      <div class="section-head"><h2>Gerçek Kararlar</h2>
        <span class="cnt" id="dec-cnt">—</span></div>
      <div id="dec-list">${empty("Yükleniyor…")}</div>`;

    el.innerHTML = html;
    loadDecisions();
  } catch (e) { el.innerHTML = empty("Yüklenemedi"); }
}

async function loadDecisions() {
  const list = document.getElementById("dec-list");
  const cnt = document.getElementById("dec-cnt");
  try {
    const d = await (await fetch("/api/decisions")).json();
    const rows = d.satirlar || [];
    if (cnt) cnt.textContent = `${rows.length} kayıt`;
    if (!rows.length) { list.innerHTML = empty("Henüz karar kaydı yok"); return; }
    DECISION_INDEX = {};
    list.innerHTML = rows.map(r => {
      DECISION_INDEX[r.id] = r;
      const mark = r.durum === "dogru" ? "✅" : r.durum === "yanlis" ? "❌" : "⏳";
      const sonuc = r.durum === "bekliyor" ? "sonuç bekleniyor"
                  : r.durum === "dogru" ? "doğru çıktı" : "yanıldım";
      return `
        <div class="ledger tap" onclick="openDecision(${r.id})">
          <span class="mark">${mark}</span>
          <div class="body">
            <div class="line1"><span class="date">${esc(r.tarih)}</span> —
              <b>${esc(r.ticker)}</b> <span class="verb">—</span>
              <span class="${r.renk === 'green' ? 'pos' : r.renk === 'red' ? 'neg' : 'flat'}">${esc(r.karar_label)}</span> dedim</div>
            <div class="line2">${sonuc} · puan ${r.puan ?? "—"} · ${esc(r.eminlik)}</div>
          </div>
        </div>`;
    }).join("");
  } catch (e) { list.innerHTML = empty("Yüklenemedi"); }
}

function openDecision(id) {
  const r = DECISION_INDEX[id];
  if (!r) return;
  const durumRozet = r.durum === "dogru" ? `<span class="tag fresh">DOĞRU ÇIKTI</span>`
    : r.durum === "yanlis" ? `<span class="tag warn">YANILDIM</span>`
    : `<span class="tag">SONUÇ BEKLENİYOR</span>`;
  document.getElementById("sheet-body").innerHTML = `
    <div class="sheet-row">
      <div><h3>${esc(r.isim)}</h3><div class="sub">${esc(r.ticker)} · ${esc(r.tarih)}</div></div>
      <span class="badge ${r.renk}">${esc(r.karar_label)}</span>
    </div>
    <div style="margin-top:10px">${durumRozet}</div>

    <div class="block-title">1 · Neden bu kararı verdi</div>
    <div class="quote" style="white-space:pre-line">${esc(r.neden)}</div>

    <div class="block-title">2 · Neden yanıldı (piyasada ne değişti)</div>
    <div class="quote">${esc(r.yanilma)}</div>

    <div class="block-title">3 · Çıkarılan ders</div>
    <div class="quote">${esc(r.ders)}</div>

    <div class="block-title">Sonuç</div>
    <div class="quote">${esc(r.sonuc_metin)}</div>`;
  document.getElementById("scrim").classList.add("open");
  document.getElementById("sheet").classList.add("open");
}

/* ---------- BILDIRIM PANELI ---------- */
const ALERT_ICO = { firsat: "🟢", uyari: "⚠️", haber: "📰", default: "🔔" };
async function openNotif() {
  document.getElementById("notif-scrim").classList.add("open");
  document.getElementById("notif").classList.add("open");
  try {
    const list = await (await fetch("/api/alerts")).json();
    const body = document.getElementById("notif-body");
    body.innerHTML = list.length ? list.map(a => `
      <div class="alert">
        <span class="ico2">${ALERT_ICO[a.tip] || ALERT_ICO.default}</span>
        <div><div class="at"><b>${esc(a.ticker)}</b> · ${esc(a.isim)}</div>
          <div class="am">${esc(a.mesaj)}</div>
          ${a.tarih ? `<div class="ad">${esc(a.tarih)}</div>` : ""}</div>
      </div>`).join("") : empty("Henüz bildirim yok");
  } catch (e) { document.getElementById("notif-body").innerHTML = empty("Yüklenemedi"); }
}
function closeNotif() {
  document.getElementById("notif-scrim").classList.remove("open");
  document.getElementById("notif").classList.remove("open");
}

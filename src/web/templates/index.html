<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0a" id="theme-color-meta">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Borsa Takip">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/static/icon-180.png">
<title>Borsa Takip</title>
<style>
  :root{
    --bg:#0a0a0a; --bg2:#0f0f0f; --card:#111111; --card2:#181818; --elev:#141414;
    --border:rgba(255,255,255,.08); --border2:rgba(255,255,255,.16);
    --glass:rgba(255,255,255,.045); --glass-strong:rgba(255,255,255,.075);
    --glass-brd:rgba(255,255,255,.08); --glass-blur:20px;
    --chrome:rgba(10,10,10,.72);
    --text:#f4f5f7; --muted:#8b8f98; --muted2:#5a5e66;
    --green:#22c55e; --green2:#22c55e; --green-bg:rgba(34,197,94,.16);
    --amber:#f59e0b; --amber-bg:rgba(245,158,11,.16);
    --red:#ef4444; --red-bg:rgba(239,68,68,.16);
    --blue:#6366f1; --blue-bg:rgba(99,102,241,.16);
    --indigo:#6366f1; --indigo-bg:rgba(99,102,241,.16);
    --shadow:0 10px 40px rgba(0,0,0,.45);
    --nav-h:74px; --header-h:56px;
    --ease:cubic-bezier(.22,1,.36,1);
    --kb:0px;
  }
  html[data-theme="light"]{
    --bg:#eceef1; --bg2:#ffffff; --card:#ffffff; --card2:#f4f6f8; --elev:#ffffff;
    --border:rgba(0,0,0,.07); --border2:rgba(0,0,0,.14);
    --glass:rgba(255,255,255,.62); --glass-strong:rgba(255,255,255,.8);
    --glass-brd:rgba(0,0,0,.08); --chrome:rgba(255,255,255,.74);
    --text:#0a0a0a; --muted:#5b626d; --muted2:#9aa0aa;
    --green-bg:rgba(34,197,94,.14); --amber-bg:rgba(245,158,11,.18);
    --red-bg:rgba(239,68,68,.12); --blue-bg:rgba(99,102,241,.12); --indigo-bg:rgba(99,102,241,.12);
    --shadow:0 10px 30px rgba(20,20,40,.12);
  }
  html,body{transition:background .35s ease,color .35s ease}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;background:var(--bg);color:var(--text);overscroll-behavior:none}
  body{font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Inter",system-ui,sans-serif;
    font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;
    background:var(--bg);color:var(--text);overflow:hidden}
  main{background:var(--bg)}
  button{font-family:inherit;cursor:pointer;color:inherit;border:none;background:none}
  a{color:inherit;text-decoration:none}
  .c-green{color:var(--green)} .c-amber{color:var(--amber)} .c-red{color:var(--red)}
  .c-blue{color:var(--blue)} .c-gray{color:var(--muted)}
  .pos{color:var(--green)} .neg{color:var(--red)} .flat{color:var(--muted)}
  .muted{color:var(--muted)}

  /* ---- app shell: header (fixed) + scrollable main + bottom nav (fixed) ---- */
  header{position:fixed;top:0;left:0;right:0;z-index:30;
    height:calc(var(--header-h) + env(safe-area-inset-top));
    padding:env(safe-area-inset-top) 16px 0;
    display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:var(--chrome);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
    border-bottom:1px solid var(--border)}
  .brand{font-size:17px;font-weight:700;letter-spacing:.2px;color:var(--text)}
  .userchip{display:flex;align-items:center;gap:8px;background:var(--card);
    border:1px solid var(--border);border-radius:999px;padding:5px 12px 5px 5px;
    font-size:13px;font-weight:600;min-height:36px}
  .uc-av{width:26px;height:26px;border-radius:999px;background:var(--green2);color:#04150a;
    font-weight:700;font-size:12px;display:flex;align-items:center;justify-content:center}
  .userchip.u-yigit .uc-av{background:var(--blue);color:#04101f}
  .hdr-right{display:flex;align-items:center;gap:10px}
  .refresh-btn{display:flex;align-items:center;justify-content:center;
    width:36px;height:36px;border-radius:999px;background:var(--card);
    border:1px solid var(--border);color:var(--text);font-size:19px;line-height:1;
    cursor:pointer;padding:0;-webkit-tap-highlight-color:transparent}
  .refresh-btn:active{opacity:.6}
  .refresh-btn.spin{animation:spin .6s linear}
  @keyframes spin{to{transform:rotate(360deg)}}

  main{position:fixed;left:0;right:0;
    top:calc(var(--header-h) + env(safe-area-inset-top));
    bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;
    padding:14px 16px calc(var(--nav-h) + env(safe-area-inset-bottom) + 14px)}
  .page{display:none} .page.active{display:block;animation:fadein .2s var(--ease)}
  @keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

  nav{position:fixed;left:0;right:0;bottom:0;z-index:35;display:flex;
    height:calc(var(--nav-h) + env(safe-area-inset-bottom));
    padding-bottom:env(safe-area-inset-bottom);
    background:var(--chrome);backdrop-filter:blur(22px);-webkit-backdrop-filter:blur(22px);
    border-top:1px solid var(--border);transition:transform .2s var(--ease)}
  nav button{position:relative;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:4px;color:var(--muted2);font-size:10px;font-weight:650;min-height:44px;padding-top:9px;
    transition:color .2s var(--ease)}
  nav button .ico{width:27px;height:27px;opacity:.65;transition:transform .22s var(--ease),opacity .2s}
  nav button.active .ico{opacity:1;transform:translateY(-1px) scale(1.12)}
  nav button.active{color:var(--text);font-weight:750}
  nav button.active::before{content:"";position:absolute;top:0;left:50%;transform:translateX(-50%);
    width:30px;height:3px;border-radius:0 0 4px 4px;background:currentColor}
  nav button[data-tab="bugun"].active .ico{opacity:1;color:var(--amber)}
  nav button[data-tab="portfoy"].active .ico{opacity:1;color:var(--green)}
  nav button[data-tab="radar"].active .ico{opacity:1;color:var(--blue)}
  nav button[data-tab="sor"].active .ico{opacity:1;color:#C084FC}
  nav button[data-tab="bildirim"].active .ico{opacity:1;color:var(--red)}
  nav button[data-tab="ayarlar"].active .ico{opacity:1;color:var(--muted)}
  nav button[data-tab="bugun"].active{color:var(--amber)}
  nav button[data-tab="portfoy"].active{color:var(--green)}
  nav button[data-tab="radar"].active{color:var(--blue)}
  nav button[data-tab="sor"].active{color:#C084FC}
  nav button[data-tab="bildirim"].active{color:var(--red)}
  nav button[data-tab="ayarlar"].active{color:var(--muted)}
  body.kb nav{transform:translateY(120%)}

  /* ---- ortak ---- */
  .sec-title{font-size:12px;color:var(--muted);font-weight:600;letter-spacing:.4px;
    margin:18px 2px 9px;text-transform:uppercase}
  .sec-title:first-child{margin-top:2px}
  .sec-row{display:flex;align-items:center;justify-content:space-between;margin:18px 2px 9px}
  .sec-row .sec-title{margin:0}
  /* ---- Karne ---- */
  .krow{display:flex;gap:8px}
  .kbox{flex:1;background:rgba(255,255,255,.04);border-radius:12px;padding:12px 6px;text-align:center}
  .kbig{font-size:24px;font-weight:800;line-height:1.1}
  .ksub{font-size:11px;color:var(--muted);margin-top:3px}
  .krline{display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:10px 15px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer}
  .krline:last-child{border-bottom:none}
  .krl-meta{display:flex;align-items:center;gap:10px;font-size:13px;white-space:nowrap}
  .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
  .card{background:var(--glass);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));
    border:1px solid var(--glass-brd);border-radius:18px;padding:15px;margin-bottom:10px}

  .chip{display:inline-flex;align-items:center;height:27px;padding:0 11px;border-radius:999px;
    font-size:11.5px;font-weight:600;background:rgba(255,255,255,.05);color:var(--muted);white-space:nowrap}
  .chip.green{background:var(--green-bg);color:#86EFAC} .chip.amber{background:var(--amber-bg);color:var(--amber)}
  .chip.red{background:var(--red-bg);color:#FCA5A5} .chip.blue{background:var(--blue-bg);color:#93C5FD}
  .chip.gray{background:rgba(255,255,255,.05);color:var(--muted)}
  .pill{display:inline-flex;align-items:center;height:26px;padding:0 11px;border-radius:999px;
    font-size:11.5px;font-weight:700;letter-spacing:.3px;white-space:nowrap}
  .pill.green{background:var(--green-bg);color:#86EFAC} .pill.amber{background:var(--amber-bg);color:var(--amber)}
  .pill.red{background:var(--red-bg);color:#FCA5A5} .pill.gray{background:rgba(255,255,255,.06);color:var(--muted)}
  .mtag{display:inline-flex;align-items:center;height:18px;padding:0 6px;border-radius:6px;
    font-size:9px;font-weight:700;letter-spacing:.3px;vertical-align:middle;margin-left:6px}
  .mtag.bist{background:var(--green-bg);color:#86EFAC}
  .mtag.abd{background:var(--blue-bg);color:#93C5FD}
  .mtag.kripto{background:#2A1E0B;color:#FCD34D}

  .name{font-size:16px;font-weight:650;letter-spacing:.1px}
  .tick{font-size:11.5px;color:var(--muted2);font-weight:600;margin-top:1px;letter-spacing:.3px}
  .price{font-size:16px;font-weight:650} .chg{font-size:12.5px;font-weight:600;margin-top:1px}
  .cardtext{font-size:14.5px;line-height:1.45;color:#D9DEE7;margin-top:10px;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .actiontext{font-size:12.5px;color:var(--muted);margin-top:8px;font-weight:600}
  .status{font-size:12px;font-weight:600;margin-top:9px;display:inline-flex;align-items:center;gap:6px}
  .status::before{content:"";width:7px;height:7px;border-radius:999px;background:currentColor;opacity:.9}

  /* ---- karsilama + ozet ---- */
  .hello{font-size:25px;font-weight:700;letter-spacing:.2px}
  .subdate{font-size:12.5px;color:var(--muted2);margin-top:3px;font-weight:500}
  .sanal-borc{margin-top:7px;font-size:13.5px;font-weight:650;color:#f87171;background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.25);border-radius:10px;padding:7px 11px;display:inline-block}
  .summary-card{border-radius:26px;padding:18px;margin:14px 0 4px;
    background:radial-gradient(120% 130% at 0% 0%,rgba(52,211,153,.10),transparent 55%),var(--elev);
    border:1px solid var(--border)}
  .summary-card .q{font-size:13px;color:var(--muted);font-weight:600}
  .summary-card .t{font-size:15px;line-height:1.5;color:#E7EBF1;margin-top:7px}
  .summary-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:13px}

  /* ---- accordion hisse kart ---- */
  .acc{background:var(--card);border:1px solid var(--border);border-radius:20px;
    padding:13px 15px;margin-bottom:9px;transition:border-color .2s var(--ease)}
  .acc.open{border-color:var(--border2);background:var(--card2)}
  .acc-head{cursor:pointer}
  .acc .cardtext{-webkit-line-clamp:1;margin-top:7px;font-size:13.5px}
  .acc-foot{display:flex;align-items:center;justify-content:space-between;margin-top:7px;gap:10px}
  .acc-foot .actiontext{margin-top:0;font-size:12px;text-align:right;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:55%}
  .acc.open .acc-body .cardtext,.acc.open .acc-body{-webkit-line-clamp:unset}
  .acc-body{overflow:hidden;max-height:0;opacity:0;
    transition:max-height .26s var(--ease),opacity .22s var(--ease),margin .22s var(--ease)}
  .acc.open .acc-body{max-height:640px;opacity:1;margin-top:13px}
  .acc-sec{margin-bottom:11px} .acc-sec:last-child{margin-bottom:0}
  .acc-k{font-size:11px;color:var(--muted2);font-weight:700;text-transform:uppercase;letter-spacing:.4px;margin-bottom:4px}
  .acc-v{font-size:14px;line-height:1.5;color:#D9DEE7}
  .acc-lv{display:flex;gap:7px;flex-wrap:wrap}
  .acc-link{color:var(--green);font-size:13.5px;font-weight:650;padding:4px 0}
  .seemore{width:100%;background:var(--card);border:1px solid var(--border);color:var(--muted);
    border-radius:14px;padding:13px;font-size:13.5px;font-weight:600;min-height:44px}

  /* ---- haber gorseli (sistematik sablon: gradient + sektor ikon + monogram) ---- */
  .news{border-radius:20px;overflow:hidden;border:1px solid var(--border);margin-bottom:11px;background:var(--card)}
  .news .vis{position:relative;height:200px;display:flex;align-items:flex-end;padding:12px;overflow:hidden}
  .news .vis img.photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0}
  .news .vis::after{content:"";position:absolute;inset:0;z-index:0;
    background:radial-gradient(110% 120% at 85% 12%,rgba(255,255,255,.10),transparent 55%),
              linear-gradient(180deg,transparent 40%,rgba(0,0,0,.55) 100%)}
  .news .vis .ico{position:absolute;top:12px;left:12px;width:30px;height:30px;color:#fff;opacity:.92;z-index:1}
  .news .vis .mono{position:absolute;top:12px;right:12px;z-index:1;font-size:12px;font-weight:800;
    letter-spacing:.5px;color:#fff;background:rgba(0,0,0,.30);border:1px solid rgba(255,255,255,.25);
    border-radius:8px;padding:3px 8px;backdrop-filter:blur(4px)}
  .news .vis .cat{position:relative;z-index:1;font-size:11px;font-weight:700;letter-spacing:.6px;
    text-transform:uppercase;color:#fff;opacity:.95}
  .news .body{padding:13px 14px}
  .news .title{font-size:15px;font-weight:650;line-height:1.4}
  .news .meta{display:flex;flex-wrap:wrap;gap:7px;align-items:center;margin-top:10px}
  .news.sm .vis{aspect-ratio:auto;height:64px}
  .news.sm .vis .ico{width:22px;height:22px}

  /* ---- yatay firsat ---- */
  .hscroll{display:flex;gap:10px;overflow-x:auto;padding:1px 1px 4px;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch}
  .hscroll::-webkit-scrollbar{display:none}
  .opp{flex:0 0 auto;width:170px;scroll-snap-align:start;background:var(--card);border:1px solid var(--border);
    border-radius:16px;padding:13px}
  .opp.glow{border-color:rgba(52,211,153,.35);box-shadow:0 0 0 1px rgba(52,211,153,.12)}
  .opp .why{font-size:12px;color:var(--muted);margin-top:8px;line-height:1.4;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

  /* ---- portfoy ---- */
  .hero{border-radius:26px;padding:20px;margin-bottom:14px;
    background:radial-gradient(120% 130% at 0% 0%,rgba(52,211,153,.10),transparent 55%),var(--elev);
    border:1px solid var(--border)}
  .hero .lbl{font-size:12px;color:var(--muted);font-weight:600}
  .hero .big{font-size:31px;font-weight:700;margin:6px 0 2px;letter-spacing:.3px}
  .hero .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:15px}
  .hero .grid b{display:block;font-size:15px;font-weight:650;margin-top:3px}
  .hero .yorum{font-size:13.5px;color:var(--muted);line-height:1.55;margin-top:14px;
    border-top:1px solid var(--border);padding-top:13px}
  /* ---- getiri sekmesi (gunluk/haftalik/aylik) ---- */
  .ret{margin-top:15px;border-top:1px solid var(--border);padding-top:13px}
  .ret-tabs{display:flex;gap:6px;margin-bottom:10px}
  .ret-tabs button{flex:1;background:transparent;border:1px solid var(--border2);color:var(--muted);
    border-radius:999px;padding:6px 0;font-size:12.5px;font-weight:600;min-height:32px}
  .ret-tabs button.active{border-color:rgba(52,211,153,.4);color:var(--green);background:var(--green-bg)}
  .ret-val{display:flex;align-items:baseline;gap:10px}
  .ret-tl{font-size:22px;font-weight:750}
  .ret-pct{font-size:14px;font-weight:650}
  .ret-na{font-size:13px;color:var(--muted)}
  .pline{font-size:13px;color:var(--muted);margin-top:5px}
  .dots{color:var(--muted);font-size:22px;line-height:1;padding:0 6px;min-height:44px;min-width:36px;
    display:flex;align-items:center;justify-content:center}
  .pos-acts{display:flex;align-items:center;gap:2px;margin-left:2px}
  .pos-ic{color:var(--muted);background:none;border:none;padding:0;width:36px;height:38px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;cursor:pointer;transition:color .15s,background .15s}
  .pos-ic:active{background:var(--border)}
  .pos-ic.danger{color:#d9594f}
  .addbtn{background:var(--card);border:1px solid var(--border);color:var(--green);width:38px;height:38px;
    border-radius:999px;font-size:22px;font-weight:600;display:flex;align-items:center;justify-content:center}

  /* ---- radar ---- */
  .search{width:100%;background:var(--card);border:1px solid var(--border);color:var(--text);
    border-radius:14px;padding:13px 15px;font-size:15px;outline:none;margin-bottom:11px;min-height:46px}
  .search:focus{border-color:var(--border2)}
  /* --- arama overlay (kutu altinda, kayarak acilir) --- */
  .search-wrap{position:relative}
  .search-overlay{position:absolute;left:0;right:0;top:calc(100% + 4px);z-index:200;
    background:var(--card);border:1px solid var(--border2);border-radius:16px;
    box-shadow:0 16px 40px rgba(0,0,0,.5);overflow:hidden;max-height:62vh;overflow-y:auto;
    opacity:0;transform:translateY(-10px);pointer-events:none;
    transition:transform .2s ease,opacity .2s ease}
  .search-overlay.open{opacity:1;transform:translateY(0);pointer-events:auto}
  .sr-grp{font-size:10.5px;color:var(--muted2);text-transform:uppercase;letter-spacing:.5px;
    font-weight:800;padding:9px 14px 4px}
  .sr-row{display:flex;align-items:center;gap:11px;padding:9px 14px;cursor:pointer;
    border-top:1px solid var(--border)}
  .sr-grp + .sr-row{border-top:none}
  .sr-row:active{background:rgba(255,255,255,.05)}
  .sr-av{width:34px;height:34px;border-radius:9px;display:flex;align-items:center;
    justify-content:center;font-weight:800;color:#fff;flex:0 0 auto;font-size:15px}
  .sr-main{flex:1;min-width:0}
  .sr-tk{font-size:14px;font-weight:700}
  .sr-nm{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .sr-right{text-align:right;flex:0 0 auto}
  /* --- portfoy kartinda BELIRGIN karar etiketi --- */
  .pill.big{height:30px;padding:0 15px;font-size:15px;font-weight:800;letter-spacing:.4px}
  /* --- gercek hisse logosu (parqet); yuklenemezse harf ikonuna doner --- */
  .av-img{object-fit:contain;background:#fff;padding:2px;display:inline-block}
  /* --- portfoy pasta grafigi --- */
  .pie-wrap{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:16px;margin-bottom:11px}
  .pie-row{display:flex;gap:18px;align-items:center;flex-wrap:wrap}
  .pie-svg{flex:0 0 auto}
  .pie-svg path{cursor:pointer;transition:opacity .15s} .pie-svg path:active{opacity:.7}
  .pie-leg{flex:1;min-width:150px;display:flex;flex-direction:column;gap:7px}
  .pie-li{display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer}
  .pie-dot{width:11px;height:11px;border-radius:3px;flex:0 0 auto}
  .pie-li .pn{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .pie-li .pp{font-weight:700}
  .filters{display:flex;gap:7px;margin-bottom:4px;flex-wrap:wrap}
  .filters button{flex:0 0 auto;background:var(--card);border:1px solid var(--border);color:var(--muted);
    border-radius:999px;padding:8px 15px;font-size:12.5px;font-weight:600;min-height:38px}
  .filters button.active{border-color:rgba(52,211,153,.4);color:var(--green);background:var(--green-bg)}

  /* ---- gunun hareketlileri (Midas tarzi numarali liste) ---- */
  .gh{background:var(--glass);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));
    border:1px solid var(--glass-brd);border-radius:16px;overflow:hidden;margin-bottom:8px}
  .gh-tabs{display:flex;gap:6px;padding:10px 10px 7px;overflow-x:auto;-webkit-overflow-scrolling:touch}
  .gh-tabs button{flex:0 0 auto;background:transparent;border:1px solid var(--border2);color:var(--muted);
    border-radius:999px;padding:6px 14px;font-size:12.5px;font-weight:600;min-height:34px}
  .gh-tabs button.active{border-color:rgba(52,211,153,.4);color:var(--green);background:var(--green-bg)}
  .gh-row{display:flex;align-items:center;gap:11px;padding:9px 12px;cursor:pointer;border-top:1px solid var(--border)}
  .gh-row:active{background:rgba(255,255,255,.04)}
  .gh-rank{width:15px;text-align:center;font-size:13px;font-weight:700;color:var(--muted2)}
  .gh-av{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:15px;color:var(--text);flex:0 0 auto}
  .gh-main{flex:1;min-width:0}
  .gh-tk{font-size:14.5px;font-weight:700}
  .gh-nm{font-size:12px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .gh-right{text-align:right;flex:0 0 auto}
  .gh-chg{font-size:14px;font-weight:700}
  .gh-vol{font-size:11px;color:var(--muted2);margin-top:1px}
  .gh-badge{margin-left:8px;font-size:10.5px;font-weight:700;letter-spacing:.3px;color:var(--amber);
    background:var(--amber-bg);border-radius:999px;padding:2px 8px;vertical-align:middle;text-transform:none}

  /* ---- sohbet ---- */
  .chat{display:flex;flex-direction:column;gap:10px}
  .bubble{max-width:86%;padding:12px 14px;border-radius:18px;font-size:14.5px;line-height:1.5;white-space:pre-line}
  .bubble.user{align-self:flex-end;background:var(--indigo);color:#fff;font-weight:550;border-bottom-right-radius:6px}
  .bubble.bot{align-self:flex-start;background:var(--glass);
    backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));
    border:1px solid var(--glass-brd);border-bottom-left-radius:6px;padding-bottom:8px}
  .bubble.typing{color:var(--muted)}
  .bubble-wrap{display:contents}
  .copy-btn{align-self:flex-start;background:var(--card2);border:1px solid var(--border);color:var(--muted2);
    border-radius:8px;padding:4px 10px;font-size:11.5px;font-weight:600;margin-top:-4px;margin-bottom:4px;min-height:28px}
  .copy-btn:active{opacity:.7}
  .copy-btn.ok{color:var(--green);border-color:var(--green)}
  .chat-input{position:fixed;left:0;right:0;z-index:34;display:none;flex-direction:column;gap:8px;padding:10px 14px;
    bottom:calc(var(--nav-h) + env(safe-area-inset-bottom));
    background:rgba(7,10,15,.94);backdrop-filter:blur(18px);border-top:1px solid var(--border)}
  body.kb .chat-input{bottom:var(--kb)}
  /* sohbet alani input kutusunun arkasinda kalmasin: son mesaj her zaman ustte gorunur */
  #page-sor{padding-bottom:88px}
  body.kb #page-sor{padding-bottom:calc(var(--kb) + 64px)}
  .chat-input.on{display:flex}
  .chat-input-row{display:flex;gap:9px;align-items:flex-end}
  .chat-input input[type=text]{flex:1;background:var(--card);border:1px solid var(--border);color:var(--text);
    border-radius:14px;padding:12px 15px;font-size:16px;outline:none;min-height:46px}
  .chat-input input[type=text]:focus{border-color:var(--border2)}
  .chat-input .send{background:var(--green2);color:#04150a;border-radius:13px;width:48px;font-size:19px;font-weight:700;flex:0 0 auto}
  .chat-attach{flex:0 0 auto;background:var(--card);border:1px solid var(--border);color:var(--text);
    border-radius:13px;width:46px;min-height:46px;font-size:20px;display:flex;align-items:center;justify-content:center}
  .chat-attach:active{opacity:.6}
  /* sohbet fotograf onizleme (input kutusunun ustunde) */
  .chat-preview{display:flex;align-items:center;gap:10px;background:var(--card);
    border:1px solid var(--border);border-radius:12px;padding:7px 9px}
  .chat-preview img{width:46px;height:46px;border-radius:9px;object-fit:cover;flex:0 0 auto}
  .chat-preview .cp-lbl{font-size:13px;color:var(--muted);font-weight:600}
  .chat-preview .cp-rm{margin-left:auto;flex:0 0 auto;background:var(--card2);border:1px solid var(--border);
    color:var(--muted);border-radius:999px;width:30px;height:30px;font-size:14px;
    display:flex;align-items:center;justify-content:center}
  /* sohbet baloncugunda gonderilen fotograf */
  .bubble-img{max-width:200px;max-height:240px;border-radius:12px;display:block;margin-bottom:6px}

  /* ---- bildirim ---- */
  .alert{display:flex;gap:12px;background:var(--glass);
    backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));
    border:1px solid var(--glass-brd);border-radius:16px;cursor:pointer;
    padding:13px 14px;margin-bottom:9px;align-items:flex-start;min-height:44px;
    transition:transform .13s var(--ease),border-color .2s var(--ease)}
  @media (hover:hover){.alert:hover{transform:scale(1.012);border-color:var(--border2)}}
  .alert:active{transform:scale(.985)}
  .alert .dotc{width:9px;height:9px;border-radius:999px;margin-top:6px;flex:0 0 auto;background:var(--muted2)}
  .alert .dotc.red{background:var(--red)} .alert .dotc.amber{background:var(--amber)}
  .alert .dotc.green{background:var(--green)} .alert .dotc.blue{background:var(--blue)}
  .alert .at{font-size:14.5px;font-weight:650}
  .alert .ab{font-size:13px;color:var(--muted);margin-top:3px;line-height:1.45}
  .alert .am{display:flex;gap:7px;align-items:center;margin-top:8px;flex-wrap:wrap}
  .alert .as{font-size:11px;color:var(--muted2)}
  /* ---- detay: bot karari karti ---- */
  .botcard{margin-top:14px;background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 16px}
  .botcard .bk-top{display:flex;align-items:center;justify-content:space-between}
  .botcard .bk-lbl{font-size:13px;font-weight:700;color:var(--text)}
  .botcard .bk-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
  .botcard .bk-k{font-size:11.5px;color:var(--muted)}
  .botcard .bk-v{font-size:17px;font-weight:750;margin-top:2px}

  /* ---- detay overlay ---- */
  .scrim{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.6);opacity:0;pointer-events:none;
    transition:opacity .22s var(--ease)}
  .scrim.open{opacity:1;pointer-events:auto}
  /* hisse detay drawer (alttan kayan glass bottom-sheet) */
  .overlay{position:fixed;left:0;right:0;bottom:0;z-index:50;
    background:var(--glass-strong);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
    border-top:1px solid var(--glass-brd);border-radius:28px 28px 0 0;
    transform:translateY(100%);transition:transform .34s var(--ease);
    max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;
    box-shadow:0 -24px 70px rgba(0,0,0,.55);
    padding:6px 16px calc(28px + env(safe-area-inset-bottom))}
  .overlay.open{transform:none}
  .ov-close{position:sticky;top:0;display:flex;justify-content:flex-end;margin:0 -16px 2px;
    padding:8px 16px 4px}
  .ov-close button{background:var(--glass);border:1px solid var(--glass-brd);color:var(--muted);
    border-radius:999px;width:34px;height:34px;font-size:15px;font-weight:600;display:flex;
    align-items:center;justify-content:center}
  .lvls{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .lvl{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px}
  .lvl .k{font-size:11px;color:var(--muted2);text-transform:uppercase;letter-spacing:.4px}
  .lvl .v{font-size:16px;font-weight:700;margin-top:3px}
  .quote{font-size:14.5px;line-height:1.55;color:#D9DEE7}
  .anbox{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px}

  /* ---- zaman filtreli grafik (Midas tarzi) ---- */
  .chart-read{display:flex;align-items:baseline;gap:9px;min-height:23px;margin:12px 0 2px}
  .cr-price{font-size:17px;font-weight:700}
  .cr-chg{font-size:13.5px;font-weight:700}
  .cr-chg.pos{color:var(--green)} .cr-chg.neg{color:var(--red)}
  .cr-date{font-size:12px;color:var(--muted2);font-weight:600;margin-left:auto}
  .chart-svg .ref{stroke:rgba(255,255,255,.30);stroke-width:1;stroke-dasharray:4 3;vector-effect:non-scaling-stroke}
  .chart-svg .vol rect{fill:#34D399;opacity:.16}
  .ax{position:absolute;right:0;transform:translateY(-50%);font-size:9px;line-height:1;color:var(--muted2);
    background:rgba(6,8,13,.72);padding:1px 4px;border-radius:3px 0 0 3px;pointer-events:none;
    font-weight:600;z-index:1}
  .ax.cur{color:var(--green);background:rgba(6,8,13,.85)}
  .chart-plot.hovering .ax.cur{display:none}   /* hover'da sabit fiyat etiketi gizlenir, tooltip gosterir */
  .cross-tip{position:absolute;z-index:6;display:none;pointer-events:none;transform:translateX(-50%);
    background:rgba(16,22,32,.96);border:1px solid var(--border2);border-radius:9px;padding:5px 9px;
    font-size:11.5px;font-weight:600;white-space:nowrap;color:var(--text)}
  .cross-tip .tp{font-weight:700} .cross-tip .tg.pos{color:var(--green)} .cross-tip .tg.neg{color:var(--red)}
  .cross-tip .tt{color:var(--muted2);font-weight:600}
  .periods{display:flex;gap:5px;margin:8px 0 2px}
  .periods button{flex:1;background:var(--card);border:1px solid var(--border);color:var(--muted);
    border-radius:10px;padding:8px 0;font-size:12px;font-weight:650;min-height:36px}
  .periods button.active{border-color:rgba(52,211,153,.4);color:var(--green);background:var(--green-bg)}
  #chart{margin-top:8px;transition:opacity .18s var(--ease)}
  .chart-plot{position:relative;height:120px;touch-action:none}
  .chart-svg{display:block}
  .chart-svg .grid{stroke:rgba(255,255,255,.06);stroke-width:1}
  .chart-svg .area{opacity:0;animation:areain .4s var(--ease) forwards}
  .chart-svg .line{fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;vector-effect:non-scaling-stroke}
  .chart-svg .line.draw{stroke-dasharray:1;stroke-dashoffset:1;animation:draw .55s var(--ease) forwards}
  @keyframes draw{to{stroke-dashoffset:0}}
  @keyframes areain{to{opacity:1}}
  .cross-line{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,.4);
    display:none;pointer-events:none;transform:translateX(-.5px)}
  .cross-dot{position:absolute;width:10px;height:10px;border-radius:50%;background:var(--green);
    border:2px solid #06080D;display:none;pointer-events:none;transform:translate(-50%,-50%);
    box-shadow:0 0 0 3px rgba(52,211,153,.18)}
  .chart-meta{display:flex;justify-content:space-between;font-size:11px;color:var(--muted2);margin-top:6px}

  /* ---- bottom sheet (menu / portfoy ekle) ---- */
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:55;background:var(--card);
    border-top:1px solid var(--border2);border-radius:24px 24px 0 0;
    padding:8px 18px calc(24px + env(safe-area-inset-bottom));transform:translateY(100%);
    transition:transform .28s var(--ease);max-height:88vh;overflow-y:auto}
  .sheet.open{transform:none}
  .grab{width:42px;height:5px;background:var(--border2);border-radius:999px;margin:7px auto 12px}
  #menu-scrim{z-index:54}
  .menu button{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:14px;
    padding:15px;font-size:15px;font-weight:600;margin-bottom:9px;display:flex;align-items:center;gap:10px;min-height:52px}
  .menu button.danger{color:var(--red)}
  .mhead{text-align:center;font-size:13px;color:var(--muted);padding:4px 0 13px;font-weight:600}
  .field{margin-bottom:13px}
  .field label{display:block;color:#cfd6e0;font-size:13px;font-weight:600;margin-bottom:6px}
  .field input{width:100%;background:var(--card2);border:1px solid var(--border);color:var(--text);
    border-radius:13px;padding:13px 14px;font-size:16px;outline:none;min-height:48px}
  .field input:focus{border-color:var(--border2)}
  .seg{display:flex;gap:8px}
  .seg button{flex:1;background:var(--card2);border:1px solid var(--border);color:var(--muted);
    border-radius:13px;padding:12px 0;font-size:14px;font-weight:600;min-height:46px}
  .seg button.active{border-color:rgba(52,211,153,.4);color:var(--green);background:var(--green-bg)}
  .pf-photo{width:100%;background:var(--blue-bg);border:1px solid rgba(96,165,250,.35);color:var(--blue);
    border-radius:14px;padding:14px;font-size:14.5px;font-weight:650;display:flex;align-items:center;
    justify-content:center;gap:9px;min-height:50px}
  .pf-prev{background:var(--card2);border:1px solid var(--border);border-radius:14px;padding:6px 14px;margin:12px 0}
  .pr-row{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:13.5px}
  .pr-row:last-child{border-bottom:none}
  .btn-primary{width:100%;background:var(--green2);color:#04150a;border-radius:14px;padding:15px;
    font-size:15px;font-weight:700;margin-top:4px;min-height:50px}
  .pf-or{text-align:center;color:var(--muted2);font-size:12px;margin:14px 0}
  .kaplink{display:inline-block;color:var(--blue);font-size:13.5px;font-weight:650}

  /* ---- kullanici secim ---- */
  .userpick{position:fixed;inset:0;z-index:70;background:rgba(6,8,13,.96);backdrop-filter:blur(8px);
    display:none;align-items:center;justify-content:center;padding:24px}
  .userpick.open{display:flex}
  .up-card{width:100%;max-width:360px;background:var(--card);border:1px solid var(--border);border-radius:24px;padding:28px 22px}
  .up-title{font-size:23px;font-weight:700;text-align:center}
  .up-sub{font-size:13.5px;color:var(--muted);text-align:center;margin:7px 0 22px}
  .up-btn{width:100%;display:flex;align-items:center;gap:14px;background:var(--card2);border:1px solid var(--border);
    border-radius:16px;padding:15px 16px;font-size:17px;font-weight:650;margin-bottom:12px;min-height:58px}
  .up-av{width:36px;height:36px;border-radius:999px;background:var(--green2);color:#04150a;font-weight:700;
    font-size:16px;display:flex;align-items:center;justify-content:center}
  .up-av.y{background:var(--blue);color:#04101f}
  .up-av.g{background:#a855f7;color:#1a0633}
  .up-av.big{width:60px;height:60px;font-size:25px;margin:2px auto 14px}
  .up-close{width:100%;color:var(--muted);font-size:14px;padding:11px;margin-top:4px}
  .auth-inp{width:100%;background:var(--card2);border:1px solid var(--border);border-radius:14px;
    padding:14px 15px;font-size:16px;color:var(--text);margin-bottom:11px;min-height:52px}
  .auth-inp:focus{outline:none;border-color:var(--green2)}
  .auth-remember{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--muted);
    margin:2px 2px 8px;cursor:pointer}
  .auth-remember input{width:17px;height:17px;accent-color:var(--green2)}
  .auth-err{color:#f87171;font-size:13px;text-align:center;min-height:18px;margin-bottom:6px}
  .auth-go{justify-content:center;background:var(--green2);color:#04150a;border-color:transparent}
  .auth-go:disabled{opacity:.55}

  /* ---- onboarding ---- */
  .onb{position:fixed;inset:0;z-index:75;background:var(--bg);display:none;flex-direction:column;
    padding:calc(env(safe-area-inset-top) + 16px) 16px calc(env(safe-area-inset-bottom) + 14px)}
  .onb.open{display:flex}
  .onb-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
  .onb-title{font-size:22px;font-weight:700}
  .onb-sub{font-size:13px;color:var(--muted);margin-top:3px}
  .onb-skip{color:var(--muted);font-size:13px;padding:8px 12px;border:1px solid var(--border);border-radius:999px}
  .onb-bar{height:8px;background:var(--card2);border-radius:999px;margin:14px 0 6px;overflow:hidden}
  .onb-bar-fill{height:100%;width:0;background:var(--green2);border-radius:999px;transition:width .4s ease}
  .onb-pct{font-size:13px;color:var(--muted);margin-bottom:12px}
  .onb .chat{flex:1;overflow-y:auto;padding-bottom:10px}
  .onb-input{display:flex;gap:8px;align-items:center;padding-top:10px}
  .onb-input input{flex:1;background:var(--card2);border:1px solid var(--border);color:var(--text);
    border-radius:14px;padding:14px;font-size:15px}
  .onb-input .send{width:46px;height:46px;border-radius:14px;background:var(--green2);color:#04150a;
    font-size:18px;display:flex;align-items:center;justify-content:center}
  .onb-finish{width:100%;background:var(--green2);color:#04150a;border-radius:14px;padding:14px;
    font-weight:700;font-size:15px;margin-top:10px}
  .prof-score{text-align:center;padding:22px 16px;border-radius:20px;margin-bottom:14px;
    background:radial-gradient(140% 120% at 50% 0%,var(--indigo-bg),transparent 62%),var(--glass);
    backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));
    border:1px solid var(--glass-brd)}
  .prof-score .big{font-size:46px;font-weight:850;color:var(--green);line-height:1;font-variant-numeric:tabular-nums}
  .prof-ring{font-size:14px;color:var(--muted);margin-top:8px}
  .prof-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .prof-cell{background:var(--glass);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));
    border:1px solid var(--glass-brd);border-radius:14px;padding:12px 13px}
  .prof-cell .k{font-size:12px;color:var(--muted)}
  .prof-cell .v{font-size:15px;font-weight:650;margin-top:3px}
  .prof-btns{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0}
  .prof-btn{flex:1;min-width:46%;background:var(--glass);
    backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));
    border:1px solid var(--glass-brd);color:var(--text);
    border-radius:12px;padding:12px;font-size:13.5px;font-weight:600}
  .mem-tabs{display:flex;gap:7px;flex-wrap:wrap;margin:6px 0 12px}
  .mem-tabs button{background:var(--card);border:1px solid var(--border);color:var(--muted);
    border-radius:999px;padding:8px 13px;font-size:13px}
  .mem-tabs button.active{color:var(--text);border-color:var(--border2)}

  /* ---- skeleton / bos / toast ---- */
  .skel{background:linear-gradient(90deg,#0E141C 0%,#16202C 50%,#0E141C 100%);background-size:200% 100%;
    animation:sh 1.2s linear infinite;border-radius:14px}
  @keyframes sh{from{background-position:200% 0}to{background-position:-200% 0}}
  .skel-card{height:84px;margin-bottom:10px}
  .skel-line{height:13px;margin:8px 0;border-radius:7px}
  .empty{text-align:center;color:var(--muted);padding:40px 16px;font-size:14px}
  .spin{text-align:center;color:var(--muted);padding:26px;font-size:13px}
  .toast{position:fixed;left:50%;bottom:calc(var(--nav-h) + env(safe-area-inset-bottom) + 16px);
    transform:translateX(-50%) translateY(16px);z-index:80;background:var(--elev);border:1px solid var(--border2);
    border-radius:999px;padding:11px 18px;font-size:13.5px;font-weight:600;opacity:0;pointer-events:none;
    transition:opacity .2s,transform .2s;max-width:86vw}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms!important;transition-duration:.001ms!important}
  }
.tdot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--text2);margin:0 3px;animation:tdotanim 1.4s infinite ease-in-out}
  .tdot:nth-child(2){animation-delay:.2s}
  .tdot:nth-child(3){animation-delay:.4s}
  @keyframes tdotanim{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}

  /* ---- portfoy foto yukleme loader ---- */
  .pfl-wrap{display:flex!important;flex-direction:column;gap:8px;padding:10px 4px;text-align:left;background:#0a0a0a;border-radius:14px}
  .pfl-row{display:flex;align-items:center;gap:10px;padding:11px 13px;border-radius:12px;
    background:#0a0a0a;border:1px solid #1c1c1c;color:#d4d4d4;font-size:13.5px;font-weight:600;
    animation:pfl-slide .4s cubic-bezier(.2,.75,.3,1) both}
  .pfl-row .pfl-lbl{transition:opacity .18s ease}
  .pfl-row b{color:#fff;font-weight:700}
  .pfl-row.done{background:rgba(34,197,94,.09);border-color:rgba(34,197,94,.32);color:#86e3a6;
    transition:background .4s ease,border-color .4s ease,color .4s ease}
  .pfl-row.done b{color:#22c55e}
  .pfl-row.err{background:rgba(239,68,68,.08);border-color:rgba(239,68,68,.3);color:#f1a3a3}
  @keyframes pfl-slide{from{opacity:0;transform:translateX(-22px)}to{opacity:1;transform:none}}
  .pfl-spin{flex:0 0 auto;width:15px;height:15px;border-radius:50%;
    border:2px solid rgba(34,197,94,.22);border-top-color:#22c55e;animation:spin .7s linear infinite}

  /* ============ PREMIUM "BUGÜN" REDESIGN (cam + koyu/açık tema) ============ */

    border:1px solid var(--glass-brd);box-shadow:var(--shadow)}

  /* ===== ORTAK COMPACT TEK-SATIR KART (crow) — tüm listeler ===== */
  .crow{display:flex;align-items:center;gap:11px;width:100%;text-align:left;cursor:pointer;

  .app-info{font-size:13px;color:var(--muted);line-height:1.6}

</style>

<script>
const loaded={};
let CUR_USER=null,curTab="bugun";
const USERS={serhat:{ad:"Serhat",av:"S"},yigit:{ad:"Yiğit",av:"Y"},ufuk:{ad:"Ufuk",av:"U"},gokay:{ad:"Gökay",av:"G"}};
let PENDING_USER=null,AUTH_MODE="login";   // giris ekrani durumu (sifre belirle/gir)

/* ---- API guvenlik: aktif cihaz token'ini her /api/ istegine otomatik ekle ----
   Token: remember=acik -> localStorage(bb_devtok_<user>), degilse -> sessionStorage.
   Boylece tum fetch'ler (34 cagri) tek noktadan yetkilendirilir. */
function aktifToken(){try{
  // CUR_USER henuz set degilse (acilis aninda) hatirlanan kullaniciya dus -> ilk
  // load() de token tasisin (sunucu zaten dogrular; gereksiz 401 olmasin).
  let u=CUR_USER;if(!u){try{u=localStorage.getItem("bb_user")}catch(e){}}
  if(u){const t=localStorage.getItem("bb_devtok_"+u);if(t)return t}
  return sessionStorage.getItem("bb_devtok_session")||""
}catch(e){return ""}}
(function(){const _f=window.fetch.bind(window);
  window.fetch=function(url,opt){try{
    const u=(typeof url==="string")?url:((url&&url.url)||"");
    if(u.indexOf("/api/")===0){const tok=aktifToken();
      // Dash'li header (X-BB-Devtok): alt-cizgili 'bb_devtok' header'i WSGI'da
      // duserilebiliyor; sunucu her ikisini de + query'yi kabul ediyor.
      if(tok){opt=opt||{};const h=new Headers(opt.headers||{});h.set("X-BB-Devtok",tok);opt.headers=h}}
  }catch(e){}return _f(url,opt)};
})();
let STOCK_INDEX={},ALERT_INDEX=[],RADAR_FILTER="all",RADAR_DATA=null;
let CHANGELOG_DATA=null;

/* ---- format ---- */
function fmt(n,d=2){if(n==null||isNaN(n))return"—";return Number(n).toLocaleString("tr-TR",{minimumFractionDigits:d,maximumFractionDigits:d})}
function fmtQty(n){if(n==null||isNaN(n))return"—";return Number(n).toLocaleString("tr-TR",{minimumFractionDigits:0,maximumFractionDigits:6})}
function pct(n){if(n==null||isNaN(n))return"—";return(n>0?"+":"")+fmt(n)+"%"}
function money(n,b){if(n==null||isNaN(n))return"—";b=b||"₺";return b==="$"?"$"+fmt(n):fmt(n)+" "+b}
function signCls(n){if(n==null||isNaN(n))return"flat";return n>0?"pos":(n<0?"neg":"flat")}
function esc(s){return(s??"").toString().replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))}
function empty(m){return`<div class="empty">${m}</div>`}
function mtag(m){const l=m==="abd"?"ABD":m==="kripto"?"KRP":"BIST";return`<span class="mtag ${m||'bist'}">${l}</span>`}
function pill(t,r){return t?`<span class="pill ${r||'gray'}">${esc(t)}</span>`:""}
// Belirgin karar etiketi: AL=yesil, SAT/AZALT=kirmizi, TUT/digeri=gri
function pillBig(t){if(!t)return"";const u=(t||"").toLocaleUpperCase("tr");
  const cls=u.indexOf("AL")===0?"green":(u.indexOf("SAT")===0||u.indexOf("AZALT")>=0)?"red":"gray";
  return`<span class="pill big ${cls}">${esc(t)}</span>`}
function priceBlock(s){return s.fiyat==null?"":`<div style="text-align:right"><div class="price">${money(s.fiyat,s.para_birimi)}</div><div class="chg ${signCls(s.gunluk)}">${pct(s.gunluk)}</div></div>`}
// Hisse logosu (parqet, ucretsiz). Turk hisseleri icin {TICKER}.IS dener;
// yuklenemezse mevcut renkli harf ikonuna geri doner (avFallback). cls=boyut sinifi.
function logoSym(s){const t=(s.ticker||"").toUpperCase();return (!s.market||s.market==="bist")?t+".IS":t}
function avatar(s,cls){const t=(s.ticker||"").toUpperCase();const bg=ghAvColor(t);const ch=esc(t.slice(0,1)||"?");
  const src=`https://assets.parqet.com/logos/symbol/${encodeURIComponent(logoSym(s))}?format=svg`;
  return`<img class="av-img ${cls||''}" src="${src}" alt="${esc(t)}" loading="lazy" onerror="avFallback(this,'${ch}','${bg}','${(cls||'')}')">`}
function avFallback(img,ch,bg,cls){const sp=document.createElement('span');sp.className=cls;sp.style.background=bg;sp.textContent=ch;img.replaceWith(sp)}
function statusLine(s){return s.statusPhrase?`<div class="status c-${s.statusColor||'gray'}">${esc(s.statusPhrase)}</div>`:""}
function key(s){return(s.market||"bist")+":"+s.ticker}
function reg(s){STOCK_INDEX[key(s)]=s;return key(s)}
let toastT=null;function toast(m){const e=document.getElementById("toast");e.textContent=m;e.classList.add("show");clearTimeout(toastT);toastT=setTimeout(()=>e.classList.remove("show"),1900)}

/* ---- kullanici ---- */
function applyChip(){const u=USERS[CUR_USER];if(!u)return;document.getElementById("uc-av").textContent=u.av;
  document.getElementById("uc-name").textContent=u.ad;document.getElementById("userchip").classList.toggle("u-yigit",CUR_USER==="yigit")}
function openUserPick(){document.getElementById("up-close").style.display=CUR_USER?"block":"none";document.getElementById("userpick").classList.add("open")}
function closeUserPick(){if(CUR_USER)document.getElementById("userpick").classList.remove("open")}
async function apost(url,body){try{const r=await fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify(body)});return await r.json()}catch(e){return{ok:false,hata:"Bağlantı hatası"}}}

// Kullanici secilince sifre ekranina gec (CUR_USER henuz set EDILMEZ).
async function setUser(k){if(!USERS[k])return;PENDING_USER=k;
  document.getElementById("userpick").classList.remove("open");
  const st=await apost("/api/auth/status",{kullanici:k});
  openAuth(k,!!st.sifre_var)}

function openAuth(k,sifreVar){AUTH_MODE=sifreVar?"login":"set";const u=USERS[k];
  document.getElementById("auth-av").textContent=u?u.av:"?";
  document.getElementById("auth-title").textContent=sifreVar?("Merhaba "+(u?u.ad:"")):("Şifre belirle"+(u?", "+u.ad:""));
  document.getElementById("auth-sub").textContent=sifreVar?"Devam etmek için şifreni gir":"İlk giriş — bu hesaba bir şifre belirle";
  const p1=document.getElementById("auth-pass");p1.value="";p1.placeholder=sifreVar?"Şifre":"Yeni şifre (en az 4 karakter)";
  const p2=document.getElementById("auth-pass2");p2.value="";p2.style.display=sifreVar?"none":"block";
  document.getElementById("auth-err").textContent="";
  document.getElementById("auth-go").textContent=sifreVar?"Giriş yap":"Şifreyi kaydet ve gir";
  document.getElementById("authpick").classList.add("open");
  setTimeout(()=>p1.focus(),150)}

function authBack(){document.getElementById("authpick").classList.remove("open");PENDING_USER=null;openUserPick()}

async function authSubmit(){const k=PENDING_USER;if(!k)return;
  const p=document.getElementById("auth-pass").value||"";const err=document.getElementById("auth-err");err.textContent="";
  if(p.length<4){err.textContent="Şifre en az 4 karakter olmalı";return}
  if(AUTH_MODE==="set"&&p!==(document.getElementById("auth-pass2").value||"")){err.textContent="Şifreler eşleşmiyor";return}
  const remember=document.getElementById("auth-remember").checked;
  const go=document.getElementById("auth-go");go.disabled=true;
  const d=await apost(AUTH_MODE==="set"?"/api/auth/set-password":"/api/auth/login",{kullanici:k,sifre:p,remember});
  go.disabled=false;
  if(!d.ok){err.textContent=d.hata||"Giriş başarısız";return}
  authSuccess(k,d.token,remember)}

// Basarili giris: CUR_USER'i set et, token'i sakla (remember -> localStorage kalici,
// degilse -> sessionStorage oturumluk), uygulamaya gec.
function authSuccess(k,token,remember){CUR_USER=k;PENDING_USER=null;
  try{localStorage.setItem("bb_user",k)}catch(e){}
  try{localStorage.removeItem("bb_devtok_"+k);sessionStorage.removeItem("bb_devtok_session")}catch(e){}
  if(token){if(remember){try{localStorage.setItem("bb_devtok_"+k,token)}catch(e){}}
            else{try{sessionStorage.setItem("bb_devtok_session",token)}catch(e){}}}
  applyChip();document.getElementById("authpick").classList.remove("open");document.getElementById("userpick").classList.remove("open");
  Object.keys(loaded).forEach(t=>loaded[t]=false);load(curTab);checkOnboarding()}

// Acilis: hatirlanan kullanicinin gecerli cihaz token'i varsa sifresiz direkt gir;
// yoksa kullanici secimi ekranini goster.
function initUser(){let u=null,tok=null;
  try{u=localStorage.getItem("bb_user")}catch(e){}
  try{tok=u?localStorage.getItem("bb_devtok_"+u):null}catch(e){}
  try{if(!tok)tok=sessionStorage.getItem("bb_devtok_session")}catch(e){}  // oturumluk token (remember kapali)
  if(u&&USERS[u]&&tok){
    apost("/api/auth/token",{token:tok}).then(d=>{
      if(d.ok&&d.kullanici&&USERS[d.kullanici]){CUR_USER=d.kullanici;applyChip();
        Object.keys(loaded).forEach(t=>loaded[t]=false);load(curTab);checkOnboarding()}
      else{try{localStorage.removeItem("bb_devtok_"+u)}catch(e){}openUserPick()}});
  }else openUserPick()}

function showTab(t){curTab=t;try{localStorage.setItem("bb_tab",t)}catch(e){}
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("page-"+t).classList.add("active");
  document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("active",b.dataset.tab===t));
  document.getElementById("chat-input").classList.toggle("on",t==="sor");

function load(t){loaded[t]=true;({bugun:loadBugun,portfoy:loadPortfoy,radar:loadRadar,sor:loadSor,bildirim:loadBildirim,ayarlar:loadAyarlar}[t])()}
function refreshTab(){loaded[curTab]=false;load(curTab);
  const b=document.getElementById("refreshBtn");
  if(b){b.classList.remove("spin");void b.offsetWidth;b.classList.add("spin")}}
const uq=()=>CUR_USER?("?kullanici="+encodeURIComponent(CUR_USER)):"";

function accCard(s){const k=reg(s);
  const px=s.fiyat!=null
    ?`<span class="ac-px">${money(s.fiyat,s.para_birimi)}</span><span class="ac-chg ${signCls(s.gunluk)}">${pct(s.gunluk)}</span>`
    :`<span class="ac-px"></span>`;
  return`<div class="acc" data-key="${k}">
    <div class="acc-head" onclick="toggleAcc('${k}',this)">
      <div class="ac-top">
        <div class="ac-id"><span class="ac-name">${esc(s.isim)}</span>${mtag(s.market)}</div>
        ${pillBig(s.etiket)}
      </div>
      <div class="ac-mid"><span class="ac-tk">${esc(s.ticker)}</span>${px}<span class="ac-caret">⌄</span></div>
      ${statusLine(s)}
    </div>
    <div class="acc-body"></div></div>`}
async function toggleAcc(k,head){const card=head.closest(".acc");const isOpen=card.classList.contains("open");
  document.querySelectorAll("#page-bugun .acc.open").forEach(c=>{if(c!==card)c.classList.remove("open")});
  if(isOpen){card.classList.remove("open");return}
  card.classList.add("open");const body=card.querySelector(".acc-body");
  if(body.dataset.loaded)return;
  body.innerHTML=`<div class="skel skel-line" style="width:80%"></div><div class="skel skel-line" style="width:95%"></div>`;
  try{const s=STOCK_INDEX[k];const d=await(await fetch(`/api/stock/${encodeURIComponent(s.ticker)}?market=${s.market}`)).json();
    body.innerHTML=accDetail(k,d);body.dataset.loaded="1";
  }catch(e){body.innerHTML=`<div class="muted">Yüklenemedi</div>`}}
function accDetail(k,d){const s=STOCK_INDEX[k]||{};const lv=d.seviyeler||{};
  const lvs=Object.entries({Destek:lv.destek,Direnç:lv.direnc,Hedef:lv.hedef,"Stop":lv.stop})
    .filter(([,v])=>v!=null).map(([n,v])=>`<span class="chip">${n}: ${money(v,d.para_birimi)}</span>`).join("");
  return`${s.cardText?`<div class="acc-sec"><div class="acc-k">Özet</div><div class="acc-v">${esc(s.cardText)}</div></div>`:""}
    ${s.actionText?`<div class="acc-sec"><div class="acc-k">Aksiyon</div><div class="acc-v">${esc(s.actionText)}</div></div>`:""}
    <div class="acc-sec"><div class="acc-k">Neden</div><div class="acc-v">${esc(d.reason||d.summary||"—")}</div></div>
    ${(d.haberler&&d.haberler.length)?`<div class="acc-sec"><div class="acc-k">Son haber etkisi</div><div class="acc-v">${esc(d.haberler[0].baslik)}</div></div>`:""}
    ${lvs?`<div class="acc-sec"><div class="acc-k">Önemli seviyeler</div><div class="acc-lv">${lvs}</div></div>`:""}
    <button class="acc-link" onclick="event.stopPropagation();openStock('${k}')">Detaylı incele →</button>`}

// Ufuk'a ozel saka: 23 Haziran 2026'dan beri her gun $10 artan sanal borc.
function sanalBorcHTML(){if(CUR_USER!=="ufuk")return"";
  const start=Date.UTC(2026,5,23);const now=new Date();
  const today=Date.UTC(now.getFullYear(),now.getMonth(),now.getDate());
  const gun=Math.max(0,Math.floor((today-start)/86400000));const borc=gun*10;
  return`<div class="sanal-borc">💸 Sanal Borç: $${borc} (ve artmaya devam ediyor...)</div>`}

async function loadBugun(){const el=document.getElementById("page-bugun");
  el.innerHTML=`<div class="hello">…</div>${skel(3)}`;
  try{const d=await(await fetch("/api/today"+uq())).json();
    const yk=d.portfoy_yorum||"",yt=d.portfoy_yorum_tam||yk;OV_TAM=yt;
    const kesik=yt.length>yk.length||/…\s*$/.test(yk);
    let h=`<div class="hello">${esc(d.selamlama)}</div><div class="subdate">${esc(d.tarih||"")}</div>${sanalBorcHTML()}
      <div class="summary-card"><div class="q">Bugün ne yapmalı?</div><div class="t" id="ov-text" ${kesik?`onclick="ovExpand()" style="cursor:pointer"`:""}>${esc(yk)}${kesik?`<span class="ov-more"> devamı ›</span>`:""}</div>
        <div class="summary-chips">${d.etiketler.map(t=>`<span class="chip ${t.renk}">${esc(t.metin)}</span>`).join("")}</div></div>`;
    h+=`<div class="sec-title">Hisselerimde durum</div>`;
    if(!d.hisseler.length)h+=empty("Portföyünde hisse yok");
    else{h+=`<div id="acc-list">${d.hisseler.slice(0,4).map(compactRow).join("")}</div>`;
      const rest=d.hisseler.slice(4);
      if(rest.length)h+=`<button class="seemore" onclick="this.outerHTML=document.getElementById('acc-rest').innerHTML">Tümünü gör (${rest.length})</button><template id="acc-rest">${rest.map(compactRow).join("")}</template>`;}
    if(d.takip_listesi&&d.takip_listesi.length){
      h+=`<div class="sec-title">Takip Ettiklerim</div>${d.takip_listesi.map(compactRow).join("")}`;}
    if(d.onemli_haber){const n=d.onemli_haber;const ec=n.etki==="Pozitif"?"green":n.etki==="Negatif"?"red":"gray";const nk=n.ticker?reg({ticker:n.ticker,market:'bist',isim:n.ticker}):"";
      h+=`<div class="sec-title">Bugünün önemli haberi</div>
        <div class="news" ${nk?`onclick="openStock('${nk}')"`:""}>${newsVisual(n)}
          <div class="body"><div class="title">${esc(n.baslik)}</div>
            <div class="acc-v" style="margin-top:8px;color:var(--muted)">${esc(n.yorum||"")}</div>
            <div class="meta">${(n.etkilenen||[]).map(t=>`<span class="chip">${esc(t)}</span>`).join("")}<span class="chip ${ec}">${esc(n.etki)}</span></div></div></div>`;}
    if(d.firsatlar&&d.firsatlar.length){h+=`<div class="sec-title">Fırsat radarı</div>
      <div class="hscroll">${d.firsatlar.map(s=>{const k=reg(s);
        return`<div class="opp ${s.etiket==='AL'?'glow':''}" onclick="openStock('${k}')"><div class="row"><span class="name" style="font-size:14px">${esc(s.ticker)}</span>${pill(s.etiket,s.renk)}</div><div class="why">${esc(s.cardText||s.isim)}</div></div>`}).join("")}</div>`;}
    el.innerHTML=h;fillOverview();renderUpdateBanner();
  }catch(e){el.innerHTML=empty("Yüklenemedi")}}
async function fillOverview(){if(!CUR_USER)return;try{const d=await(await fetch("/api/overview"+uq())).json();
  if(d.yorum){const a=document.getElementById("ov-text"),b=document.getElementById("pf-yorum");
    if(a){const yt=d.yorum_tam||d.yorum;OV_TAM=yt;const kesik=yt.length>d.yorum.length||/…\s*$/.test(d.yorum);
      a.innerHTML=esc(d.yorum)+(kesik?`<span class="ov-more"> devamı ›</span>`:"");
      if(kesik){a.style.cursor="pointer";a.onclick=ovExpand}else{a.style.cursor="";a.onclick=null}}

let OV_TAM="";
function ovExpand(){const el=document.getElementById("ov-text");if(!el)return;el.innerHTML=esc(OV_TAM||"");el.style.cursor="";el.onclick=null}

/* ============ GÜNCELLEME BİLDİRİMİ (changelog) ============ */
async function fetchChangelog(){if(CHANGELOG_DATA)return CHANGELOG_DATA;
  try{const d=await(await fetch("/api/changelog")).json();CHANGELOG_DATA=Array.isArray(d)?d:[]}catch(e){CHANGELOG_DATA=[]}
  return CHANGELOG_DATA}
function changelogSeen(){let s="";try{s=localStorage.getItem("bb_changelog_seen")||""}catch(e){}return s}
function changelogMax(list){return (list||[]).reduce((m,x)=>((x.tarih||"")>m?(x.tarih||""):m),"")}
async function renderUpdateBanner(){
  const list=await fetchChangelog();if(!list.length)return;
  const yeni=list.filter(x=>(x.tarih||"")>changelogSeen());
  const el=document.getElementById("page-bugun");if(!el)return;
  const old=document.getElementById("update-banner");if(old)old.remove();
  if(!yeni.length)return;
  // En yeni + önemli olanı başlıkta göster (yoksa en yeni)
  const top=yeni.find(x=>x.onemli)||yeni[0];
  const div=document.createElement("div");div.className="update-card";div.id="update-banner";
  div.innerHTML=`<div class="uc-l"><div class="uc-badge">🆕 Yeni güncelleme</div>`+
    `<div class="uc-title">${esc(top.baslik)}</div></div>`+
    `<button class="uc-btn" onclick="openChangelog()">Detay →</button>`;
  el.insertBefore(div,el.firstChild);
}
function changelogItemsHTML(list){return (list||[]).map(x=>
  `<div class="cl-item"><div class="cl-top"><span class="cl-date">${esc(x.tarih)}</span>`+
  `${x.onemli?'<span class="chip green">Önemli</span>':''}</div>`+
  `<div class="cl-title">${esc(x.baslik)}</div>`+
  `<div class="cl-detail">${esc(x.detay)}</div></div>`).join("");
}
async function openChangelog(){
  const list=await fetchChangelog();
  const yeni=list.filter(x=>(x.tarih||"")>changelogSeen());
  const goster=yeni.length?yeni:list;
  ovShow(`<h2 style="font-size:21px;font-weight:700">🆕 Son Güncellemeler</h2>
    <div class="tick" style="margin-bottom:14px">Botta neler yenilendi</div>
    ${changelogItemsHTML(goster)}
    <button class="btn-primary" onclick="markChangelogSeen()">Tamam</button>`);
}
function markChangelogSeen(){
  try{localStorage.setItem("bb_changelog_seen",changelogMax(CHANGELOG_DATA||[]))}catch(e){}
  const b=document.getElementById("update-banner");if(b)b.remove();
  closeStock();
}

// Portfoy pasta grafigi (saf SVG). Agirlik = deger_tl/toplam. BIST mavi, ABD turuncu tonlari.
function pieHTML(pos){
  const items=(pos||[]).filter(p=>(p.deger_tl||0)>0).sort((a,b)=>b.deger_tl-a.deger_tl);
  if(items.length<2)return"";
  const tot=items.reduce((s,p)=>s+(p.deger_tl||0),0);if(tot<=0)return"";
  const BIST=["#3b82f6","#2563eb","#0ea5e9","#1d4ed8","#38bdf8","#6366f1","#0891b2"];
  const ABD=["#f59e0b","#f97316","#fb923c","#ea580c","#fbbf24","#d97706"];
  const cx=64,cy=64,r=62;let ang=-Math.PI/2,bi=0,ai=0,paths="",legend="";
  for(const p of items){
    const frac=p.deger_tl/tot,a0=ang,a1=ang+frac*2*Math.PI;ang=a1;
    const col=p.market==="abd"?ABD[ai++%ABD.length]:BIST[bi++%BIST.length];
    const k=reg(p),pv=(frac*100).toFixed(1);
    const x0=cx+r*Math.cos(a0),y0=cy+r*Math.sin(a0),x1=cx+r*Math.cos(a1),y1=cy+r*Math.sin(a1);
    const large=(a1-a0)>Math.PI?1:0;
    paths+=`<path d="M${cx} ${cy} L${x0.toFixed(2)} ${y0.toFixed(2)} A${r} ${r} 0 ${large} 1 ${x1.toFixed(2)} ${y1.toFixed(2)} Z" fill="${col}" onclick="openStock('${k}')"><title>${esc(p.ticker)} %${pv}</title></path>`;
    legend+=`<div class="pie-li" onclick="openStock('${k}')"><span class="pie-dot" style="background:${col}"></span><span class="pn">${esc(p.ticker)}${mtag(p.market)}</span><span class="pp">%${pv}</span></div>`;
  }
  return`<div class="sec-title">Portföy Dağılımı</div>
    <div class="pie-wrap"><div class="pie-row">
      <svg class="pie-svg" width="128" height="128" viewBox="0 0 128 128">${paths}</svg>
      <div class="pie-leg">${legend}</div></div>
      <div class="tick" style="margin-top:10px">Mavi tonları BIST · turuncu tonları ABD hisseleri</div></div>`;
}

function renderBubble(m){

function copyMsg(btn){
  const bubble=btn.parentElement.querySelector(".bubble");
  const text=bubble?bubble.innerText:"";
  const done=()=>{btn.textContent="✓ Kopyalandı";btn.classList.add("ok");
    setTimeout(()=>{btn.textContent="Kopyala";btn.classList.remove("ok")},2000)};
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done).catch(()=>{copyFallback(text);done()});
  }else{copyFallback(text);done()}}
function copyFallback(t){try{const ta=document.createElement("textarea");ta.value=t;
  ta.style.position="fixed";ta.style.opacity="0";document.body.appendChild(ta);ta.select();
  document.execCommand("copy");document.body.removeChild(ta)}catch(e){}}

let CHAT_PHOTO=null;   // {path, dataUrl}
function showChatPreview(dataUrl,loading){const p=document.getElementById("chat-preview");
  p.style.display="flex";
  p.innerHTML=`<img src="${dataUrl}" alt="">`+
    `<span class="cp-lbl">${loading?"Yükleniyor…":"Fotoğraf hazır"}</span>`+

function chatClearPhoto(){CHAT_PHOTO=null;const p=document.getElementById("chat-preview");
  p.style.display="none";p.innerHTML="";const f=document.getElementById("chat-file");if(f)f.value=""}
function chatPickPhoto(e){const f=e.target.files&&e.target.files[0];e.target.value="";if(!f)return;
  if(!CUR_USER){toast("Önce kullanıcı seç");return}
  if(!/image\/(jpe?g|png|webp)/i.test(f.type)){toast("jpg, png veya webp olmalı");return}
  if(f.size>5*1024*1024){toast("En fazla 5MB");return}
  const rd=new FileReader();
  rd.onload=async()=>{const dataUrl=rd.result;showChatPreview(dataUrl,true);
    const fd=new FormData();fd.append("foto",f);fd.append("kullanici",CUR_USER);
    try{const r=await fetch("/api/upload",{method:"POST",body:fd});const d=await r.json();
      if(d.ok){CHAT_PHOTO={path:d.dosya_yolu,dataUrl};showChatPreview(dataUrl,false)}
      else{toast(d.hata||"Yüklenemedi");chatClearPhoto()}
    }catch(err){toast("Yüklenemedi");chatClearPhoto()}};
  rd.readAsDataURL(f)}
async function sendChat(){const inp=document.getElementById("chat-text");const q=(inp.value||"").trim();
  const photo=CHAT_PHOTO;
  if(!q&&!photo)return;
  inp.value="";
  const gecmis=CHAT.slice(-12).map(m=>({role:m.rol==="bot"?"assistant":"user",content:m.metin}));
  CHAT.push({rol:"user",metin:q||"📷 Fotoğraf"});const c=document.getElementById("chat");
  const userHtml=photo
    ?`<div class="bubble user"><img class="bubble-img" src="${photo.dataUrl}" alt="">${q?`<div>${esc(q)}</div>`:""}</div>`
    :renderBubble({rol:"user",metin:q});
  c.insertAdjacentHTML("beforeend",userHtml);
  chatClearPhoto();
  c.insertAdjacentHTML("beforeend",`<div class="bubble bot" id="typing" style="opacity:.6;font-style:italic;font-size:13px">yazıyor...</div>`);scrollChat();
  try{
    const resp=await fetch("/api/chat-stream",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({soru:q,mesaj:q,kullanici:CUR_USER,gecmis,image_path:photo?photo.path:null})});
    const reader=resp.body.getReader();const dec=new TextDecoder();
    let buf="",allText="";
    while(true){
      const{done,value}=await reader.read();if(done)break;
      buf+=dec.decode(value,{stream:true});
      const lines=buf.split("\n");buf=lines.pop();
      for(const line of lines){
        if(!line.startsWith("data:"))continue;
        try{const ev=JSON.parse(line.slice(5).trim());
          if(ev.paragraf){
            document.getElementById("typing")?.remove();
            allText+=(allText?"\n":"")+ev.paragraf;
            c.insertAdjacentHTML("beforeend",`<div class="bubble bot"><span>${esc(ev.paragraf)}</span></div>`);
            scrollChat();
            c.insertAdjacentHTML("beforeend",`<div class="bubble bot" id="typing" style="opacity:.6;font-style:italic;font-size:13px">yazıyor...</div>`);
            scrollChat();
          }
          if(ev.done){
            document.getElementById("typing")?.remove();
            c.insertAdjacentHTML("beforeend",`<div style="margin:-4px 0 6px 4px"><button onclick="navigator.clipboard.writeText(${JSON.stringify(allText)})" style="background:none;border:1px solid var(--border);border-radius:8px;color:var(--text2);font-size:12px;padding:4px 10px;cursor:pointer">Kopyala</button></div>`);
            CHAT.push({rol:"bot",metin:allText});
            scrollChat();
          }
        }catch(e){}
      }
    }
  }catch(e){document.getElementById("typing")?.remove();c.insertAdjacentHTML("beforeend",renderBubble({rol:"bot",metin:"Bağlantı hatası."}))}}

let ONB_MSGS=[],ONB_BUSY=false;
async function checkOnboarding(){if(!CUR_USER)return;

function onbScore(s){const v=Math.max(0,Math.min(100,s||0));
  document.getElementById("onb-bar").style.width=v+"%";

async function onbSend(){if(ONB_BUSY)return;const inp=document.getElementById("onb-text");const q=(inp.value||"").trim();if(!q)return;

/* ============ HISSE DETAY · grafik (Midas tarzi) ============ */
const PERIODS=["1G","1H","1A","3A","6A","1Y","5Y"];
const AY=["Oca","Şub","Mar","Nis","May","Haz","Tem","Ağu","Eyl","Eki","Kas","Ara"];
let CHART={pts:[],bcur:"₺",period:"1A",mn:0,mx:0};
let crossActive=false;
function fmtT(t,period){
  let d;
  if(typeof t==="string"&&t.length<=10){const p=t.split("-");d=new Date(+p[0],(+p[1]||1)-1,+p[2]||1)}
  else d=new Date(t);
  const hh=String(d.getHours()).padStart(2,"0"),mm=String(d.getMinutes()).padStart(2,"0");
  if(period==="1G")return `${hh}:${mm}`;
  if(period==="1H")return `${d.getDate()} ${AY[d.getMonth()]} ${hh}:${mm}`;
  if(period==="1Y"||period==="5Y")return `${AY[d.getMonth()]} ${d.getFullYear()}`;
  return `${d.getDate()} ${AY[d.getMonth()]}`;
}
const GRN="#34D399";
function chartSVGonly(pts,mn,mx,acilis){
  const cs=pts.map(p=>p.c);const W=320,H=120,pad=2,volH=24,n=cs.length;
  const x=i=>n<2?W/2:(i/(n-1))*W,y=c=>mx===mn?H/2:pad+(1-(c-mn)/(mx-mn))*(H-2*pad);
  const line=cs.map((c,i)=>`${i?'L':'M'}${x(i).toFixed(1)} ${y(c).toFixed(1)}`).join(" ");
  const area=`M0 ${H} `+cs.map((c,i)=>`L${x(i).toFixed(1)} ${y(c).toFixed(1)}`).join(" ")+` L${W} ${H} Z`;
  const grid=[0.25,0.5,0.75].map(f=>{const yy=(pad+f*(H-2*pad)).toFixed(1);return`<line class="grid" x1="0" y1="${yy}" x2="${W}" y2="${yy}"/>`}).join("");
  // hacim barlari (yesil, dusuk opacity) - en altta
  const vs=pts.map(p=>p.v||0);const mv=Math.max(...vs,1);const bw=Math.max(.6,(W/Math.max(n,1))*0.62);
  const vol=pts.map((p,i)=>{const bh=(p.v||0)/mv*volH;return bh<=0?"":`<rect x="${(x(i)-bw/2).toFixed(1)}" y="${(H-bh).toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}"/>`}).join("");
  const ref=acilis!=null?`<line class="ref" x1="0" y1="${y(acilis).toFixed(1)}" x2="${W}" y2="${y(acilis).toFixed(1)}"/>`:"";
  // grafik HER ZAMAN yesil (yukselis/dusus bagimsiz)
  return`<svg class="chart-svg" viewBox="0 0 ${W} ${H}" width="100%" height="${H}" preserveAspectRatio="none">
    <defs><linearGradient id="garea" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="${GRN}" stop-opacity="0.22"/><stop offset="1" stop-color="${GRN}" stop-opacity="0"/></linearGradient></defs>
    ${grid}${ref}<path class="area" d="${area}" fill="url(#garea)"/><g class="vol">${vol}</g><path class="line draw" pathLength="1" d="${line}" style="stroke:${GRN}"/></svg>`}
function yPctOf(c){const H=120,pad=2;return CHART.mx===CHART.mn?H/2:pad+(1-(c-CHART.mn)/(CHART.mx-CHART.mn))*(H-2*pad)}
function axisHTML(){if(!CHART.pts.length)return"";const last=CHART.pts[CHART.pts.length-1].c;
  const lab=(c,cls)=>`<span class="ax ${cls||''}" style="top:${yPctOf(c).toFixed(1)}px">${fmt(c)}</span>`;
  return lab(CHART.hi)+lab(CHART.lo)+lab(last,"cur");}
function setChart(pts,bcur,period,acilis){const cs=(pts||[]).map(p=>p.c);
  if(!cs.length){CHART={pts:[],bcur,period,acilis:null,lo:0,hi:0,mn:0,mx:0};return}
  const lo=Math.min(...cs),hi=Math.max(...cs);          // gercek veri araligi (eksen etiketleri)
  let dlo=lo,dhi=hi;
  if(acilis!=null){dlo=Math.min(dlo,acilis);dhi=Math.max(dhi,acilis)}  // ref cizgisi gorunur kalsin
  // y-ekseni otomatik zoom: alt %0.5 (x0.995) / ust %0.5 (x1.005) bosluk; 0'dan
  // baslamaz, sadece o periyodun fiyat araligini gosterir.
  let mn=dlo*0.995,mx=dhi*1.005;
  if(mn===mx){mn=mn*0.995;mx=mx*1.005||1}
  CHART={pts:pts||[],bcur,period,acilis:(acilis==null?null:acilis),lo,hi,mn,mx}}
function chgStr(c){const v=(CHART.acilis?(c-CHART.acilis)/CHART.acilis*100:0);
  return{cls:v>=0?"pos":"neg",txt:(v>0?"+":v<0?"-":"")+"%"+fmt(Math.abs(v))}}
function readoutHTML(p){if(!p)return"";
  let mid="";if(CHART.acilis!=null){const g=chgStr(p.c);mid=`<span class="cr-chg ${g.cls}">${g.txt}</span>`}
  return`<span class="cr-price">${money(p.c,CHART.bcur)}</span>${mid}<span class="cr-date">${fmtT(p.t,CHART.period)}</span>`}
function updateReadoutDefault(){const r=document.getElementById("chart-read");
  if(r)r.innerHTML=CHART.pts.length?readoutHTML(CHART.pts[CHART.pts.length-1]):""}
function buildChartInner(pts,bcur,period,acilis){setChart(pts,bcur,period,acilis);
  if(!pts||pts.length<2)return`<div class="muted" style="padding:40px 0;text-align:center;font-size:13px">Grafik verisi yok</div>`;
  return`<div class="chart-plot" id="chart-plot"
      onpointerdown="crossMove(event)" onpointermove="crossMove(event)"
      onpointerup="crossHide()" onpointerleave="crossHide()" onpointercancel="crossHide()">
      ${chartSVGonly(pts,CHART.mn,CHART.mx,CHART.acilis)}
      <div class="cross-line" id="cross-line"></div><div class="cross-dot" id="cross-dot"></div>
      <div class="cross-tip" id="cross-tip"></div>${axisHTML()}</div>
    <div class="chart-meta"><span>En düşük ${money(CHART.lo,bcur)}</span><span>En yüksek ${money(CHART.hi,bcur)}</span></div>`}
function crossMove(e){const pl=document.getElementById("chart-plot");if(!pl||!CHART.pts.length)return;
  crossActive=true;const rect=pl.getBoundingClientRect();
  let ratio=(e.clientX-rect.left)/rect.width;ratio=Math.max(0,Math.min(1,ratio));
  const n=CHART.pts.length,idx=Math.round(ratio*(n-1)),p=CHART.pts[idx];
  const xPx=(n<2?0.5:idx/(n-1))*rect.width;
  const H=120,pad=8;const yU=CHART.mx===CHART.mn?H/2:pad+(1-(p.c-CHART.mn)/(CHART.mx-CHART.mn))*(H-2*pad);
  const yPx=yU/H*rect.height;
  const ln=document.getElementById("cross-line"),dt=document.getElementById("cross-dot"),tip=document.getElementById("cross-tip");
  ln.style.left=xPx+"px";ln.style.display="block";dt.style.left=xPx+"px";dt.style.top=yPx+"px";dt.style.display="block";
  pl.classList.add("hovering");
  if(tip){let tg="";if(CHART.acilis!=null){const g=chgStr(p.c);tg=` <span class="tg ${g.cls}">${g.txt}</span>`}
    tip.innerHTML=`<span class="tp">${money(p.c,CHART.bcur)}</span> <span class="tt">${fmtT(p.t,CHART.period)}</span>${tg}`;
    tip.style.display="block";const tw=tip.offsetWidth;
    // tooltip parmak konumunda; sag kenardaki sabit fiyat etiketi bolgesine girmesin
    const maxL=rect.width-44-tw/2,minL=tw/2+2;
    tip.style.left=Math.max(minL,Math.min(maxL,xPx))+"px";
    tip.style.top=Math.max(2,yPx-32)+"px"}
  const r=document.getElementById("chart-read");if(r)r.innerHTML=readoutHTML(p)}
function crossHide(){crossActive=false;
  const pl=document.getElementById("chart-plot");if(pl)pl.classList.remove("hovering");
  ["cross-line","cross-dot","cross-tip"].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display="none"});
  updateReadoutDefault()}
async function loadSeries(ticker,market,period,btn){
  document.querySelectorAll("#chartbox .periods button").forEach(b=>b.classList.remove("active"));btn.classList.add("active");
  const c=document.getElementById("chart");c.style.opacity=".35";const bcur=btn.dataset.bcur||"₺";
  try{const d=await(await fetch(`/api/series/${encodeURIComponent(ticker)}?market=${market}&period=${period}`)).json();
    c.innerHTML=buildChartInner(d.grafik,bcur,period,d.acilis);c.style.opacity="1";updateReadoutDefault();

function chartBox(ticker,market,grafik,bcur){const def="1A";
  return`<div id="chartbox"><div class="chart-read" id="chart-read"></div>

<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0d">
<title>Borsa Bot</title>
<style>
  :root {
    --bg: #0d0d0d;
    --card: #1a1a1a;
    --card-2: #141414;
    --border: #2a2a2a;
    --text: #f4f4f4;
    --muted: #8a8a8a;
    --muted-2: #5f5f5f;
    --green: #00c853;
    --yellow: #f5a623;
    --red: #ff4757;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { background: var(--bg); color: var(--text); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    line-height: 1.45;
    padding-bottom: calc(72px + env(safe-area-inset-bottom));
    -webkit-font-smoothing: antialiased;
  }
  button { font-family: inherit; cursor: pointer; }

  /* ---------- ust serit ---------- */
  header {
    position: sticky; top: 0; z-index: 30;
    background: rgba(13,13,13,.88);
    backdrop-filter: saturate(140%) blur(12px);
    padding: calc(16px + env(safe-area-inset-top)) 20px 14px;
    border-bottom: 1px solid var(--border);
  }
  .hdr-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
  .hdr-title { font-size: 22px; font-weight: 700; letter-spacing: .2px; }
  .hdr-strip {
    display: flex; align-items: center; gap: 14px;
    font-size: 13.5px; color: var(--muted); margin-top: 7px;
  }
  .hdr-strip .firsat { color: var(--green); font-weight: 600; }
  .hdr-strip .uyari  { color: var(--yellow); font-weight: 600; }
  .hdr-strip .dot { color: var(--muted-2); }

  .bell {
    position: relative; background: none; border: none; color: var(--text);
    font-size: 24px; line-height: 1; padding: 6px; border-radius: 12px;
  }
  .bell:active { background: var(--card); }
  .bell .count {
    position: absolute; top: 0; right: 0;
    min-width: 18px; height: 18px; padding: 0 4px;
    background: var(--red); color: #fff; font-size: 11px; font-weight: 700;
    border-radius: 999px; display: flex; align-items: center; justify-content: center;
    border: 2px solid var(--bg);
  }

  main { padding: 18px 16px 8px; }
  .page { display: none; }
  .page.active { display: block; animation: fade .25s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

  /* ---------- bolum basligi ---------- */
  .section-head {
    display: flex; align-items: center; justify-content: space-between;
    margin: 6px 2px 12px;
  }
  .section-head h2 { font-size: 18px; font-weight: 700; letter-spacing: .2px; }
  .section-head .cnt { font-size: 13px; color: var(--muted); font-weight: 500; }
  .section-head.toggle { cursor: pointer; }
  .section-head .chev { color: var(--muted); font-size: 14px; transition: transform .2s; }
  .section-head.collapsed .chev { transform: rotate(-90deg); }

  /* ---------- arama (pazar) butonlari ---------- */
  .markets { display: flex; gap: 8px; margin: 0 0 14px; }
  .markets button {
    flex: 1; background: var(--card); border: 1px solid var(--border);
    color: var(--text); border-radius: 11px; padding: 8px 0;
    font-size: 13px; font-weight: 600; letter-spacing: .2px;
  }
  .markets button.active { border-color: var(--green); color: var(--green); background: rgba(0,200,83,.07); }

  /* ---------- arama kutusu ---------- */
  .search-box { margin: 0 0 16px; }
  .search-box input {
    width: 100%; background: var(--card-2); border: 1px solid var(--border);
    color: var(--text); border-radius: 12px; padding: 11px 14px;
    font-size: 13.5px; outline: none;
  }
  .search-box input:focus { border-color: var(--green); }
  .search-box input::placeholder { color: var(--muted-2); }
  .soon { text-align: center; color: var(--muted); padding: 30px 16px; font-size: 14px; }
  .soon .big-ico { font-size: 30px; display: block; margin-bottom: 8px; opacity: .8; }
  #search-results { margin-top: 12px; }
  #search-results .hint { color: var(--muted-2); font-size: 12.5px; padding: 8px 2px; }

  /* ---------- hisse kart ---------- */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 18px; padding: 16px 18px; margin-bottom: 12px;
    transition: border-color .15s, transform .08s;
  }
  .card.tap:active { transform: scale(.992); border-color: #3a3a3a; }
  .card-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
  .name { font-size: 14px; font-weight: 700; letter-spacing: .1px; }
  .tick { font-size: 11.5px; color: var(--muted); margin-top: 2px; font-weight: 500; letter-spacing: .4px; }
  .price-wrap { text-align: right; flex-shrink: 0; }
  .price { font-size: 15px; font-weight: 700; letter-spacing: .2px; }
  .chg { font-size: 12.5px; font-weight: 600; margin-top: 2px; }
  .muted-note { font-size: 11.5px; color: var(--muted-2); font-weight: 500; }

  .badge {
    font-size: 12px; font-weight: 800; letter-spacing: .6px;
    padding: 5px 12px; border-radius: 999px; border: 1px solid transparent; white-space: nowrap;
  }
  .badge.green  { color: var(--green);  background: rgba(0,200,83,.12);  border-color: rgba(0,200,83,.35); }
  .badge.yellow { color: var(--yellow); background: rgba(245,166,35,.12); border-color: rgba(245,166,35,.35); }
  .badge.red    { color: var(--red);    background: rgba(255,71,87,.12);  border-color: rgba(255,71,87,.35); }

  .card-foot {
    display: flex; align-items: center; gap: 10px;
    margin-top: 14px; padding-top: 13px; border-top: 1px solid var(--border);
    font-size: 11px; color: var(--muted);
  }
  .card-foot .sep { color: var(--muted-2); }
  .card-foot b { color: var(--text); font-weight: 600; }

  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .flat { color: var(--muted); }

  /* ---------- ozet kart (portfoy/karne) ---------- */
  .hero {
    background: linear-gradient(160deg, #1d1d1d, #161616);
    border: 1px solid var(--border); border-radius: 20px;
    padding: 20px; margin-bottom: 18px;
  }
  .hero .label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; }
  .hero .big { font-size: 34px; font-weight: 800; margin: 6px 0 4px; letter-spacing: .3px; }
  .hero .big.sm { font-size: 28px; }
  .hero .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-top: 18px; }
  .hero .grid .label { margin-bottom: 4px; }
  .hero .grid b { display: block; font-size: 17px; font-weight: 700; }

  /* ---------- portfoy pozisyon ---------- */
  .pos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px 14px; margin-top: 14px;
              padding-top: 14px; border-top: 1px solid var(--border); }
  .pos-grid .cell .k { font-size: 11.5px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; }
  .pos-grid .cell .v { font-size: 15.5px; font-weight: 600; margin-top: 3px; }

  /* ---------- karne defter ---------- */
  .ledger { display: flex; align-items: center; gap: 13px;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; padding: 14px 16px; margin-bottom: 11px; }
  .ledger .mark { font-size: 22px; line-height: 1; flex-shrink: 0; }
  .ledger .body { flex: 1; min-width: 0; }
  .ledger .line1 { font-size: 15px; font-weight: 600; }
  .ledger .line1 .date { color: var(--muted); font-weight: 500; }
  .ledger .line1 .verb { color: var(--muted); }
  .ledger .line2 { font-size: 12.5px; color: var(--muted); margin-top: 3px; }
  .ledger .res { font-size: 17px; font-weight: 800; flex-shrink: 0; }

  /* ---------- detay panel (alt kayan) ---------- */
  .scrim {
    position: fixed; inset: 0; z-index: 40; background: rgba(0,0,0,.6);
    opacity: 0; pointer-events: none; transition: opacity .25s;
    cursor: pointer;  /* iOS Safari: <div> tıklamasının fire etmesi icin gerekli */
  }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 41;
    background: var(--card); border-top: 1px solid var(--border);
    border-radius: 22px 22px 0 0; padding: 8px 20px calc(26px + env(safe-area-inset-bottom));
    transform: translateY(100%); transition: transform .3s cubic-bezier(.32,.72,0,1);
    max-height: 86vh; overflow-y: auto;
  }
  .sheet.open { transform: none; }
  .grabber { width: 42px; height: 5px; background: #3a3a3a; border-radius: 999px; margin: 8px auto 18px; }
  .sheet h3 { font-size: 21px; font-weight: 800; }
  .sheet .sub { font-size: 13px; color: var(--muted); margin-top: 2px; }
  .sheet-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 4px; }
  .block-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .7px; margin: 22px 0 10px; }
  .quote { font-size: 15.5px; line-height: 1.6; color: #dcdcdc; }

  /* puan barlari */
  .bar-row { display: flex; align-items: center; gap: 12px; margin-bottom: 11px; }
  .bar-row .k { width: 110px; font-size: 13.5px; color: var(--muted); flex-shrink: 0; }
  .bar { flex: 1; height: 8px; background: #262626; border-radius: 999px; overflow: hidden; }
  .bar > i { display: block; height: 100%; border-radius: 999px; background: var(--green); }
  .bar-row .n { width: 38px; text-align: right; font-size: 13.5px; font-weight: 700; }

  .news {
    background: var(--card-2); border: 1px solid var(--border);
    border-radius: 14px; padding: 14px;
  }
  .news .baslik { font-size: 14.5px; font-weight: 600; line-height: 1.5; }
  .news .tags { display: flex; gap: 8px; margin-top: 9px; }
  .tag { font-size: 11px; font-weight: 700; letter-spacing: .4px; padding: 3px 9px; border-radius: 999px;
         background: #242424; color: var(--muted); }
  .tag.warn { color: var(--yellow); background: rgba(245,166,35,.12); }
  .tag.fresh { color: var(--green); background: rgba(0,200,83,.12); }

  /* ---------- bildirim paneli ---------- */
  .notif {
    position: fixed; top: 0; right: 0; bottom: 0; width: min(380px, 88vw); z-index: 41;
    background: var(--card); border-left: 1px solid var(--border);
    transform: translateX(100%); transition: transform .3s cubic-bezier(.32,.72,0,1);
    padding: calc(20px + env(safe-area-inset-top)) 18px 20px; overflow-y: auto;
  }
  .notif.open { transform: none; }
  .notif h3 { font-size: 19px; font-weight: 800; margin-bottom: 16px; }
  .alert {
    display: flex; gap: 12px; padding: 13px 0; border-bottom: 1px solid var(--border);
  }
  .alert .ico2 { font-size: 18px; line-height: 1.4; flex-shrink: 0; }
  .alert .at { font-size: 14px; }
  .alert .at b { font-weight: 700; }
  .alert .am { font-size: 13px; color: var(--muted); margin-top: 2px; line-height: 1.45; }
  .alert .ad { font-size: 11px; color: var(--muted-2); margin-top: 4px; }

  .empty { text-align: center; color: var(--muted); padding: 50px 16px; font-size: 15px; }
  .spacer { height: 10px; }

  /* ---------- alt nav ---------- */
  nav {
    position: fixed; left: 0; right: 0; bottom: 0; z-index: 35;
    display: flex; background: rgba(13,13,13,.94);
    backdrop-filter: blur(12px); border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom);
  }
  nav button {
    flex: 1; background: none; border: none; color: var(--muted);
    padding: 12px 0 14px; font-size: 11.5px; font-weight: 600;
    display: flex; flex-direction: column; align-items: center; gap: 5px;
  }
  nav button .ico { font-size: 21px; line-height: 1; opacity: .65; }
  nav button.active { color: var(--text); }
  nav button.active .ico { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="hdr-row">
    <div>
      <div class="hdr-title" id="hdr-title">Ana</div>
      <div class="hdr-strip" id="hdr-strip">
        <span class="firsat" id="s-firsat">— fırsat</span>
        <span class="dot">·</span>
        <span class="uyari" id="s-uyari">— uyarı</span>
      </div>
    </div>
    <button class="bell" onclick="openNotif()" aria-label="Bildirimler">
      🔔<span class="count" id="bell-count" style="display:none">0</span>
    </button>
  </div>
</header>

<main>
  <section id="page-ana" class="page active"></section>
  <section id="page-portfoy" class="page"></section>
  <section id="page-karne" class="page"></section>
</main>

<nav>
  <button data-tab="ana" class="active" onclick="showTab('ana')">
    <span class="ico">📈</span><span>Ana</span></button>
  <button data-tab="portfoy" onclick="showTab('portfoy')">
    <span class="ico">💼</span><span>Portföy</span></button>
  <button data-tab="karne" onclick="showTab('karne')">
    <span class="ico">📒</span><span>Karne</span></button>
</nav>

<!-- detay alt panel -->
<div class="scrim" id="scrim" onclick="closeSheet()"></div>
<div class="sheet" id="sheet">
  <div class="grabber"></div>
  <div id="sheet-body"></div>
</div>

<!-- bildirim paneli -->
<div class="scrim" id="notif-scrim" onclick="closeNotif()"></div>
<aside class="notif" id="notif">
  <h3>Bildirimler</h3>
  <div id="notif-body"><div class="empty">Yükleniyor…</div></div>
</aside>

<script>
const HDR = { ana: "Ana", portfoy: "Portföy", karne: "Karne" };
const loaded = {};
let STOCK_INDEX = {};   // ticker -> kart (detay paneli icin)

/* ---------- bicimlendirme ---------- */
function fmt(n, d=2) {
  if (n === null || n === undefined || isNaN(n)) return "—";
  return Number(n).toLocaleString("tr-TR", {minimumFractionDigits: d, maximumFractionDigits: d});
}
function signCls(n) {
  if (n === null || n === undefined || isNaN(n)) return "flat";
  return n > 0 ? "pos" : (n < 0 ? "neg" : "flat");
}
function pct(n) {
  if (n === null || n === undefined || isNaN(n)) return "—";
  return (n > 0 ? "+" : "") + fmt(n) + "%";
}
function tl(n) {
  if (n === null || n === undefined || isNaN(n)) return "—";
  return (n > 0 ? "+" : "") + fmt(n) + " ₺";
}
function empty(msg) { return `<div class="empty">${msg}</div>`; }
function esc(s) { return (s ?? "").toString().replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }

/* ---------- sekme ---------- */
function showTab(tab) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById("page-" + tab).classList.add("active");
  document.querySelectorAll("nav button").forEach(b =>
    b.classList.toggle("active", b.dataset.tab === tab));
  document.getElementById("hdr-title").textContent = HDR[tab];
  if (!loaded[tab]) load(tab);
}
function load(tab) {
  loaded[tab] = true;
  ({ana: loadAna, portfoy: loadPortfoy, karne: loadKarne}[tab])();
}

/* ---------- ust serit ---------- */
async function loadSummary() {
  try {
    const s = await (await fetch("/api/summary")).json();
    document.getElementById("s-firsat").textContent = `${s.firsat} fırsat`;
    document.getElementById("s-uyari").textContent = `${s.uyari} uyarı`;
    const c = document.getElementById("bell-count");
    if (s.bildirim > 0) { c.textContent = s.bildirim; c.style.display = "flex"; }
    else c.style.display = "none";
  } catch (e) {}
}

/* ---------- hisse kart ---------- */
function stockCard(s) {
  if (s.has_data === false) {
    return `
    <div class="card">
      <div class="card-top">
        <div><div class="name">${esc(s.isim)}</div><div class="tick">${esc(s.ticker)}</div></div>
        <span class="muted-note">Veri bekleniyor</span>
      </div>
    </div>`;
  }
  STOCK_INDEX[s.ticker] = s;
  return `
    <div class="card tap" onclick="openSheet('${s.ticker}')">
      <div class="card-top">
        <div>
          <div class="name">${esc(s.isim)}</div>
          <div class="tick">${esc(s.ticker)}</div>
        </div>
        <div style="display:flex;align-items:center;gap:12px">
          <div class="price-wrap">
            <div class="price">${fmt(s.fiyat)} ₺</div>
            <div class="chg ${signCls(s.gunluk)}">${pct(s.gunluk)}</div>
          </div>
          <span class="badge ${s.renk}">${s.etiket}</span>
        </div>
      </div>
      <div class="card-foot">
        <span>Puan <b>${s.skor ?? "—"}</b></span><span class="sep">·</span>
        <span>Risk <b>${s.risk ?? "—"}</b></span><span class="sep">·</span>
        <span>Eminlik <b>${esc(s.eminlik)}</b></span>
      </div>
    </div>`;
}

async function loadAna() {
  const el = document.getElementById("page-ana");
  try {
    const d = await (await fetch("/api/stocks")).json();
    let html = `
      <div class="markets">
        <button id="mk-bist" class="active" onclick="selectMarket('bist')">BIST</button>
        <button id="mk-abd" onclick="selectMarket('abd')">ABD</button>
        <button id="mk-kripto" onclick="selectMarket('kripto')">Kripto</button>
      </div>
      <div class="search-box" id="search-box" style="display:none">
        <input id="search-input" type="search" autocomplete="off"
               placeholder="Hisse adı / kod ara…" oninput="doSearch(this.value)">
        <div id="search-results"></div>
      </div>`;

    // Portfoyum
    html += `<div class="section-head"><h2>Portföyüm</h2>
             <span class="cnt">${d.portfoyum.length} hisse</span></div>`;
    html += d.portfoyum.length
      ? d.portfoyum.map(stockCard).join("")
      : empty("Portföyünde hisse yok");

    // Takip Listesi (acilir/kapanir, varsayilan kapali)
    html += `<div class="spacer"></div>
      <div class="section-head toggle collapsed" id="takip-head" onclick="toggleTakip()">
        <h2>Takip Listesi</h2>
        <span style="display:flex;align-items:center;gap:10px">
          <span class="cnt">${d.takip.length} hisse</span><span class="chev">▼</span></span>
      </div>
      <div id="takip-body" style="display:none">
        ${d.takip.map(stockCard).join("")}
      </div>`;
    el.innerHTML = html;
  } catch (e) { el.innerHTML = empty("Yüklenemedi"); }
}

function toggleTakip() {
  const head = document.getElementById("takip-head");
  const body = document.getElementById("takip-body");
  head.classList.toggle("collapsed");
  body.style.display = head.classList.contains("collapsed") ? "none" : "block";
}

/* ---------- pazar secimi + arama ---------- */
let searchTimer = null;
function selectMarket(m) {
  ["bist", "abd", "kripto"].forEach(x =>
    document.getElementById("mk-" + x).classList.toggle("active", x === m));
  const box = document.getElementById("search-box");
  const res = document.getElementById("search-results");
  const inp = document.getElementById("search-input");
  box.style.display = "block";
  if (m === "bist") {
    inp.style.display = "block";
    res.innerHTML = `<div class="hint">Aramak için hisse adı veya kodu yazın.</div>`;
    inp.focus();
  } else {
    inp.style.display = "none";
    res.innerHTML = `<div class="soon"><span class="big-ico">🚧</span>
      ${m === "abd" ? "ABD" : "Kripto"} piyasası yakında</div>`;
  }
}

function doSearch(q) {
  clearTimeout(searchTimer);
  const res = document.getElementById("search-results");
  q = (q || "").trim();
  if (q.length < 1) { res.innerHTML = `<div class="hint">Aramak için hisse adı veya kodu yazın.</div>`; return; }
  searchTimer = setTimeout(async () => {
    try {
      const list = await (await fetch("/api/search?q=" + encodeURIComponent(q))).json();
      res.innerHTML = list.length
        ? list.map(stockCard).join("")
        : `<div class="hint">"${esc(q)}" için sonuç yok.</div>`;
    } catch (e) { res.innerHTML = `<div class="hint">Arama yapılamadı.</div>`; }
  }, 220);
}

/* ---------- detay panel ---------- */
function bar(k, v) {
  return `<div class="bar-row"><span class="k">${k}</span>
    <span class="bar"><i style="width:${(v/10*100)}%"></i></span>
    <span class="n">${v}/10</span></div>`;
}
function openSheet(ticker) {
  const s = STOCK_INDEX[ticker];
  if (!s) return;
  const pd = s.puan_detay || {};
  const h = s.son_haber;
  let news = "";
  if (h) {
    const fresh = (h.tazelik || "").toUpperCase() === "YENI";
    const unpriced = (h.fiyatlanma || "").toUpperCase() === "FIYATLANMADI";
    news = `<div class="block-title">Son KAP Haberi</div>
      <div class="news"><div class="baslik">${esc(h.baslik)}</div>
        <div class="tags">
          ${h.tarih ? `<span class="tag">${esc(h.tarih)}</span>` : ""}
          ${h.tazelik ? `<span class="tag ${fresh ? "fresh" : ""}">${esc(h.tazelik)}</span>` : ""}
          ${unpriced ? `<span class="tag warn">FİYATLANMADI</span>` : ""}
        </div></div>`;
  }
  document.getElementById("sheet-body").innerHTML = `
    <div class="sheet-row">
      <div><h3>${esc(s.isim)}</h3><div class="sub">${esc(s.ticker)} · ${fmt(s.fiyat)} ₺
        <span class="${signCls(s.gunluk)}">${pct(s.gunluk)}</span></div></div>
      <span class="badge ${s.renk}">${s.etiket}</span>
    </div>
    <div class="block-title">Uzman Yorumu</div>
    <div class="quote">${esc(s.yorum) || "Yorum bulunmuyor."}</div>
    <div class="block-title">Puan Detayı</div>
    ${bar("Şirket sağlığı", pd.sirket_sagligi ?? 0)}
    ${bar("Fiyat", pd.fiyat ?? 0)}
    ${bar("Piyasa", pd.piyasa ?? 0)}
    ${news}`;
  document.getElementById("scrim").classList.add("open");
  document.getElementById("sheet").classList.add("open");
}
function closeSheet() {
  document.getElementById("scrim").classList.remove("open");
  document.getElementById("sheet").classList.remove("open");
}

/* ---------- portfoy ---------- */
async function loadPortfoy() {
  const el = document.getElementById("page-portfoy");
  try {
    const d = await (await fetch("/api/portfolio")).json();
    const o = d.ozet || {};
    let html = `
      <div class="hero">
        <div class="label">Toplam Kâr / Zarar</div>
        <div class="big ${signCls(o.kz)}">${tl(o.kz)}</div>
        <div class="chg ${signCls(o.kz_yuzde)}">${pct(o.kz_yuzde)}</div>
        <div class="grid">
          <div><div class="label">Yatırım</div><b>${fmt(o.maliyet)} ₺</b></div>
          <div><div class="label">Güncel Değer</div><b>${fmt(o.deger)} ₺</b></div>
        </div>
      </div>`;
    if (!d.pozisyonlar.length) { el.innerHTML = html + empty("Portföyde pozisyon yok"); return; }
    html += d.pozisyonlar.map(p => `
      <div class="card">
        <div class="card-top">
          <div><div class="name">${esc(p.isim)}</div>
            <div class="tick">${esc(p.ticker)} · ${fmt(p.adet,0)} adet · 👤 ${esc(p.kullanici)}</div></div>
          <div class="price-wrap">
            <div class="price ${signCls(p.kz_yuzde)}">${pct(p.kz_yuzde)}</div>
            <div class="chg ${signCls(p.kz)}">${tl(p.kz)}</div>
          </div>
        </div>
        <div class="pos-grid">
          <div class="cell"><div class="k">Alış</div><div class="v">${fmt(p.alis)} ₺</div></div>
          <div class="cell"><div class="k">Güncel</div><div class="v">${p.guncel != null ? fmt(p.guncel)+" ₺" : "—"}</div></div>
          <div class="cell"><div class="k">Hedef</div><div class="v pos">${fmt(p.hedef)} ₺</div></div>
          <div class="cell"><div class="k">Stop-loss</div><div class="v neg">${fmt(p.stop)} ₺</div></div>
        </div>
      </div>`).join("");
    el.innerHTML = html;
  } catch (e) { el.innerHTML = empty("Yüklenemedi"); }
}

/* ---------- karne (defter) ---------- */
async function loadKarne() {
  const el = document.getElementById("page-karne");
  try {
    const d = await (await fetch("/api/karne")).json();
    const o = d.ozet || {}, a = d.ayar || {};
    let html = `
      <div class="hero">
        <div class="label">Strateji vs BIST100</div>
        <div class="big sm ${signCls(o["strateji_vs_bist100_fark_%"])}">${pct(o["strateji_vs_bist100_fark_%"])}</div>
        <div class="sub" style="color:var(--muted);font-size:13px;margin-top:2px">
          Ağırlıklı isabet %${fmt(o["agirlikli_basari_orani_%"],1)} · ${esc(a.start||"")} → ${esc(a.end||"")}</div>
      </div>
      <div class="section-head"><h2>Karar Defteri</h2>
        <span class="cnt">${(d.satirlar||[]).length} kayıt</span></div>`;
    if (!d.satirlar || !d.satirlar.length) { el.innerHTML = html + empty("Kayıt yok"); return; }
    html += d.satirlar.map(s => `
      <div class="ledger">
        <span class="mark">${s.kazandi ? "✅" : "❌"}</span>
        <div class="body">
          <div class="line1"><span class="date">${esc(s.tarih)}</span> —
            <b>${esc(s.ticker)}</b> <span class="verb">—</span>
            <span class="${s.renk === 'green' ? 'pos' : s.renk === 'red' ? 'neg' : 'flat'}">${s.etiket}</span> dedim</div>
          <div class="line2">${s.kazandi ? "doğru çıktı" : "yanıldım"} · ${esc(s.sebep)}</div>
        </div>
        <span class="res ${signCls(s.getiri)}">${pct(s.getiri)}</span>
      </div>`).join("");
    el.innerHTML = html;
  } catch (e) { el.innerHTML = empty("Yüklenemedi"); }
}

/* ---------- bildirim paneli ---------- */
const ALERT_ICO = { firsat: "🟢", uyari: "⚠️", haber: "📰", default: "🔔" };
async function openNotif() {
  document.getElementById("notif-scrim").classList.add("open");
  document.getElementById("notif").classList.add("open");
  try {
    const list = await (await fetch("/api/alerts")).json();
    const body = document.getElementById("notif-body");
    body.innerHTML = list.length ? list.map(a => `
      <div class="alert">
        <span class="ico2">${ALERT_ICO[a.tip] || ALERT_ICO.default}</span>
        <div><div class="at"><b>${esc(a.ticker)}</b> · ${esc(a.isim)}</div>
          <div class="am">${esc(a.mesaj)}</div>
          ${a.tarih ? `<div class="ad">${esc(a.tarih)}</div>` : ""}</div>
      </div>`).join("") : empty("Henüz bildirim yok");
  } catch (e) { document.getElementById("notif-body").innerHTML = empty("Yüklenemedi"); }
}
function closeNotif() {
  document.getElementById("notif-scrim").classList.remove("open");
  document.getElementById("notif").classList.remove("open");
}
